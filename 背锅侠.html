function saveState(){state.lastSave=Date.now();try{localStorage.setItem(STATE_KEY,JSON.stringify(state));}catch(e){}}
function loadState(){try{const raw=localStorage.getItem(STATE_KEY);if(raw){const p=JSON.parse(raw);if(!p.hasOwnProperty('season'))p.season=1;if(!p.hasOwnProperty('seasonsUnlocked'))p.seasonsUnlocked=p.season||1;if(!p.hasOwnProperty('chapterRecaps'))p.chapterRecaps={};if(p.choices)p.choices=p.choices.map(c=>({...c,season:c.season||p.season||1,chapter:c.chapter||p.chapter||1}));if(p.inventory)p.inventory=p.inventory.filter(id=>ITEMS[id]);Object.assign(state,p);return true;}}catch(e){}return false;}
function addItem(id){if(ITEMS[id]&&!state.inventory.includes(id)){state.inventory.push(id);updateBadge();saveState();}}
function hasItem(id){return state.inventory.includes(id);}
function removeItem(id){const i=state.inventory.indexOf(id);if(i>=0){state.inventory.splice(i,1);updateBadge();saveState();}}
function updateBadge(){if(state.inventory.length>0){btnBackpack.classList.add('has-items');btnBackpack.textContent='🎒'+state.inventory.length;}else{btnBackpack.classList.remove('has-items');btnBackpack.textContent='🎒';}}
function renderBackpack(){backpackItems.innerHTML='';if(state.inventory.length===0){backpackItems.innerHTML='<div class="empty-hint">背包空空如也。</div>';}else{state.inventory.forEach(id=>{const item=ITEMS[id];if(!item)return;const card=document.createElement('div');card.className='item-card';card.innerHTML=`<div class="item-type">${item.type==='evidence'?'一次性物证':item.type==='clue'?'一次性线索':'情感纪念'}${item.negative?' · 负面伏笔':''}</div><div class="item-name">${item.name}</div><div class="item-desc">${item.desc}</div>`;backpackItems.appendChild(card);});}}
function openBackpack(){renderBackpack();backpackOverlay.classList.add('show');}
function closeBackpack(){backpackOverlay.classList.remove('show');}

function buildRecap(chapterNum){
  const prev=chapterNum-1;
  const items=state.inventory.filter(id=>ITEMS[id]&&ITEMS[id].season===1).map(id=>ITEMS[id].name);
  const ch=state.choices.filter(c=>c.chapter===prev);
  let summary='回顾数据缺失';
  let keyChoice='应对了关键局面';
  if(prev===0){
    summary='你以047身份入职项目部，前台直言这部门是背锅专用。陈默给了避坑便利贴，王总吐了一个"慎"字。下午小林送来完整数据表，陈默按住鼠标警告你别碰。';
    if(ch.some(c=>c.sceneId==='ch1_scene6'&&c.choiceIndex===0))keyChoice='收下归档留存';
    else if(ch.some(c=>c.sceneId==='ch1_scene6'&&c.choiceIndex===1))keyChoice='当场退回';
  }else if(CHAPTER_SUMMARIES[prev-1]){
    summary=CHAPTER_SUMMARIES[prev-1].summary;
    if(ch.some(c=>c.consumeItem))keyChoice='消耗了关键道具';
    else if(ch.length>0)keyChoice='做出了关键选择';
  }
  return{summary,keyChoice,itemList:items.length>0?items.join('、'):'无'};
}

function showRecap(chapterNum){
  const recap=buildRecap(chapterNum);
  recapContent.innerHTML=`<div class="recap-block"><div class="recap-label">📖 上一章回顾</div><div>${recap.summary}</div></div><div class="recap-block"><div class="recap-label">🔑 关键选择</div><div>你<strong style="color:#e0d090">【${recap.keyChoice}】</strong>。</div></div><div class="recap-block"><div class="recap-label">🎒 持有道具</div><div>${recap.itemList}</div></div>`;
  recapOverlay.classList.remove('hidden');
}
function hideRecap(){recapOverlay.classList.add('hidden');startChapter(state.chapter);}

function renderChapterSelect(){
  chapterList.innerHTML='';
  for(let i=1;i<=20;i++){
    const item=document.createElement('button');
    item.className='chapter-item'+(i<=state.seasonsUnlocked?'':' locked');
    item.innerHTML=`<span class="ch-num">${i}</span>${CHAPTER_TITLES[i-1]}`;
    if(i<=state.seasonsUnlocked){
      item.addEventListener('click',()=>{
        chapterSelect.classList.add('hidden');
        state.chapter=i;state.sceneId='ch'+i+'_scene1';state.finished=false;saveState();
        updateBadge();clearStory();chapterLabel.textContent=CHAPTER_TITLES[i-1];
        if(i>1&&state.chapterRecaps[i-1]){showRecap(i);}else{startChapter(i);}
      });
    }
    chapterList.appendChild(item);
  }
  chapterSelect.classList.remove('hidden');
}

function continueAfterMoyu(){
  const loaded=loadState();
  if(!loaded){
    state.chapter=1;state.sceneId='ch1_scene1';state.finished=false;state.seasonsUnlocked=1;
    saveState();updateBadge();clearStory();chapterLabel.textContent=CHAPTER_TITLES[0];startChapter(1);return;
  }
  if(state.finished&&state.chapter===20){
    updateBadge();clearStory();chapterLabel.textContent=CHAPTER_TITLES[19];
    appendTag('【第一季·全剧终】');
    appendBlock({type:'thought',text:'检测到存档：全20章已完成。道具背包中有 '+state.inventory.length+' 件道具。'});
    appendBlock({type:'thought',text:'感谢游玩《背锅侠》第一季。'});
    choicesArea.innerHTML='<div style="text-align:center;color:var(--text-dim);padding:16px;">全季完结 🏁<br><span style="font-size:13px;">可通过章节选择器回顾任意章节</span></div>';
    return;
  }
  if(state.finished&&state.chapter<20){
    const nextChapter=state.chapter+1;
    state.chapter=nextChapter;state.sceneId='ch'+nextChapter+'_scene1';state.finished=false;saveState();
    updateBadge();clearStory();chapterLabel.textContent=CHAPTER_TITLES[nextChapter-1];
    if(nextChapter>1){showRecap(nextChapter);}else{startChapter(nextChapter);}
    return;
  }
  updateBadge();clearStory();chapterLabel.textContent=CHAPTER_TITLES[state.chapter-1];
  if(state.sceneId&&state.sceneId!=='__end__'){renderScene(state.sceneId);}else{startChapter(state.chapter);}
}

ch1_scene5:{tag:'【场景5：偶遇王总｜午12:20】',blocks:[{type:'narration',text:'王总瞥见你，抬眼淡淡吐出一字提醒。'},{type:'dialogue',text:'王总："慎。"'}],choices:[{label:'上前问好',nextScene:'ch1_branch5a',itemGain:'wang_hint'},{label:'点头避开',nextScene:'ch1_branch5b',itemGain:'wang_blankchat'}]},
ch1_branch5a:{tag:'【分支·问好】',blocks:[{type:'narration',text:'你简单问好，王总颔首，目光隐晦扫向远处独自吃饭的孙总，深意十足。'}],choices:[{label:'__auto__',nextScene:'ch1_merge5'}]},
ch1_branch5b:{tag:'【分支·避开】',blocks:[{type:'narration',text:'你侧身避开，余光看见王总手机页面停留在和陈默的空白对话框，一片寂静。'}],choices:[{label:'__auto__',nextScene:'ch1_merge5'}]},
ch1_merge5:{tag:null,blocks:[{type:'narration',text:'下午三点，孙总助理小林面无表情走来，将一份完整数据表放在你桌面，转身就走。'}],choices:[{label:'__auto__',nextScene:'ch1_scene6'}]},
ch1_scene6:{tag:'【场景6：陷阱送达｜下午15:00】',blocks:[{type:'dialogue',text:'刘伟眼睛一亮，瞬间看到希望："这下有救了！缺的数据全补上了！"'},{type:'bold',text:'陈默抬手直接按住你的鼠标，眼神冷冽，语气干脆凌厉，没有半点多余情绪。'},{type:'dialogue',text:'陈默："别碰。天底下没有免费的福利，凭空送上门的完整数据，是高层精心包装的造假黑锅，谁接谁死。"'},{type:'dialogue',text:'张野斜睨一眼，短句冷梗到位："定制死局。"'}],choices:[{label:'收下归档留存',nextScene:'ch1_branch6a',itemGain:'sealed_file',alsoGain:'sun_observation'},{label:'当场退回',nextScene:'ch1_branch6b',itemGain:'returned_data'}]},
ch1_branch6a:{tag:'【分支·收下封存】',blocks:[{type:'narration',text:'你将表格收好，陈默贴了张便利贴封住文件袋。'},{type:'dialogue',text:'陈默："封死别碰，这是对方递过来的定制死亡剧本。留着是保命底牌，敢动一下，直接当场宣判我们全员违规出局。"'},{type:'narration',text:'远处孙总办公室窗帘微动，视线牢牢锁在你工位。'}],choices:[{label:'__auto__',nextScene:'ch1_chapter_end'}]},
ch1_branch6b:{tag:'【分支·当场退回】',blocks:[{type:'narration',text:'你直接退回表格，小林回去汇报，赵东升脸上的假笑彻底碎裂。'},{type:'dialogue',text:'陈默："躲过这波保底坑而已，别太乐观。官方裁判下场做局，后续全是暗改阴招，根本不给你合规通关的机会。"'}],choices:[{label:'__auto__',nextScene:'ch1_chapter_end'}]},
ch1_chapter_end:{tag:'【第一章·结束】',blocks:[{type:'narration',text:'下班前，陈默在你显示器贴了张新便利贴。'},{type:'dialogue',text:'陈默："考核排名只是走个过场的表面流程，项目部的优化清退，早就敲定在高层的内部预案里。所谓考核比拼，不过是他们找合规理由裁人的遮羞布。"'},{type:'thought',text:'你收拾背包，内心冷感独白：我不是来打工的，是来考察这家公司的。这摊浑水，远比表面看着肮脏。层层局中局、明面上的规则博弈、暗地里的人为做局，处处都是藏不住的猫腻，确实有点意思。'},{type:'narration',text:'走廊深处，那件无人认领的工装依旧静静摆放，伏笔持续留存。'}],choices:[{label:'__auto__',nextScene:'__end__'}]},

// ===== 第二章·文件 =====
ch2_scene1:{tag:'【开场衔接｜早8:45 工位】',blocks:[{type:'narration',text:'次日一早到岗，隔壁闲置工位椅背上搭着一件无人认领的工装，落了薄薄一层灰，看着格外诡异。'},{type:'narration',text:'李姐抱着一摞厚厚的报表，步履匆匆走到你桌边，语气带着日常的紧绷。'},{type:'dialogue',text:'李姐："今早先把昨天的留存台账整理归档，下午有跨部门对接，所有单据必须签字齐全、留档备查，千万别出岔子。"'}],itemCheck:{itemId:'blank_ledger',prompt:'检测到可用道具：【无数据工作空白台账】',description:'昨日留存的空白台账可以附在报表首页一并留存，佐证竞品部刻意扣押核心工作资源。使用后道具将被消耗。',useLabel:'使用道具——附上空白台账作为证据留存',skipLabel:'暂不使用——先整理其他材料',useScene:'ch2_branch_ledger',skipScene:'ch2_interact1'},choices:[{label:'优先整理昨日留存纸质材料',nextScene:'ch2_branch1a'},{label:'先点开公司OA查看高层通知',nextScene:'ch2_branch1b',itemGain:'oa_screenshot_ch2'}]},
ch2_branch_ledger:{tag:'【道具使用·附上空白台账】',blocks:[{type:'narration',text:'你翻出昨日的归档单据，顺势将无数据工作空白台账附在报表首页一并留存。这份空白台账清晰记录了昨日竞品部刻意扣押核心工作资源、拖延项目进度的实情。'},{type:'narration',text:'李姐接过报表翻了两页，目光在空白台账上停了片刻，什么都没说，只轻轻点了点头。'},{type:'dialogue',text:'李姐："……留着。以后用得上。"'},{type:'thought',text:'道具消耗：无数据工作空白台账（一次性证据）【已销毁】'}],choices:[{label:'__auto__',nextScene:'ch2_merge1'}]},
ch2_interact1:{tag:null,blocks:[],choices:[{label:'优先整理昨日留存纸质材料',nextScene:'ch2_branch1a'},{label:'先点开公司OA查看高层通知',nextScene:'ch2_branch1b',itemGain:'oa_screenshot_ch2'}]},
ch2_branch1a:{tag:'【分支·整理纸质材料】',blocks:[{type:'narration',text:'你翻出昨日的归档单据，顺势将无数据工作空白台账附在报表首页一并留存，刚好能佐证昨日竞品部刻意扣押核心工作资源、拖延项目进度的实情。'},{type:'thought',text:'道具消耗：无数据工作空白台账（一次性证据）【已销毁】'}],choices:[{label:'__auto__',nextScene:'ch2_merge1'}]},
ch2_branch1b:{tag:'【分支·查看OA通知】',blocks:[{type:'narration',text:'公司OA首页置顶了孙总刚签发的考核补充条例，文件抄送记录里，清晰留有王总的审阅痕迹，明显是高层提前敲定的新规。'},{type:'thought',text:'获得道具：孙总考核补充OA截图（一次性线索）'}],choices:[{label:'__auto__',nextScene:'ch2_merge1'}]},
ch2_merge1:{tag:'【段落衔接｜早9:20 走廊】',blocks:[{type:'narration',text:'走廊人来人往，竞品部的赵东升忽然凑到你工位前，脸上挂着标准的职场假笑。借着高层下发的跨部门协同核查任务的由头，他堂而皇之地甩来烂活。'},{type:'dialogue',text:'赵东升："小老弟，帮个小忙呗。我们部门今天全员外勤跑项目，办公室没人留守，这边刚好有份高层加急的项目汇总文件，麻烦你跑一趟档案室取一下送我办公室。新人多帮忙分担工作，也算积极表现，对你后续考核有好处。"'},{type:'narration',text:'他刚走，路过的刘伟立刻凑过来，小声吐槽。'},{type:'dialogue',text:'刘伟："别被他忽悠了！这人最会借公事甩锅，好活自己抢，烂活全甩给咱们项目部新人，干成是他的功绩，出事就是我们背锅，纯纯职场老油条。"'}],choices:[{label:'当场答应，立刻动身取文件',nextScene:'ch2_branch2a'},{label:'借口手头报表未完成，委婉推脱',nextScene:'ch2_branch2b'}]},
ch2_branch2a:{tag:'【分支·应下取文件】',blocks:[{type:'narration',text:'你没多想，点头应下，起身准备去往档案室，一旁的陈默当即抬眼开口阻拦，语气清淡却句句通透。'},{type:'dialogue',text:'陈默："别接。涉密文件，外部门碰就是违规。他这是故意甩锅，等着你踩坑背雷。"'}],choices:[{label:'__auto__',nextScene:'ch2_merge2'}]},
ch2_branch2b:{tag:'【分支·委婉推脱】',blocks:[{type:'narration',text:'你以手头台账、报表尚未整理归档，本职工作未完工为由委婉推脱。赵东升脸上的笑意瞬间收敛，面色沉了几分，没再多纠缠，只撂下一句"等你忙完再说"，转身离开。'},{type:'dialogue',text:'陈默瞥着他的背影，淡淡出声，语气带着几分通透的调侃："你今天软了，他明天就敢明目张胆拿捏你。职场退让，就是给别人递刀。"'},{type:'narration',text:'你顺利推脱掉甩锅任务后，手头本职工作收尾完毕，恰逢李姐安排你前往档案室隔壁的文印室领取资料。途经档案室走廊时，你远远瞥见靠墙摸鱼的张野，和选择取文件的分支抵达同一区域，双线剧情顺利汇合。'}],choices:[{label:'__auto__',nextScene:'ch2_scene3'}]},
ch2_merge2:{tag:null,blocks:[{type:'narration',text:'陈默的警告言犹在耳，但你已经应下了赵东升。犹豫片刻，你还是走向了档案室——小心一点就是了。'}],choices:[{label:'__auto__',nextScene:'ch2_scene3'}]},
ch2_scene3:{tag:'【段落衔接｜早10:00 档案室门口】',blocks:[{type:'narration',text:'你走到档案室门口，撞见摸鱼靠墙的张野。他扫了一眼你手里的取件申请，一眼看穿端倪。'},{type:'dialogue',text:'张野："有坑。"'}],choices:[{label:'直接开门取出文件',nextScene:'ch2_branch3a',itemGain:'tampered_cover'},{label:'站在门外先翻看文件外包装标签',nextScene:'ch2_branch3b',itemGain:'security_label_photo'}]},
ch2_branch3a:{tag:'【分支·直接取件】',blocks:[{type:'narration',text:'你推门进入档案室，取出对应的项目文件抱在怀里，细心发现文件封皮边角有刻意涂改、重新粘贴的痕迹，看着格外不对劲。'},{type:'thought',text:'获得道具：涂改封皮项目文件（一次性物证）'}],choices:[{label:'__auto__',nextScene:'ch2_merge4'}]},
ch2_branch3b:{tag:'【分支·核查标签】',blocks:[{type:'narration',text:'你没有贸然开门，先凑近文件外包装仔细核查，侧边的保密等级标签清晰标注：仅限竞品部内部人员查阅、外部人员禁止调阅。'},{type:'thought',text:'获得道具：文件保密等级标签照片（一次性线索）'}],choices:[{label:'__auto__',nextScene:'ch2_merge4'}]},
ch2_merge4:{tag:'【段落衔接｜午11:00 茶水间】',blocks:[{type:'narration',text:'午休摸鱼时段，茶水间偶遇刘伟和周姐，几人随口闲聊，爆出不少公司内幕。'},{type:'dialogue',text:'刘伟："今早孙总单独找了赵东升谈话，谈了四十分钟。一个副总跟一个部门经理，有什么话能聊四十分钟？估计又在琢磨怎么针对我们项目部新人。"'},{type:'dialogue',text:'周姐淡淡提醒："职场不公是常态，多留凭证，少裸奔干活。"'},{type:'narration',text:'话音落下，王总神色严肃快步路过，刻意避开了这边的闲聊。'}],choices:[{label:'主动上前和周姐搭话深挖内情',nextScene:'ch2_branch4a',itemGain:'zhoujie_hr_intel'},{label:'安静旁听，默默记录对话内容',nextScene:'ch2_branch4b',itemGain:'tearoom_recording'}]},
ch2_branch4a:{tag:'【分支·主动搭话】',blocks:[{type:'narration',text:'你顺势上前搭话，借着闲聊打探高层派系动向，周姐没有隐瞒，悄悄透露了孙总近期正在筹备内部人事调整的消息。'},{type:'thought',text:'获得道具：周姐口述人事调整情报（一次性线索）'}],choices:[{label:'__auto__',nextScene:'ch2_merge5'}]},
ch2_branch4b:{tag:'【分支·静默记录】',blocks:[{type:'narration',text:'你没有插话，默默拿出手机开启录音，完整留存下刘伟和周姐的全部闲聊内容，留存关键线索。'},{type:'thought',text:'获得道具：茶水间闲谈录音（一次性物证）'}],choices:[{label:'__auto__',nextScene:'ch2_merge5'}]},
ch2_merge5:{tag:'【段落衔接｜午14:00 工位】',blocks:[{type:'narration',text:'下午刚开工，赵东升再度找来，态度强硬，借高层协同任务为由，逼你当场拆文件核对复述。'},{type:'dialogue',text:'陈默："哟，赵经理对新人也太关照了。不过这份是部门涉密归档文件，公司合规条例明文禁止跨部门人员拆阅经手，您这逼着新人违规的操作，是打算带着新人跟您一块同归于尽、一起担责吗？"'}],itemCheck:{itemId:'sealed_file',prompt:'检测到可用道具：【陈默封存的造假数据文件袋】',description:'第一章留下的底牌。此时亮出来可以震慑赵东升。但道具将被消耗。',useLabel:'使用道具——亮出封存文件，震慑赵东升',skipLabel:'暂不使用——先靠自己应对',useScene:'ch2_branch_item',skipScene:'ch2_interact5'},choices:[{label:'听从要求拆开文件核对',nextScene:'ch2_branch5a',itemGain:'negative_photo'},{label:'坚持不拆封，完整转交不查看内页',nextScene:'ch2_branch5b',itemGain:'monitor_record'}]},
ch2_branch_item:{tag:'【道具使用·亮出封存文件】',blocks:[{type:'narration',text:'你不急不慢地从抽屉里取出那份贴着便利贴的文件袋，轻轻放在桌上。赵东升的表情变了。'},{type:'dialogue',text:'陈默嘴角微扬："赵经理，这份文件袋里装的是什么，您应该比我们清楚。"'},{type:'narration',text:'赵东升沉默片刻，笑容重新堆上脸，但这次笑得极其勉强："……行。既然你们手头还有工作，文件的事改天再说。"'},{type:'narration',text:'他转身走了。步子比来时快得多。'}],choices:[{label:'__auto__',nextScene:'ch2_merge6'}]},
ch2_interact5:{tag:null,blocks:[],choices:[{label:'听从要求拆开文件核对',nextScene:'ch2_branch5a',itemGain:'negative_photo'},{label:'坚持不拆封，完整转交不查看内页',nextScene:'ch2_branch5b',itemGain:'monitor_record'}]},
ch2_branch5a:{tag:'【分支·拆开文件】',blocks:[{type:'narration',text:'你迫于压力拆开文件封装，翻开后发现内页混杂着大量虚假营收数据，还没等你反应过来，一旁的赵东升迅速拿出手机抓拍，刻意留存对你不利的画面。'},{type:'thought',text:'触发负面伏笔：赵东升持有翻阅违规文件照片——这张照片将在后续章节中持续发酵。'}],choices:[{label:'__auto__',nextScene:'ch2_merge6'}]},
ch2_branch5b:{tag:'【分支·拒不拆封】',blocks:[{type:'narration',text:'你谨记保密规定，全程不触碰文件内页，在工位监控的可视范围内，将完整未拆封的文件双手递交，全程留痕、规避所有风险。'},{type:'thought',text:'获得道具：完整转交文件监控时间记录（一次性证据）'}],choices:[{label:'__auto__',nextScene:'ch2_merge6'}]},
ch2_merge6:{tag:'【段落衔接｜下午15:30 会议室门外】',blocks:[{type:'narration',text:'公司临时下发部门短会通知，OA同步推送了孙总最新的考核加码条款，新规针对性极强。王总审阅后，在文件批注栏留下四字评语：审慎核查。'},{type:'narration',text:'张野路过你的工位，扫了眼OA通知，淡淡丢下一句短句。'},{type:'dialogue',text:'张野："全是套路。"'}],choices:[{label:'截图保存王总批注与孙总加码通知',nextScene:'ch2_branch6a',itemGain:'oa_approval_screenshot'},{label:'简单浏览，不做任何留存操作',nextScene:'ch2_branch6b'}]},
ch2_branch6a:{tag:'【分支·截图留存】',blocks:[{type:'narration',text:'你立刻截图保存高层OA通知与批注内容，妥善留存这份高层博弈的关键线索。'},{type:'thought',text:'获得道具：高层OA批注截图（一次性线索）'}],choices:[{label:'__auto__',nextScene:'ch2_merge7'}]},
ch2_branch6b:{tag:'【分支·不做留存】',blocks:[{type:'narration',text:'你简单浏览完新规内容，没有进行任何截图留存，直接关闭了页面，无新增道具。'}],choices:[{label:'__auto__',nextScene:'ch2_merge7'}]},
ch2_merge7:{tag:'【段落衔接｜下班前17:40 工位】',blocks:[{type:'narration',text:'临近下班，陈默贴来一张便利贴，低声提醒暗藏危机。'},{type:'dialogue',text:'陈默："今天这点小动作只是最低级的新手试水，新规则实装后，所有机制都会变成针对你的定点debuff。台前蹦跶的只是前排小怪，真正控场的幕后玩家，至今还没现身。"'},{type:'narration',text:'暮色笼罩工位，隔壁空工位那件无人认领的工装静静摆放着，在灯光下透着诡异。'}],choices:[{label:'__auto__',nextScene:'__end__'}]},

// ===== 第三章·短会 =====
ch3_scene1:{tag:'【开场衔接｜早8:50 工位】',blocks:[{type:'narration',text:'入职第三日，考核前最后一个完整工作日，办公室氛围紧绷。一早到岗，OA弹出全员紧急通知。'},{type:'bold',text:'【全员临时短会｜十分钟到场，无请假】'},{type:'dialogue',text:'刘伟："一大早就突击拉满KPI强度，不用想，今天铁定要背阶段性大锅。"'},{type:'dialogue',text:'张野："风向变了，要洗牌。"'},{type:'dialogue',text:'陈默："昨天俩人关着门聊了四十分钟，今天就火速开会改规则。说白了，上面早就串通好了，今天就是专门来拿捏新人的。"'}],choices:[{label:'顺手帮李姐整理好桌上散落的会议资料',nextScene:'ch3_branch1a'},{label:'趁会前空档，给一直熬夜加班的陈默带一杯热饮',nextScene:'ch3_branch1b'}]},
ch3_branch1a:{tag:'【分支·帮李姐】',blocks:[{type:'narration',text:'你顺手帮李姐整理好散落的会议资料。李姐点头道谢，压低声音提了一句。'},{type:'dialogue',text:'李姐："今天会上别主动输出、别接话茬，现在公司风向诡异，很容易被抓典型背锅。"'}],choices:[{label:'__auto__',nextScene:'ch3_merge1'}]},
ch3_branch1b:{tag:'【分支·给陈默带热饮】',blocks:[{type:'narration',text:'你趁会前空档给陈默带了杯热饮。她接过去，看了一眼，嘴角微动。'},{type:'dialogue',text:'陈默："哟，反应挺快。这是提前嗅到风声、知道今天要挨针对，特意来我这攒点保命buff？"'}],choices:[{label:'__auto__',nextScene:'ch3_merge1'}]},
ch3_merge1:{tag:'【汇合·全员短会】',blocks:[{type:'narration',text:'全员到场，孙总首次正面亮相。孙总当众宣布，本次新人考核评审启用公司轮岗评委池，取消部门自评权限。投屏公示新评委名单——三名评委均为孙总直属、竞品部门人员，仅周姐保留原有评审席位。'},{type:'dialogue',text:'孙总："规则公开透明，结果以评审数据为准，请各位新人认真对待考核。"'},{type:'narration',text:'十分钟短会结束。散会时，孙总路过你的工位，看了一眼桌角便利贴，淡淡一笑，随即离开。走廊转角，王总与你擦肩而过，低声提醒。'},{type:'dialogue',text:'王总："评委全换血，物料全部留底，周姐是你唯一的突破口。"'},{type:'narration',text:'你返回工位，OA同步更新公示，你截图保存。'},{type:'thought',text:'获得道具：评委组调整OA公示截图（主线核心凭证）'}],choices:[{label:'__auto__',nextScene:'ch3_scene2'}]},
ch3_scene2:{tag:'【互动2·评分争议触发】',blocks:[{type:'narration',text:'会议结束半小时，赵东升走到工位过道，当众对你作出评价。'},{type:'dialogue',text:'赵东升："入职三天适配度不足、协同配合被动，工作主观能动性欠缺。考核窗口期在即，这种工作状态，很难通过评审闭环。"'},{type:'narration',text:'不等你开口，隔壁工位的陈默停下工作，侧身接话。'},{type:'dialogue',text:'陈默："这话就有点双标了吧。新人全程守规矩避红线，半点错没出。反倒是有人三番五次塞涉密跨部门的活儿过来，摆明了是挖坑。老老实实避险被挑态度问题，那故意给新人递雷，算什么？"'},{type:'narration',text:'你出声道谢。'},{type:'dialogue',text:'陈默："别脑补人情戏。你掉链子被优化，手上的烂摊子全要我们接，纯属全员承压。"'}],choices:[{label:'__auto__',nextScene:'ch3_scene3'}]},
ch3_scene3:{tag:'【互动3·午休施压分支】',blocks:[{type:'narration',text:'午休前，赵东升单独找到你。'}],itemCheck:{itemId:'negative_photo',prompt:'检测到负面伏笔：【赵东升持有翻阅违规文件照片】',description:'赵东升拿出留存的抓拍照片，以此威胁你乖乖听话。',useLabel:'面对威胁——见招拆招',skipLabel:'继续',useScene:'ch3_threat_photo',skipScene:'ch3_threat_none'},choices:[{label:'__auto__',nextScene:'ch3_threat_none'}]},
ch3_threat_photo:{tag:'【分支·有违规伏笔】',blocks:[{type:'narration',text:'赵东升拿出留存的抓拍照片，低声威胁。'},{type:'dialogue',text:'赵东升："你私自翻阅涉密文件的记录我已经留档了。新评委组都是自己人，想给你打差评、判不合格，就是一句话的事。想安稳转正，后面乖乖听话、配合工作。"'}],choices:[{label:'__auto__',nextScene:'ch3_scene4'}]},
ch3_threat_none:{tag:'【分支·无违规伏笔】',blocks:[{type:'narration',text:'赵东升拿最新考核标准施压，刻意刁难。'},{type:'dialogue',text:'赵东升："现在评审规则彻底倾斜，你们部门没人能替你背书。后续考核细则我主导把控，不想提前出局，就别搞个人主义、服从安排。"'}],choices:[{label:'__auto__',nextScene:'ch3_scene4'}]},
ch3_scene4:{tag:'【互动4·道具消耗自证】',blocks:[{type:'narration',text:'面对赵东升的威胁，你可以消耗第二章留存道具自证清白、化解危机。'}],itemCheck:{itemId:'monitor_record',prompt:'检测到可用道具：【完整转交文件监控时间记录】',description:'证明全程合规移交，无私自翻阅行为。使用后道具将被消耗。',useLabel:'① 出示监控时间记录——证明全程合规移交',skipLabel:'暂不使用——看其他选项',useScene:'ch3_use_monitor',skipScene:'ch3_choice2'},choices:[{label:'出示监控时间记录，证明全程合规',nextScene:'ch3_use_monitor',consumeItem:'monitor_record'},{label:'出示保密标签照片，证明对方设坑',nextScene:'ch3_use_label',consumeItem:'security_label_photo'},{label:'出示涂改封皮文件，反向举证甩锅',nextScene:'ch3_use_cover',consumeItem:'tampered_cover'},{label:'暂不消耗道具，隐忍观望，留存后手',nextScene:'ch3_hold'}]},
ch3_choice2:{tag:null,blocks:[],itemCheck:{itemId:'security_label_photo',prompt:'检测到可用道具：【文件保密等级标签照片】',description:'证明文件本身禁止新人经手，对方刻意设坑。使用后道具将被消耗。',useLabel:'② 出示保密标签照片——证明文件禁止新人经手',skipLabel:'暂不使用——看其他选项',useScene:'ch3_use_label',skipScene:'ch3_choice3'},choices:[{label:'出示保密标签照片，证明对方设坑',nextScene:'ch3_use_label',consumeItem:'security_label_photo'},{label:'出示涂改封皮文件，反向举证甩锅',nextScene:'ch3_use_cover',consumeItem:'tampered_cover'},{label:'暂不消耗道具，隐忍观望',nextScene:'ch3_hold'}]},
ch3_choice3:{tag:null,blocks:[],itemCheck:{itemId:'tampered_cover',prompt:'检测到可用道具：【涂改封皮项目文件】',description:'反向举证对方刻意提供问题文件，恶意甩锅。使用后道具将被消耗。',useLabel:'③ 出示涂改封皮——反向举证对方恶意甩锅',skipLabel:'暂不使用——隐忍留存',useScene:'ch3_use_cover',skipScene:'ch3_hold'},choices:[{label:'出示涂改封皮文件，反向举证甩锅',nextScene:'ch3_use_cover',consumeItem:'tampered_cover'},{label:'暂不消耗道具，隐忍观望',nextScene:'ch3_hold'}]},
ch3_use_monitor:{tag:'【道具使用·出示监控记录】',blocks:[{type:'narration',text:'你将完整转交文件监控时间记录摊在桌上。时间、地点、监控画面一应俱全。赵东升脸色变了。'},{type:'dialogue',text:'赵东升沉默片刻，收起照片，语气软了几分："……行，看来你做事确实谨慎。今天的事，当我没提。"'},{type:'thought',text:'道具消耗：完整转交文件监控时间记录（一次性证据）【已销毁】'}],choices:[{label:'__auto__',nextScene:'ch3_scene5'}]},
ch3_use_label:{tag:'【道具使用·出示保密标签】',blocks:[{type:'narration',text:'你亮出文件保密等级标签照片。你反问赵东升：一份标注着竞品部内部专用的涉密文件，为什么会被安排给项目部新人去取？赵东升哑口无言。'},{type:'dialogue',text:'赵东升："……文件的事是工作疏忽，改天再说。"'},{type:'narration',text:'他转身就走。陈默在隔壁工位轻轻鼓了两下掌。'},{type:'thought',text:'道具消耗：文件保密等级标签照片（一次性线索）【已销毁】'}],choices:[{label:'__auto__',nextScene:'ch3_scene5'}]},
ch3_use_cover:{tag:'【道具使用·出示涂改封皮】',blocks:[{type:'narration',text:'你将涂改封皮项目文件放在桌上，封皮边角涂改、重新粘贴的痕迹清晰可见。赵东升脸色铁青，一把抓起那份文件，转身快步离开了工位区。'},{type:'thought',text:'道具消耗：涂改封皮项目文件（一次性物证）【已销毁】'}],choices:[{label:'__auto__',nextScene:'ch3_scene5'}]},
ch3_hold:{tag:'【分支·隐忍留存】',blocks:[{type:'narration',text:'你选择暂不亮出底牌，保持沉默。赵东升见你没有反击，以为拿捏住了你，冷笑一声离开。但你知道——手里的证据还在，底牌留着，总有翻盘的时候。'},{type:'thought',text:'道具未消耗，全部留存。'}],choices:[{label:'__auto__',nextScene:'ch3_scene5'}]},
ch3_scene5:{tag:'【互动5·食堂同行选择】',blocks:[{type:'narration',text:'午休时间，食堂人来人往。'}],choices:[{label:'和刘伟同桌吃饭，听他吐槽公司内部八卦',nextScene:'ch3_branch5a',itemGain:'liuwei_gossip'},{label:'和张野同桌摸鱼，安静摆烂放松心态',nextScene:'ch3_branch5b'},{label:'独自打包带回工位，顺便给未吃饭的陈默带餐',nextScene:'ch3_branch5c'}]},
ch3_branch5a:{tag:'【分支·刘伟同桌】',blocks:[{type:'dialogue',text:'刘伟："你知道赵东升上周请孙总吃饭吗？就在楼下湘菜馆，两个人点了六个菜，吃到九点多。吃完饭没几天，评委组就全换成了孙总的人。你说巧不巧？"'},{type:'thought',text:'获得道具：刘伟内部闲谈情报（日常支线道具）'}],choices:[{label:'__auto__',nextScene:'ch3_scene6'}]},
ch3_branch5b:{tag:'【分支·张野同桌】',blocks:[{type:'narration',text:'张野耳机里全程播放纯轻音乐，你坐在他对面，两人默契地保持安静。他抬眼看了你一下，没说话，把桌上那碟小菜往你这边推了半寸。'}],choices:[{label:'__auto__',nextScene:'ch3_scene6'}]},
ch3_branch5c:{tag:'【分支·给陈默带餐】',blocks:[{type:'narration',text:'你独自打包带回工位，顺便多带了一份给陈默。她收到餐后愣了一下。'},{type:'dialogue',text:'陈默："临时补后手是吧。也行，今天这局面，多一层缓冲总没错。"'},{type:'narration',text:'陈默对你的好感大幅提升。'}],choices:[{label:'__auto__',nextScene:'ch3_scene6'}]},
ch3_scene6:{tag:'【互动6·下班前日常轻互动】',blocks:[{type:'narration',text:'临近下班，办公室节奏放缓。'}],choices:[{label:'同事借充电线，顺手帮忙',nextScene:'ch3_branch6a'},{label:'帮李姐整理归档今日会议资料',nextScene:'ch3_branch6b',itemGain:'lijie_checklist'},{label:'跟着张野摸鱼划水，短暂摆烂放松',nextScene:'ch3_branch6c'}]},
ch3_branch6a:{tag:'【分支·顺手帮忙】',blocks:[{type:'narration',text:'同事借充电线，你顺手递过去。小事一桩，但积少成多——全员微好感累积。'}],choices:[{label:'__auto__',nextScene:'ch3_merge_end'}]},
ch3_branch6b:{tag:'【分支·帮李姐归档】',blocks:[{type:'narration',text:'你帮李姐整理归档今日会议资料。她翻了几页，从抽屉里拿出一份打印好的清单递给你。'},{type:'dialogue',text:'李姐："就是些实战总结的排坑经验，不违规、不站队，你自己参考着规避风险。"'},{type:'thought',text:'获得道具：李姐的评分应对清单（日常支线道具）'}],choices:[{label:'__auto__',nextScene:'ch3_merge_end'}]},
ch3_branch6c:{tag:'【分支·跟张野摸鱼】',blocks:[{type:'narration',text:'你跟着张野摸鱼划水，两人默契保持安静，谁也没说话。短暂的放空让紧绷的神经松了半寸。'}],choices:[{label:'__auto__',nextScene:'ch3_merge_end'}]},
ch3_merge_end:{tag:'【场景·下班前】',blocks:[{type:'narration',text:'临近下班，陈默撕下一张便利贴，贴在你的显示器侧边。'},{type:'dialogue',text:'陈默："今天评委会全员换血只是新手村教学关。赵东升手里捏着你那张照片还没往外掏，不是发善心，是留着当定时炸弹等关键时刻引爆。接下来考核别再给他送素材，你那几个保命道具别乱交，留到大boss登场再开。"'},{type:'narration',text:'走廊深处，那件无人认领的工装依旧静静摆放，伏笔持续留存。'}],choices:[{label:'__auto__',nextScene:'__end__'}]},

// ===== 第四章·首轮考核 =====
ch4_scene1:{tag:'【开场衔接｜早8:50 工位】',blocks:[{type:'narration',text:'入职第四天，公司首轮新人转正考核正式启动，项目部本次仅有你一名新人参与评级。一早工位坐定，部门早会准时召开，公示本次考核最终评分细则与权重占比。'},{type:'dialogue',text:'刘伟："这规矩看着面面俱到，其实贼坑！明摆着挑软柿子捏，专门逮着不好做的地方卡人。"'},{type:'dialogue',text:'张野："规矩双标。"'},{type:'dialogue',text:'陈默："表面标准统一，背地里调整评判阈值，说白了就是人为制造偏差，定向压低我们的分数。"'}],choices:[{label:'顺手帮李姐整理考核台账模板',nextScene:'ch4_branch1a'},{label:'帮刘伟核对一遍基础数据，规避低级失误',nextScene:'ch4_branch1b'}]},
ch4_branch1a:{tag:'【分支·帮李姐】',blocks:[{type:'narration',text:'你顺手帮李姐整理考核台账模板。她点头致意，没多说话——但这份默契，她记下了。'}],choices:[{label:'__auto__',nextScene:'ch4_merge1'}]},
ch4_branch1b:{tag:'【分支·帮刘伟】',blocks:[{type:'narration',text:'你帮刘伟逐格核对基础数据，揪出两个公式引用错位。刘伟松了口气："还好你看了一眼，不然这锅又是我背。"'}],choices:[{label:'__auto__',nextScene:'ch4_merge1'}]},
ch4_merge1:{tag:'【段落衔接·评分公示】',blocks:[{type:'narration',text:'早会结束，OA准时推送本轮新人考核评分结果。公示页面清晰显示：评委打分完毕，流程终审节点标注——【已审核：孙】。孙总全程未露面，存在感却贯穿整场考核。'},{type:'narration',text:'单项「跨部门协同效率」评分栏，落差极其刺眼。'},{type:'dialogue',text:'赵东升打分：58分，评语——"从后台数据来看，项目部本次参评新人跨部门响应效率偏低，主观配合积极性不足。"'},{type:'dialogue',text:'周姐打分：72分，评语——"系统流程节点齐全，无违规延误记录，按平台标准判定合格。"'},{type:'narration',text:'一严一稳，一主观一规章，两个分数直接撕开本次评分的刻意性。'}],choices:[{label:'__auto__',nextScene:'ch4_scene2'}]},
ch4_scene2:{tag:'【互动2·评分争议触发】',blocks:[{type:'narration',text:'工位区氛围瞬间紧绷，赵东升的针对性打分直指你此前拒绝违规甩锅文件的行为。'}],choices:[{label:'沉默观望，留存证据不主动出头',nextScene:'ch4_branch2a'},{label:'适度开口，询问评分数据口径差异',nextScene:'ch4_branch2b'}]},
ch4_branch2a:{tag:'【分支·沉默观望】',blocks:[{type:'narration',text:'你没有出声，静静截图留存两份评分差异记录。赵东升见你沉默，默认你无力反驳，神态更坦然，顺势准备结束本次评分公示。'}],choices:[{label:'__auto__',nextScene:'ch4_merge2'}]},
ch4_branch2b:{tag:'【分支·适度开口】',blocks:[{type:'narration',text:'你当众轻声提问："同一项协同效率，两位评委的判定依据不一样，请问本轮考核，最终以哪一套标准为准？"这句提问不激进、不抬杠，却精准卡住规则漏洞。赵东升脸色微僵，一时无法圆场。'}],choices:[{label:'__auto__',nextScene:'ch4_merge2'}]},
ch4_merge2:{tag:'【汇合·陈默拆台】',blocks:[{type:'narration',text:'不等局面继续僵持，陈默率先起身，公开对评分口径提出质疑。'},{type:'dialogue',text:'陈默："扣分依据是人工填报时间，和系统存档记录对不上。靠手动改数据扣分，本身就站不住脚。"'},{type:'dialogue',text:'赵东升依旧维持体面姿态："本次评分规则全员通用，后台数据公开透明，不存在定向针对。"'}],choices:[{label:'__auto__',nextScene:'ch4_scene3'}]},
ch4_scene3:{tag:'【互动3·道具消耗对峙】',blocks:[{type:'narration',text:'面对不公评分与官方搪塞，你可消耗往期道具，强化己方立场、坐实针对性打分。'}],itemCheck:{itemId:'monitor_record',prompt:'检测到可用道具：【完整转交文件监控时间记录】',description:'证明全程合规履职，无配合滞后问题。使用后道具将被消耗。',useLabel:'① 出示监控记录——证明全程合规履职',skipLabel:'暂不使用——看其他选项',useScene:'ch4_use_monitor',skipScene:'ch4_choice2'},choices:[{label:'出示监控记录，证明全程合规',nextScene:'ch4_use_monitor',consumeItem:'monitor_record'},{label:'出示评委组OA截图，佐证评委不中立',nextScene:'ch4_use_judge',consumeItem:'oa_judge_panel'},{label:'播放会议重点录音，形成行为反差',nextScene:'ch4_use_recording',consumeItem:'meeting_recording'},{label:'暂不消耗道具，隐忍留存后手',nextScene:'ch4_hold'}]},
ch4_choice2:{tag:null,blocks:[],itemCheck:{itemId:'oa_judge_panel',prompt:'检测到可用道具：【评委组调整OA公示截图】',description:'佐证评委构成不中立。使用后道具将被消耗。',useLabel:'② 出示评委组截图——佐证评委构成不中立',skipLabel:'暂不使用——看其他选项',useScene:'ch4_use_judge',skipScene:'ch4_choice3'},choices:[{label:'出示评委组OA截图，佐证评委不中立',nextScene:'ch4_use_judge',consumeItem:'oa_judge_panel'},{label:'播放会议重点录音，形成行为反差',nextScene:'ch4_use_recording',consumeItem:'meeting_recording'},{label:'暂不消耗道具，隐忍留存后手',nextScene:'ch4_hold'}]},
ch4_choice3:{tag:null,blocks:[],itemCheck:{itemId:'meeting_recording',prompt:'检测到可用道具：【会议重点录音】',description:'对比赵东升此前"公平公正各凭本事"的公开言论，形成行为反差。',useLabel:'③ 播放会议录音——对比公开言论形成反差',skipLabel:'暂不使用——隐忍留存',useScene:'ch4_use_recording',skipScene:'ch4_hold'},choices:[{label:'播放会议重点录音，形成行为反差',nextScene:'ch4_use_recording',consumeItem:'meeting_recording'},{label:'暂不消耗道具，隐忍留存后手',nextScene:'ch4_hold'}]},
ch4_use_monitor:{tag:'【道具使用·出示监控记录】',blocks:[{type:'narration',text:'你将完整转交文件监控时间记录投屏展示。时间轴清晰标注：你在工位监控可视范围内全程未触碰文件内页。'},{type:'dialogue',text:'陈默顺势接话："后台数据不是公开透明吗？这份监控记录正好说明——新人的协同效率没有任何滞后，扣分依据站不住脚。"'},{type:'dialogue',text:'赵东升沉默半晌，语气明显收敛："……本次评分以系统数据为准，如有异议，后续可以走申诉流程。"'},{type:'thought',text:'道具消耗：完整转交文件监控时间记录（一次性证据）【已销毁】'}],choices:[{label:'__auto__',nextScene:'ch4_merge3'}]},
ch4_use_judge:{tag:'【道具使用·出示评委组截图】',blocks:[{type:'narration',text:'你亮出评委组调整OA公示截图——三名评委均为孙总直属竞品部门人员，仅周姐保留原有评审席位。'},{type:'dialogue',text:'周姐看着截图，淡淡补了一句："评委名单确实是临时调整过的。这个流程我建议完整留档。"'},{type:'narration',text:'赵东升的笑容彻底挂不住了。'},{type:'thought',text:'道具消耗：评委组调整OA公示截图（一次性线索）【已销毁】'}],choices:[{label:'__auto__',nextScene:'ch4_merge3'}]},
ch4_use_recording:{tag:'【道具使用·播放会议录音】',blocks:[{type:'narration',text:'你将会议重点录音公开播放。孙总那句"规则公开透明，结果以评审数据为准"回荡在工位区。一边是公开承诺的公平竞争，一边是58分与72分的巨大落差。赵东升一言不发，脸色铁青。'},{type:'thought',text:'道具消耗：会议重点录音（一次性证据）【已销毁】'}],choices:[{label:'__auto__',nextScene:'ch4_merge3'}]},
ch4_hold:{tag:'【分支·隐忍留存】',blocks:[{type:'narration',text:'你选择暂不亮出底牌。赵东升见你没有当场反击，以为这次评分争议就此揭过。但你知道——手里的证据还在，底牌留着，总有翻盘的时候。'}],choices:[{label:'__auto__',nextScene:'ch4_merge3'}]},
ch4_merge3:{tag:'【段落衔接·王总批注】',blocks:[{type:'narration',text:'评分争议发酵后，OA流程后台同步更新一条批注。'},{type:'bold',text:'【流程批注：请评委会完整留存原始评分依据、填报记录、系统节点日志，全程备查。】'},{type:'narration',text:'这是王总无声的动作，不站队、不表态，只强行锁死留底通道。'},{type:'thought',text:'获得道具：王总流程批注备查记录（高层伏笔道具）'}],choices:[{label:'__auto__',nextScene:'ch4_scene4'}]},
ch4_scene4:{tag:'【互动4·午休日常抉择】',blocks:[{type:'narration',text:'午休前夕，办公室氛围稍缓。'}],choices:[{label:'和刘伟食堂拼桌，听他吐槽考核细则',nextScene:'ch4_branch4a'},{label:'偶遇李姐，接收她私下整理的评分应对清单',nextScene:'ch4_branch4b',itemGain:'lijie_checklist'},{label:'给全程伏案工作的陈默顺带带一份午餐',nextScene:'ch4_branch4c'}]},
ch4_branch4a:{tag:'【分支·刘伟拼桌】',blocks:[{type:'dialogue',text:'刘伟一边干饭一边小声坦言："我胆子小不敢硬刚，但我对数据敏感，后续的考核报表我帮你逐行核验，杜绝疏漏误判。"'}],choices:[{label:'__auto__',nextScene:'ch4_scene5'}]},
ch4_branch4b:{tag:'【分支·偶遇李姐】',blocks:[{type:'dialogue',text:'李姐悄悄将文档发给你，语气平和稳妥："就是些实战总结的排坑经验，不违规、不站队。别外传——传出去李姐就不是李姐了，是李叛徒。"'},{type:'thought',text:'获得道具：李姐的评分应对清单'}],choices:[{label:'__auto__',nextScene:'ch4_scene5'}]},
ch4_branch4c:{tag:'【分支·给陈默带餐】',blocks:[{type:'dialogue',text:'陈默抬眼瞥了一眼餐食，随口一句轻调侃，默默收下："临时补后手是吧。也行，今天这局面，多一层缓冲总没错。"'}],choices:[{label:'__auto__',nextScene:'ch4_scene5'}]},
ch4_scene5:{tag:'【互动5·下午茶轻互动】',blocks:[{type:'narration',text:'午后的办公室节奏放缓。'}],choices:[{label:'帮同事顺带带下午茶，积累全员微好感',nextScene:'ch4_branch5a'},{label:'留守工位整理考核日志，主动补齐细节台账',nextScene:'ch4_branch5b'},{label:'茶水间短暂摸鱼，松弛调整状态',nextScene:'ch4_branch5c'}]},
ch4_branch5a:{tag:'【分支·帮带下午茶】',blocks:[{type:'narration',text:'你顺手帮办公室几位同事带了饮品。小事虽不起眼，但全员微好感小幅上涨。'}],choices:[{label:'__auto__',nextScene:'ch4_merge_end'}]},
ch4_branch5b:{tag:'【分支·留守整理台账】',blocks:[{type:'narration',text:'你没有跟风摸鱼，留在工位逐条复盘今日考核流程、补全日志细节。李姐默默记下你的稳重心性。'}],choices:[{label:'__auto__',nextScene:'ch4_merge_end'}]},
ch4_branch5c:{tag:'【分支·茶水间摸鱼】',blocks:[{type:'narration',text:'你短暂离开紧绷的工位，去茶水间放空调整状态。偶遇独自抽烟的张野，两人默契保持安静。'}],choices:[{label:'__auto__',nextScene:'ch4_merge_end'}]},
ch4_merge_end:{tag:'【汇合·下班前】',blocks:[{type:'narration',text:'临近下班，OA再次推送更新，本轮所有评分数据、评委批注全部归档锁定。你截图留存关键页面。'},{type:'thought',text:'获得道具：第一轮评分结果OA截图（主线核心凭证）'},{type:'thought',text:'获得道具：双评委打分对比记录（破局关键线索）'},{type:'narration',text:'赵东升下班前路过你工位，眼神停顿片刻，无声施压。走廊深处，那件无人认领的工装依旧静静摆放。'}],choices:[{label:'__auto__',nextScene:'__end__'}]},

// ===== 第五章·流程陷阱 =====
ch5_scene1:{tag:'【开场衔接｜早8:45 工位】',blocks:[{type:'narration',text:'入职第五日，首轮考核后第一个工作日。一早到岗，OA弹出赵东升发来的加急跨部门协查单——「季度项目数据核验确认」，要求当日签字回传。流程页面留有关键暗线：孙总仅阅览、不批复、不表态。'},{type:'narration',text:'陈默路过工位，余光扫过屏幕，语气淡漠。'},{type:'dialogue',text:'陈默："表格是废弃V2旧版，定稿归档为V3。你签V2，他拿V3去报销，差额你自己想。"'}],choices:[{label:'申诉履约率：用锁单证据证明扣分属于外部干预',nextScene:'ch5_branch1a'},{label:'替换评分项：找周姐用财务流程评价替代协同低分',nextScene:'ch5_branch1b'}]},
ch5_branch1a:{tag:'【分支·申诉履约异常】',blocks:[{type:'narration',text:'你调出往期留存的流程台账与数据记录，提交系统申诉。系统临时标记：履约分数暂缓计入排名。'}],choices:[{label:'__auto__',nextScene:'ch5_merge1'}]},
ch5_branch1b:{tag:'【分支·对接财务替代评分】',blocks:[{type:'narration',text:'你前往财务工位找到周姐。'},{type:'dialogue',text:'周姐："财务流程评价可以纳入参考。但我只认白纸黑字的自查报告和完整数据，补齐我就签字。"'},{type:'narration',text:'你返回工位，发现张野已经默默整理好全月财务台账，直接推到你桌面。'},{type:'dialogue',text:'张野："下次自己整理。别指望我次次兜底。"'}],choices:[{label:'__auto__',nextScene:'ch5_merge1'}]},
ch5_merge1:{tag:'【汇合】',blocks:[{type:'narration',text:'你快速核对系统台账，确认核心结算数据被恶意篡改。刘伟主动上前协助核验。'},{type:'dialogue',text:'刘伟："我帮你对原版数据！我不敢硬刚，但核对绝对没问题。"'},{type:'dialogue',text:'刘伟："数据确实改了，就是专门针对我们。"'}],choices:[{label:'__auto__',nextScene:'ch5_scene2'}]},
ch5_scene2:{tag:'【互动2·流程陷阱破局】',blocks:[{type:'narration',text:'面对赵东升精心布置的流程陷阱，你选择如何应对？'}],itemCheck:{itemId:'dual_score_compare',prompt:'检测到可用道具：【双评委打分对比记录】',description:'联动往期数据台账举证，可直接推翻对方"无意失误"的说辞。使用后道具将被消耗。',useLabel:'使用道具——正面举证破除疏忽说辞',skipLabel:'暂不使用——走隐忍路线',useScene:'ch5_branch_item',skipScene:'ch5_interact2'},choices:[{label:'留证质询·正面破局：固定证据，线上举证',nextScene:'ch5_branch2a'},{label:'静默搁置·隐忍避坑：留存证据，拖延拒签',nextScene:'ch5_branch2b'}]},
ch5_branch_item:{tag:'【道具使用·正面举证】',blocks:[{type:'narration',text:'你第一时间截图留存全套证据，私信赵东升指出版本漏洞。'},{type:'dialogue',text:'赵东升："只是上传手滑选错版本，小疏忽而已，你先签字，我后续补发正确数据。"'},{type:'narration',text:'你消耗道具【双评委打分对比记录】，联动往期数据台账举证，直接推翻对方说辞。证据闭环无懈可击，赵东升只能撤回问题单据，重新上传正版V3数据文件。'},{type:'thought',text:'道具消耗：双评委打分对比记录（一次性证据）【已销毁】'}],choices:[{label:'__auto__',nextScene:'ch5_merge2'}]},
ch5_interact2:{tag:null,blocks:[],choices:[{label:'留证质询·正面破局',nextScene:'ch5_branch2a'},{label:'静默搁置·隐忍避坑',nextScene:'ch5_branch2b'}]},
ch5_branch2a:{tag:'【分支·留证质询】',blocks:[{type:'narration',text:'你第一时间截图留存全套证据，私信赵东升指出版本漏洞。举证充分，赵东升无法辩驳，只能撤回问题单据。'}],choices:[{label:'__auto__',nextScene:'ch5_merge2'}]},
ch5_branch2b:{tag:'【分支·静默搁置】',blocks:[{type:'narration',text:'你看破陷阱不动声色，快速归档全套证据，选择搁置单据、拒不签字。下午赵东升专程催单，你以附件加载异常为由持续拖延，完美避开陷阱。'}],choices:[{label:'__auto__',nextScene:'ch5_merge2'}]},
ch5_merge2:{tag:'【汇合】',blocks:[{type:'narration',text:'赵东升精心布设的隐蔽埋线陷阱彻底失效。午休返岗，陈默扫过你留存的全套证据，一语冷透本质。'},{type:'dialogue',text:'陈默："他没本事挖这种细活。挖坑挖得这么细，不像赵东升的手艺。他就一条狗，狗往前扑是因为主人松了绳子。"'}],choices:[{label:'__auto__',nextScene:'ch5_scene3'}]},
ch5_scene3:{tag:'【互动3·午休休整方式】',blocks:[{type:'narration',text:'午休时段，紧绷一上午的神经终于可以短暂松弛。'}],choices:[{label:'随同刘伟、张野食堂就餐',nextScene:'ch5_branch3a'},{label:'独自天台透气',nextScene:'ch5_branch3b',itemGain:'wang_rooftop_hint'}]},
ch5_branch3a:{tag:'【分支·食堂团队小憩】',blocks:[{type:'dialogue',text:'张野："改痕。基础操作。再问收费。"'},{type:'narration',text:'项目部全员疏离状态消解，无声协作的团队默契初步成型。'}],choices:[{label:'__auto__',nextScene:'ch5_merge3'}]},
ch5_branch3b:{tag:'【分支·天台独处】',blocks:[{type:'narration',text:'你独自上天台透气，偶遇王总。对方无多余寒暄，仅吐出三字关键提示便转身离开。'},{type:'dialogue',text:'王总："版本号。"'},{type:'thought',text:'获得道具：王总天台关键词提示记录（高层暗线伏笔）'}],choices:[{label:'__auto__',nextScene:'ch5_merge3'}]},
ch5_merge3:{tag:'【汇合】',blocks:[{type:'narration',text:'午休归岗，李姐简短提点，告知数据篡改是赵东升惯用打压手段。'},{type:'dialogue',text:'李姐："这清单你自己看就行，别外传——传出去李姐就不是李姐了，是李叛徒。"'}],choices:[{label:'__auto__',nextScene:'ch5_scene4'}]},
ch5_scene4:{tag:'【互动4·下午茶轻互动】',blocks:[{type:'narration',text:'午后的办公室节奏放缓。'}],choices:[{label:'帮同事顺带带下午茶',nextScene:'ch5_branch4a'},{label:'留守工位整理考核日志',nextScene:'ch5_branch4b'},{label:'茶水间短暂摸鱼',nextScene:'ch5_branch4c'}]},
ch5_branch4a:{tag:'【分支·帮带下午茶】',blocks:[{type:'narration',text:'你顺手帮办公室几位同事带了饮品。全员微好感小幅上涨。'}],choices:[{label:'__auto__',nextScene:'ch5_chapter_end'}]},
ch5_branch4b:{tag:'【分支·留守整理台账】',blocks:[{type:'narration',text:'你逐条复盘今日流程、补全日志细节。李姐默默记下你的稳重心性。'}],choices:[{label:'__auto__',nextScene:'ch5_chapter_end'}]},
ch5_branch4c:{tag:'【分支·茶水间摸鱼】',blocks:[{type:'narration',text:'偶遇独自抽烟的张野，两人默契保持安静。'}],choices:[{label:'__auto__',nextScene:'ch5_chapter_end'}]},
ch5_chapter_end:{tag:'【第五章·结束】',blocks:[{type:'narration',text:'午后工作全程低调平稳。临近下班，OA流程更新——赵东升撤回问题单据、补发正版文件。但孙总阅览节点永久留存。一份看似普通的协查文件，竟被层层包装成版本陷阱。'},{type:'narration',text:'走廊深处，那件无人认领的工装依旧静静悬挂。'}],choices:[{label:'__auto__',nextScene:'__end__'}]},

// ===== 第六章·限时锁单 =====
ch6_scene1:{tag:'【早间突发·全员死局】',blocks:[{type:'narration',text:'清晨到岗，OA全屏弹出红色倒计时。项目部全员工单被锁，红字醒目：超时自动判定履约延误。'},{type:'timer',text:'倒计时：01:29:47'},{type:'dialogue',text:'赵东升刚好现身工位门口，语气平淡得刻意："下周编制优化，孙总定的规则，优先清掉有履约延误的部门。"'},{type:'timer',text:'倒计时跳至01:28:14'},{type:'dialogue',text:'陈默瘫在工位上扫了眼屏幕："中层没这权限，纯属高层拿捏基层找乐子。不想背锅就找王总，也就他不掺和这套烂规矩。"'}],choices:[{label:'让李姐联系IT，确认能否远程解锁',nextScene:'ch6_branch1a'},{label:'自己翻OA后台，核查锁单操作日志',nextScene:'ch6_branch1b',itemGain:'admin_log_record'}]},
ch6_branch1a:{tag:'【分支·李姐联系IT】',blocks:[{type:'dialogue',text:'IT："不是系统故障，人为后台锁单，权限级别为副总级，我们基层运维没有任何操作权限。"'},{type:'timer',text:'倒计时更新：01:25:02'}],choices:[{label:'__auto__',nextScene:'ch6_merge1'}]},
ch6_branch1b:{tag:'【分支·自查日志】',blocks:[{type:'narration',text:'你快速切入OA后台操作日志，查到本次锁单操作人为系统管理员，操作时间戳为昨晚23:47。'},{type:'timer',text:'倒计时更新：01:24:31'},{type:'thought',text:'获得道具：系统管理员操作日志查询记录'}],choices:[{label:'__auto__',nextScene:'ch6_merge1'}]},
ch6_merge1:{tag:'【汇合】',blocks:[{type:'dialogue',text:'陈默："找他纯浪费时间，权限不够，啥用没有。"'},{type:'timer',text:'倒计时无情跳动：01:23:05'}],choices:[{label:'__auto__',nextScene:'ch6_scene2'}]},
ch6_scene2:{tag:'【互动2·破局方向】',blocks:[{type:'timer',text:'倒计时：01:22:48'}],choices:[{label:'听刘伟的，去找赵东升碰碰运气',nextScene:'ch6_branch2a'},{label:'听陈默的，直接去找王总破局',nextScene:'ch6_branch2b'}]},
ch6_branch2a:{tag:'【分支·找赵东升】',blocks:[{type:'narration',text:'你找到赵东升，对方假意安抚，推脱自身权限不足，实则刻意拖延时间。'},{type:'timer',text:'倒计时直接跳至01:08:22'}],choices:[{label:'__auto__',nextScene:'ch6_branch2b'}]},
ch6_branch2b:{tag:'【分支·找王总】',blocks:[{type:'narration',text:'你直奔高层办公区，王总工位空无一人。电脑处于开机状态，桌上茶杯还冒着热气。'},{type:'timer',text:'倒计时：01:07:51'}],choices:[{label:'__auto__',nextScene:'ch6_scene3'}]},
ch6_scene3:{tag:'【互动3·寻人抉择】',blocks:[{type:'timer',text:'倒计时：01:07:51'}],choices:[{label:'去天台找——日常透气点位',nextScene:'ch6_branch3a'},{label:'去茶水间找——时段高频点位',nextScene:'ch6_branch3b'},{label:'直接拨打手机联系',nextScene:'ch6_branch3c'}]},
ch6_branch3a:{tag:'【分支·天台寻找】',blocks:[{type:'narration',text:'你推开天台大门，王总站在栏杆边静静伫立。'},{type:'dialogue',text:'王总："锁单的事？"'},{type:'timer',text:'倒计时更新：01:02:30'}],choices:[{label:'__auto__',nextScene:'ch6_merge3'}]},
ch6_branch3b:{tag:'【分支·茶水间寻找】',blocks:[{type:'narration',text:'你横穿办公区赶往茶水间，正要折返，王总端着茶杯从走廊拐角走出。'},{type:'timer',text:'倒计时更新：00:57:18'}],choices:[{label:'__auto__',nextScene:'ch6_merge3'}]},
ch6_branch3c:{tag:'【分支·电话联系】',blocks:[{type:'narration',text:'你拨通王总手机号，响铃五声无人接听。五分钟后，手机回拨。'},{type:'dialogue',text:'王总："刚才在和孙总通话，有事直说。"'},{type:'timer',text:'倒计时大幅下跌：00:52:40'}],choices:[{label:'__auto__',nextScene:'ch6_merge3'}]},
ch6_merge3:{tag:'【汇合·王总办公室】',blocks:[{type:'narration',text:'王总端坐办公桌后，安静听完你对锁单危机的完整叙述。'},{type:'dialogue',text:'王总："我可以帮你解锁。但你怎么保证下次不会被人针对性锁单？"'}],choices:[{label:'__auto__',nextScene:'ch6_scene4'}]},
ch6_scene4:{tag:'【互动4·王总提问】',blocks:[],choices:[{label:'应答：我会全程留证，让对方不敢轻易动手',nextScene:'ch6_branch4a'},{label:'应答：我增设流程双签，锁单需双人确认',nextScene:'ch6_branch4b'}]},
ch6_branch4a:{tag:'【分支·答留证】',blocks:[{type:'dialogue',text:'王总："他们根本不怕证据。你留再多记录，该锁照样锁。"'},{type:'timer',text:'倒计时再跳三分钟：00:49:15'}],choices:[{label:'重新选择有效方案',nextScene:'ch6_branch4b'}]},
ch6_branch4b:{tag:'【分支·答设防】',blocks:[{type:'dialogue',text:'王总："流程双签。可行。回去立刻落地落实。"'},{type:'narration',text:'他当场登录OA后台，录入专属审批密钥，下放临时解锁权限。'},{type:'dialogue',text:'王总："权限批好了。还差档案室合规核验单，上传后方可闭环留底。"'},{type:'timer',text:'倒计时更新：00:48:02'}],choices:[{label:'__auto__',nextScene:'ch6_scene5'}]},
ch6_scene5:{tag:'【互动5·核验单卡点】',blocks:[{type:'narration',text:'解锁权限到位，系统弹出最终限制：必须上传档案室合规核验单。'},{type:'timer',text:'倒计时：00:47:31'}],choices:[{label:'亲自跑档案室调取纸质版',nextScene:'ch6_branch5a'},{label:'找张野调取留存电子版',nextScene:'ch6_branch5b',itemGain:'verify_record'}]},
ch6_branch5a:{tag:'【分支·亲自跑档】',blocks:[{type:'narration',text:'你赶往档案室，管理员临时离岗。等候多时才找到对应核验单。'},{type:'timer',text:'倒计时仅剩：00:32:10'}],choices:[{label:'__auto__',nextScene:'ch6_scene6'}]},
ch6_branch5b:{tag:'【分支·张野调档】',blocks:[{type:'dialogue',text:'张野："上次归档留存过，发你了。"'},{type:'timer',text:'倒计时：00:43:51'},{type:'thought',text:'获得道具：档案室合规核验单归档记录'}],choices:[{label:'__auto__',nextScene:'ch6_scene6'}]},
ch6_scene6:{tag:'【互动6·最后生死三分钟】',blocks:[{type:'narration',text:'核验单成功上传，OA页面持续显示"处理中"，加载转圈三分钟毫无反应。'},{type:'timer',text:'倒计时无情跳动：00:03:02'}],choices:[{label:'原地干等，反复刷新页面',nextScene:'ch6_branch6a'},{label:'致电IT，申请手动刷新系统缓存',nextScene:'ch6_branch6b'}]},
ch6_branch6a:{tag:'【分支·原地干等】',blocks:[{type:'dialogue',text:'刘伟："十、九、八——"'},{type:'timer',text:'倒计时跳至00:00:07的瞬间，页面骤然刷新！'},{type:'narration',text:'全员工单同步解锁，绿色状态亮起。刘伟瘫坐在工位上，久久没能缓过神。'}],choices:[{label:'__auto__',nextScene:'ch6_chapter_end'}]},
ch6_branch6b:{tag:'【分支·电话加急】',blocks:[{type:'narration',text:'你立刻致电IT部门，运维远程手动刷新系统缓存，卡顿瞬间解除。'},{type:'timer',text:'倒计时定格在00:00:28，工单成功解锁！'},{type:'dialogue',text:'刘伟洗完脸折返工位，看着恢复正常的OA界面满脸错愕："解了？"'},{type:'dialogue',text:'张野："早解了。你白忙活一场。"'}],choices:[{label:'__auto__',nextScene:'ch6_chapter_end'}]},
ch6_chapter_end:{tag:'【危机落幕·暗潮再起】',blocks:[{type:'narration',text:'工位区陷入半分钟的安静。陈默起身路过你的工位，指尖轻敲显示器边框。'},{type:'dialogue',text:'陈默："别松气。锁工单是最没技术含量的操作。下一步直接卡编制踢人，规矩从来都是他们说了算。"'},{type:'narration',text:'你复盘OA后台消息栏，发现一条锁单期间自动生成、危机解除后紧急撤回的系统通知：履约延误预判通知。'},{type:'thought',text:'获得道具：履约延误预判通知截图'},{type:'narration',text:'你转头望向走廊，那件无人认领的工装悬在暗处，灯光映照下愈发刺眼。'}],choices:[{label:'__auto__',nextScene:'__end__'}]},

// ===== 第七章·编制红线 =====
ch7_scene1:{tag:'【早会公示·全员死线】',blocks:[{type:'narration',text:'晨间例会，OA全站弹窗更新公司文件——《季度部门编制优化考核方案》，孙总签发、全员公示、即时生效。本次裁评仅看三项硬性数据：人效比、履约率、跨部门协同评分。末位排名部门强制缩编。'},{type:'dialogue',text:'刘伟盯着屏幕低声苦笑："合着咱们三项全在及格线边缘，纯保底高危户。"'},{type:'narration',text:'页面底部弹出倒计时：48小时自证窗口期。'}],choices:[{label:'申诉履约率：用锁单证据证明扣分属于外部干预',nextScene:'ch7_branch1a'},{label:'替换评分项：找周姐用财务流程评价替代协同低分',nextScene:'ch7_branch1b'}]},
ch7_branch1a:{tag:'【分支·申诉履约异常】',blocks:[{type:'narration',text:'你调出第六章留存的OA工单锁屏截图、管理员操作日志，提交系统申诉。系统临时标记：履约分数暂缓计入排名。'}],choices:[{label:'__auto__',nextScene:'ch7_merge1'}]},
ch7_branch1b:{tag:'【分支·对接财务替代评分】',blocks:[{type:'narration',text:'你前往财务工位找到周姐。'},{type:'dialogue',text:'周姐："财务流程评价可以纳入参考。补齐自查报告和完整数据，我就签字。"'},{type:'narration',text:'张野已经默默整理好全月财务台账，推到你桌面。'},{type:'dialogue',text:'张野："下次自己整理。别指望我次次兜底。"'}],choices:[{label:'__auto__',nextScene:'ch7_merge1'}]},
ch7_merge1:{tag:'【汇合】',blocks:[{type:'narration',text:'首轮危机暂时松动，但人效比、排名劣势仍未解决。真正的打压，才刚刚落地。'}],choices:[{label:'__auto__',nextScene:'ch7_scene2'}]},
ch7_scene2:{tag:'【孙总巡场·阳谋落地】',blocks:[{type:'narration',text:'公示方案半小时后，孙总独自巡访项目部工位区。'},{type:'dialogue',text:'孙总："数据层面看，项目部人效还有优化空间。公司不是裁人，是让编制匹配产出。规则公开，机会均等。"'},{type:'narration',text:'你余光瞥见陈默全程低头敲键盘，屏幕界面是一页陌生的查询页面，数据快速滚动。'}],choices:[{label:'__auto__',nextScene:'ch7_scene2b'}]},
ch7_scene2b:{tag:'【互动2·直面孙总挖坑问话】',blocks:[{type:'dialogue',text:'孙总："项目部一直人少活多，你觉得，是编制配比不足的问题，还是团队执行效率的问题？"'}],choices:[{label:'客观作答：编制不足，人员配比跟不上业务体量',nextScene:'ch7_branch2a'},{label:'稳妥作答：双向可优化，优先补齐流程、提升产出效率',nextScene:'ch7_branch2b'}]},
ch7_branch2a:{tag:'【分支·直言编制问题】',blocks:[{type:'dialogue',text:'孙总："公司编制适配整体战略，不会单一迁就部门。有困难可以理解，但结果只看数据。"'}],choices:[{label:'__auto__',nextScene:'ch7_merge2'}]},
ch7_branch2b:{tag:'【分支·中庸稳妥作答】',blocks:[{type:'dialogue',text:'孙总："懂得顺势调整，是职场基本能力。规则公平，全员一视同仁。"'}],choices:[{label:'__auto__',nextScene:'ch7_merge2'}]},
ch7_merge2:{tag:'【汇合】',blocks:[{type:'dialogue',text:'刘伟低声点破："怪了，赵东升今天连个影子都没有。这说明啥？这次根本不是他组的局，是顶层直接定调。"'}],choices:[{label:'__auto__',nextScene:'ch7_scene3'}]},
ch7_scene3:{tag:'【互动3·补全自证核心材料】',blocks:[{type:'narration',text:'想要跳出末位淘汰名单，必须在48小时窗口期内拉高综合评分。'}],choices:[{label:'补录漏算产出，拉高部门人效比',nextScene:'ch7_branch3a',itemGain:'dept_selfcheck_report'},{label:'提交评分异议，申诉跨部门打分不公',nextScene:'ch7_branch3b'}]},
ch7_branch3a:{tag:'【分支·补录漏算数据】',blocks:[{type:'narration',text:'你翻阅往期工作流程台账，找出多笔系统未统计的落地项目记录，全部补入自查报告。人效比成功脱离垫底区间。'},{type:'thought',text:'获得道具：项目部自查补充报告'}],choices:[{label:'__auto__',nextScene:'ch7_merge3'}]},
ch7_branch3b:{tag:'【分支·申诉评分不公】',blocks:[{type:'narration',text:'你整理往期打分记录，明确竞品部打分权重过高、恶意压分的偏差问题，写入正式申诉材料。'}],choices:[{label:'__auto__',nextScene:'ch7_merge3'}]},
ch7_merge3:{tag:'【汇合】',blocks:[{type:'narration',text:'李姐默默走到你工位，放下一份加密文件。'},{type:'dialogue',text:'李姐："这是前几个季度的公开评分明细，不算违规内容。别谢，李姐什么都不知道。"'}],choices:[{label:'__auto__',nextScene:'ch7_scene4'}]},
ch7_scene4:{tag:'【午休插曲·陈默二次反常铺垫】',blocks:[{type:'narration',text:'午休时段，陈默独自起身去往茶水间，片刻后折返工位，手里空空如也，没有往常必喝的咖啡。'},{type:'dialogue',text:'刘伟："奇怪了，陈默今天不喝咖啡？这也太罕见了。"'},{type:'narration',text:'陈默充耳不闻，落座后继续沉默敲键，全程零交流。'}],choices:[{label:'__auto__',nextScene:'ch7_scene5'}]},
ch7_scene5:{tag:'【互动4·日常接梗调剂节奏】',blocks:[{type:'dialogue',text:'刘伟："这班上的，每天都在通关保命副本。"'}],choices:[{label:'顺势自嘲附和，轻松接梗',nextScene:'ch7_branch4a'},{label:'沉默专注工作，无视玩笑',nextScene:'ch7_branch4b'}]},
ch7_branch4a:{tag:'【分支·顺势接梗】',blocks:[{type:'narration',text:'你随口搭话附和，自嘲连日被动应对层层打压，工位区压抑氛围短暂缓和。'}],choices:[{label:'__auto__',nextScene:'ch7_merge4'}]},
ch7_branch4b:{tag:'【分支·静默专注】',blocks:[{type:'narration',text:'你选择低头核对数据，优先赶工完善材料。'}],choices:[{label:'__auto__',nextScene:'ch7_merge4'}]},
ch7_merge4:{tag:'【汇合】',blocks:[{type:'narration',text:'调剂过后，全员迅速收敛状态，默契分工、全力冲刺自证材料。'}],choices:[{label:'__auto__',nextScene:'ch7_scene6'}]},
ch7_scene6:{tag:'【互动5·陈默反常·暗流浮现】',blocks:[{type:'narration',text:'你整理申诉材料时，无意间翻到一份陌生流转单据：竞品部与外部公司的异常资金往来记录，挂靠在旧项目台账之中。'}],choices:[{label:'直接拿去问陈默核实线索',nextScene:'ch7_branch5a'},{label:'暂时归档留存，优先搞定本次自证',nextScene:'ch7_branch5b',itemGain:'abnormal_fund_record'}]},
ch7_branch5a:{tag:'【分支·主动询问】',blocks:[{type:'dialogue',text:'陈默："不知道，别问我。"'},{type:'narration',text:'语气冰冷短促，她直接戴上耳机，彻底终止对话，反常至极。'}],choices:[{label:'__auto__',nextScene:'ch7_merge5'}]},
ch7_branch5b:{tag:'【分支·静默存档】',blocks:[{type:'narration',text:'你选择将异常单据加密存档，暂时搁置疑点。'},{type:'thought',text:'获得道具：竞品部异常资金流转记录'},{type:'narration',text:'临近下班，你发现陈默工位早已空置。李姐随口提及，她今日提前离岗——入职以来，陈默从未早退。'}],choices:[{label:'__auto__',nextScene:'ch7_merge5'}]},
ch7_merge5:{tag:'【汇合·窗口期截止前夕】',blocks:[{type:'narration',text:'48小时自证窗口期仅剩最后两小时，全套申诉、补录材料已整理完毕。'}],choices:[{label:'__auto__',nextScene:'ch7_scene7'}]},
ch7_scene7:{tag:'【互动6·窗口期最终提交抉择】',blocks:[{type:'narration',text:'你手握留存道具，拥有最后一次补强机会。'}],itemCheck:{itemId:'wang_key_dialogue',prompt:'检测到可用道具：【王总关键对话记录】',description:'在材料末尾追加流程双签、事前设防的规则补充说明。使用后道具将被消耗。',useLabel:'使用道具——追加规则设防说明补强材料',skipLabel:'直接提交现有材料，稳妥闭环过关',useScene:'ch7_branch6b_item',skipScene:'ch7_branch6a'},choices:[{label:'直接提交现有材料，稳妥闭环过关',nextScene:'ch7_branch6a'},{label:'消耗王总关键对话记录，追加规则设防说明',nextScene:'ch7_branch6b',consumeItem:'wang_key_dialogue'}]},
ch7_branch6a:{tag:'【分支·稳妥提交】',blocks:[{type:'narration',text:'你按时上传全部自查报告与申诉数据，平稳完成自证闭环。'}],choices:[{label:'__auto__',nextScene:'ch7_chapter_end'}]},
ch7_branch6b_item:{tag:'【道具使用·追加设防说明】',blocks:[{type:'narration',text:'你消耗留存的王总关键对话记录，在材料末尾追加流程双签、事前设防的规则补充说明，进一步固化合规性。'},{type:'thought',text:'道具消耗：王总关键对话记录【已销毁】'}],choices:[{label:'__auto__',nextScene:'ch7_chapter_end'}]},
ch7_branch6b:{tag:'【分支·补强提交】',blocks:[{type:'narration',text:'你消耗留存的王总关键对话记录，在材料末尾追加流程双签、事前设防的规则补充说明。'},{type:'thought',text:'道具消耗：王总关键对话记录【已销毁】'}],choices:[{label:'__auto__',nextScene:'ch7_chapter_end'}]},
ch7_chapter_end:{tag:'【窗口期截止·危机缓冲落幕】',blocks:[{type:'narration',text:'48小时自证时限正式截止。OA更新最终排名公示：项目部移出末位淘汰名单，转入一月观察期。但你敏锐察觉异样，随手刷新OA后台权限端口——后台留存一份仅高阶权限可见、未发布的公告草稿：《部门考核规则修订意见》，落款人：孙总。你只来得及看清核心一行细则：取消部门自评申诉通道。'},{type:'thought',text:'获得道具：孙总规则修订未发布草稿'},{type:'narration',text:'这一刻你彻底明晰：你拼尽全力换来的活路，已经被孙总提前封死。下班熄灯前，陈默工位空空荡荡，只剩一张空白便利贴静置桌面；走廊深处，那件无人认领的旧工装依旧悬挂刺眼。'}],choices:[{label:'__auto__',nextScene:'__end__'}]},
// ===== 第八章·全盘施压 =====
ch8_scene1:{tag:'【早会官宣·生路彻底封死】',blocks:[{type:'narration',text:'清晨全员到岗，OA全站弹窗强制推送孙总签发新版考核条例，昨日后台草稿正式生效。三条新规逐条落地，直接作废第七章所有自救手段。'},{type:'bold',text:'① 取消部门所有自评、异议、申诉通道，评分以评审组终审为准'},{type:'bold',text:'② 重置评分权重，关闭部门互评，周姐财务评分替代通道彻底失效'},{type:'bold',text:'③ 新增应急响应时效考核，跨部门协查工单初核时限压缩至2小时，超时即扣分'},{type:'narration',text:'屏幕红字置顶：本年度考核规则动态迭代，以最新公示版本为准。全员紧盯屏幕，工位区气氛瞬间凝固。'},{type:'dialogue',text:'刘伟喉结滚动，低声吐槽："刚学会走路，路直接被刨没了。合着昨天白忙活一整宿。"'},{type:'narration',text:'众人唏嘘之际，唯独陈默只扫了屏幕一眼，面无表情关掉公告页面，继续敲键。'},{type:'dialogue',text:'刘伟："默姐，这新规你怎么看？咱们还有辙吗？"'},{type:'dialogue',text:'陈默："有什么好看的。规则是他们的，怎么改都一样——你申诉写得再漂亮，也追不上他改规则的速度。"'},{type:'narration',text:'语气平淡却透着反常的疲惫，没有往日的犀利预判，只剩近乎认命的清醒，一针扎破所有人的侥幸。'}],choices:[{label:'__auto__',nextScene:'ch8_scene2'}]},
ch8_scene2:{tag:'【互动1·首轮承压·工单分配抉择】',blocks:[{type:'narration',text:'新规落地第一小时，两张跨部门协查工单同步派发，全部标注2小时应急初核时限。人手紧缺，双线并行必然顾此失彼。'}],choices:[{label:'重心倾斜：保核心工单质量，暂缓次要工单',nextScene:'ch8_branch1a'},{label:'全员分摊：双线同步推进，保质不保满',nextScene:'ch8_branch1b'}]},
ch8_branch1a:{tag:'【分支·取舍保核】',blocks:[{type:'narration',text:'你果断取舍，集中全员精力攻坚核心工单，优先守住关键履约数据，次要工单延后处理。系统最终判定：核心工单满分通过，次要工单标注响应滞后，轻微扣分。'}],choices:[{label:'__auto__',nextScene:'ch8_merge1'}]},
ch8_branch1b:{tag:'【分支·全员分摊】',blocks:[{type:'narration',text:'你安排全员拆分工作量，双线并行赶工，两份工单均按时初核完毕。系统最终判定：时效达标，但细节校验存在疏漏，扣除少量质量分。'}],choices:[{label:'__auto__',nextScene:'ch8_merge1'}]},
ch8_merge1:{tag:'【汇合·赵东升首巡】',blocks:[{type:'narration',text:'首轮危机平稳扛住，无重大失分。刚落地喘息，赵东升直接现身工位区。他神态客气温和，却没有半分余地，往日的刻意伪装彻底褪去，只剩笃定的压迫感。'},{type:'dialogue',text:'赵东升："新规是孙总亲自敲定的，我也是刚同步到通知。你们抓紧适应节奏，后续所有考核全部按新版执行，别到时候说不清。"'},{type:'narration',text:'他不提针对、不提打压，但字字都在点明：项目部再无任何辩解、缓冲、翻盘的资格。说完转身离场，不留辩驳空间。'}],choices:[{label:'__auto__',nextScene:'ch8_scene3'}]},
ch8_scene3:{tag:'【偶遇周姐·中立人设闭环】',blocks:[{type:'narration',text:'你去往茶水间途中偶遇周姐，她脚步匆匆，神色平淡无波澜。瞥见你后，她停顿半秒，极简一句交代。'},{type:'dialogue',text:'周姐："规则更新了，财务评价不再纳入考核参考。后续按新规流程走。"'},{type:'narration',text:'不站队、不惋惜、不解释，始终恪守中立，彻底闭环唯一外部破局通道。'}],choices:[{label:'__auto__',nextScene:'ch8_scene4'}]},
ch8_scene4:{tag:'【互动2·高压抱团暖意】',blocks:[{type:'narration',text:'首轮施压过后，全员短暂休整。刘伟靠着椅背长长叹气，消解紧绷神经。'},{type:'dialogue',text:'刘伟："两小时时效已经要全速飞着干了，明天改成一个半小时，是打算让我们用意念交工？"'}],choices:[{label:'顺势宽慰，抱团扛压',nextScene:'ch8_branch2a'},{label:'静默沉淀，专注做事',nextScene:'ch8_branch2b'}]},
ch8_branch2a:{tag:'【分支·暖意抱团】',blocks:[{type:'narration',text:'你轻声宽慰众人，稳住军心，点明只要稳步扛住、不出纰漏，就还有余地。工位区紧绷的氛围稍稍松动。'}],choices:[{label:'__auto__',nextScene:'ch8_merge2'}]},
ch8_branch2b:{tag:'【分支·静默实干】',blocks:[{type:'narration',text:'你没有多余言语，低头复盘工单细节。众人见状也迅速收敛情绪，默默回归工位干活。'}],choices:[{label:'__auto__',nextScene:'ch8_merge2'}]},
ch8_merge2:{tag:'【汇合】',blocks:[{type:'narration',text:'短暂调剂过后，团队默契拉满，无需调度，全员自动进入高压备战状态。'}],choices:[{label:'__auto__',nextScene:'ch8_scene5'}]},
ch8_scene5:{tag:'【互动3·二次施压·风险抉择】',blocks:[{type:'narration',text:'首轮工单尚未办结，赵东升临时追加一张加急协查工单。你快速扫读内容，立刻发现单据内的基础数据存在明显偏差、逻辑对不上。典型的流程坑：接了要耗费大量时间核对纠错；不接会被记录"拒不配合跨部门工作"。'}],choices:[{label:'接单兜底：接手工单，耗时纠错填坑，保全部门配合分',nextScene:'ch8_branch3a'},{label:'依规拒接：标注数据异常退回，承担考核记录风险',nextScene:'ch8_branch3b'}]},
ch8_branch3a:{tag:'【分支·接单兜底】',blocks:[{type:'narration',text:'你选择全盘接下新增工单，全员加班核对纠错，最终三份工单全部压线办结，当期零失分，但全员身心俱疲。'}],choices:[{label:'__auto__',nextScene:'ch8_merge3'}]},
ch8_branch3b:{tag:'【分支·依规拒接】',blocks:[{type:'narration',text:'你提交数据异常说明，依规退回问题工单。赵东升面色不变，当场记录：项目部对接人配合度不足，流程响应滞后。一条轻微瑕疵档案留存备案，不直接扣分，但挂底。'}],choices:[{label:'__auto__',nextScene:'ch8_merge3'}]},
ch8_merge3:{tag:'【汇合·王总过路】',blocks:[{type:'narration',text:'本轮风险抉择落地，张野低头敲击键盘，默默同步归档所有工单记录，全程无声兜底。'},{type:'dialogue',text:'张野："记录存好了。"'},{type:'narration',text:'午后走廊，你复盘材料时偶遇王总迎面走来。他没有驻足、没有寒暄，擦肩而过时，只低声落下两个字。'},{type:'dialogue',text:'王总："扛住。"'},{type:'narration',text:'无解释、无铺垫、无退路提示。这是本轮阳谋围剿下，唯一的高层信号。'}],choices:[{label:'__auto__',nextScene:'ch8_scene6'}]},
ch8_scene6:{tag:'【互动4·道具补强·申请缓冲兜底】',blocks:[{type:'narration',text:'持续高压围剿下，你手握第七章留存的合规道具，拥有一次缓冲补强机会。'}],itemCheck:{itemId:'dept_selfcheck_report',prompt:'检测到可用道具：【项目部自查补充报告】',description:'证明部门主动优化意愿，申请短期考核缓冲。使用后道具将被消耗。',useLabel:'使用自查报告——申请考核缓冲',skipLabel:'暂不使用——看另一选项',useScene:'ch8_branch4a_item',skipScene:'ch8_scene6_alt'},choices:[{label:'消耗自查补充报告：证明优化意愿，申请缓冲',nextScene:'ch8_branch4a',consumeItem:'dept_selfcheck_report'},{label:'消耗财务替代批复单：以历史合规记录申请考量',nextScene:'ch8_branch4b',consumeItem:'zhoujie_replace_approval'}]},
ch8_scene6_alt:{tag:null,blocks:[],itemCheck:{itemId:'zhoujie_replace_approval',prompt:'检测到可用道具：【周姐财务流程评价替代批复单】',description:'以历史合规改进记录，申请评审酌情考量。使用后道具将被消耗。',useLabel:'使用财务批复单——申请评审考量',skipLabel:'暂不使用',useScene:'ch8_branch4b_item',skipScene:'ch8_merge4'},choices:[{label:'消耗财务替代批复单：以历史合规记录申请考量',nextScene:'ch8_branch4b',consumeItem:'zhoujie_replace_approval'},{label:'暂不使用道具',nextScene:'ch8_merge4'}]},
ch8_branch4a_item:{tag:'【道具使用·凭优化记录缓冲】',blocks:[{type:'narration',text:'你提交项目部自查补充报告，佐证部门长期主动整改、优化流程，成功争取到短期观察容错缓冲。'},{type:'thought',text:'道具消耗：项目部自查补充报告【已销毁】'}],choices:[{label:'__auto__',nextScene:'ch8_merge4'}]},
ch8_branch4a:{tag:'【分支·凭优化记录缓冲】',blocks:[{type:'narration',text:'你提交项目部自查补充报告，佐证部门长期主动整改、优化流程，成功争取到短期观察容错缓冲。'},{type:'thought',text:'道具消耗：项目部自查补充报告【已销毁】'}],choices:[{label:'__auto__',nextScene:'ch8_merge4'}]},
ch8_branch4b_item:{tag:'【道具使用·凭历史合规缓冲】',blocks:[{type:'narration',text:'你调出周姐财务流程评价替代批复单，以历史合规改进记录佐证部门积极性，成功降低本轮瑕疵权重。'},{type:'thought',text:'道具消耗：周姐财务流程评价替代批复单【已销毁】'}],choices:[{label:'__auto__',nextScene:'ch8_merge4'}]},
ch8_branch4b:{tag:'【分支·凭历史合规缓冲】',blocks:[{type:'narration',text:'你调出周姐财务流程评价替代批复单，以历史合规改进记录佐证部门积极性，成功降低本轮瑕疵权重。'},{type:'thought',text:'道具消耗：周姐财务流程评价替代批复单【已销毁】'}],choices:[{label:'__auto__',nextScene:'ch8_merge4'}]},
ch8_merge4:{tag:'【汇合】',blocks:[{type:'narration',text:'道具消耗生效，本轮全盘施压的失分风险被压至最低，成功守住部门基本盘。'}],choices:[{label:'__auto__',nextScene:'ch8_scene7'}]},
ch8_scene7:{tag:'【互动5·前瞻预判·应对新规迭代】',blocks:[{type:'narration',text:'临近傍晚，OA再次弹出孙总签发的补充预告：次日起，应急工单时限由2小时进一步压缩至1.5小时。规则还在迭代，压力持续加码。'}],choices:[{label:'连夜加班，预制工单模板、梳理流程，提前设防',nextScene:'ch8_branch5a'},{label:'正常收尾下班，次日临场应对',nextScene:'ch8_branch5b'}]},
ch8_branch5a:{tag:'【分支·提前设防】',blocks:[{type:'narration',text:'你选择留守加班，连夜梳理标准化流程、预制填报模板，提前适配更严苛的新规节奏。'}],choices:[{label:'__auto__',nextScene:'ch8_merge5'}]},
ch8_branch5b:{tag:'【分支·稳妥收尾】',blocks:[{type:'narration',text:'你按时收尾当日工作，保证零失误收官，选择次日再适配新规迭代。'}],choices:[{label:'__auto__',nextScene:'ch8_merge5'}]},
ch8_merge5:{tag:'【赵东升终场总结·威慑收尾】',blocks:[{type:'narration',text:'下班前夕，赵东升驻足项目部门口，没有进门，淡淡扫过全场。'},{type:'dialogue',text:'赵东升："今天第一天，大家辛苦了。后面节奏会更快，早点休息。"'},{type:'narration',text:'温和的语气里全是笃定的威慑：今日只是开胃，后续围剿只会更狠。'}],choices:[{label:'__auto__',nextScene:'ch8_scene8'}]},
ch8_scene8:{tag:'【陈默终极反常·伏笔拉满】',blocks:[{type:'narration',text:'全员收尾收拾工位、氛围松懈之际，你路过陈默工位，恰好瞥见她迅速将私人手机倒扣桌面。屏幕熄灭前一瞬，你清晰看到页面停留在消息发送成功的界面。她工作时间从不碰私人手机，全程只用OA办公。'},{type:'narration',text:'她没有抬头，没有解释，靠回椅背，闭眼静坐。不是疲惫休憩，是安静等待，静待某个未知结果。'}],choices:[{label:'__auto__',nextScene:'ch8_scene9'}]},
ch8_scene9:{tag:'【互动6·终局抉择·深夜秘讯】',blocks:[{type:'narration',text:'当日全盘施压艰难收官，全员陆续离场。你准备关灯锁工位时，OA后台弹出一条仅管理员可见的未读草稿通知，无署名、无公示标记。在规则日日迭代、步步围剿的当下，这条隐秘消息极具风险。'}],choices:[{label:'点开查看：摸清隐秘动向，提前掌握明日底牌',nextScene:'ch8_branch6a',itemGain:'liability_draft'},{label:'直接忽略：恪守本分稳妥离场，不碰未知风险',nextScene:'ch8_branch6b'}]},
ch8_branch6a:{tag:'【分支·探知秘讯】',blocks:[{type:'narration',text:'你点开草稿，页面加载一瞬便弹出权限警示。你只来得及瞥见一行核心内容：明日考核将新增"部门负责人连带追责机制"，随即页面自动闪退、权限收回。你提前锁定了明日最大引爆点，手握关键前置情报。'},{type:'thought',text:'获得道具：连带追责机制草稿通知'}],choices:[{label:'__auto__',nextScene:'ch8_chapter_end'}]},
ch8_branch6b:{tag:'【分支·稳妥离场】',blocks:[{type:'narration',text:'你选择不触碰未知后台内容，直接关灯收尾离场。安稳度过今日收官，但彻底错失预判明日危机的唯一机会，次日引爆事件将毫无铺垫空降。'}],choices:[{label:'__auto__',nextScene:'ch8_chapter_end'}]},
ch8_chapter_end:{tag:'【第八章·结束】',blocks:[{type:'narration',text:'夜色渐沉，工位区灯光逐盏熄灭，全员陆续下班离场。你是最后一个留守收尾的人。'},{type:'narration',text:'你回头望去，左侧是陈默空置的工位，桌面干净整洁，唯有一台手机屏幕朝下静静扣放，藏匿着她不肯言说的等待；右侧是走廊深处，那件无人认领的旧工装依旧悬挂在阴影里，沉淀着过往未解的隐秘。'},{type:'dialogue',text:'陈默临走前留下一句轻缓却刺骨的收尾，落定本章所有暗流："明天会更狠。但也就是明天了。"'}],choices:[{label:'__auto__',nextScene:'__end__'}]},
// ===== 第九章·全面引爆 =====
ch9_scene1:{tag:'【晨间平静·暴风雨前置】',blocks:[{type:'narration',text:'入职第九日清晨，工位区节奏反常安稳。昨日新规迭代、时效压缩、全盘施压的高压过后，今日没有临时工单、没有追加考核、没有OA弹窗轰炸。一切回归最常规的办公状态。'},{type:'dialogue',text:'刘伟敲着键盘长舒一口气："总算安稳一天，再连轴转我CPU都要烧了。"'},{type:'narration',text:'没人察觉，这份平静不是喘息，是陷阱落地前的最后留白。'}],choices:[{label:'顺势放松，短暂卸压',nextScene:'ch9_branch1a'},{label:'保持警惕，照常复盘风险',nextScene:'ch9_branch1b'}]},
ch9_branch1a:{tag:'【分支·短暂放松】',blocks:[{type:'narration',text:'你短暂放下连日紧绷，跟着团队稍作休整，默许这份来之不易的安稳。'}],choices:[{label:'__auto__',nextScene:'ch9_merge1'}]},
ch9_branch1b:{tag:'【分支·警惕复盘】',blocks:[{type:'narration',text:'你没有彻底松懈，趁着空档复盘昨日新规漏洞，潜意识里总觉得高压不会无故暂停。'}],choices:[{label:'__auto__',nextScene:'ch9_merge1'}]},
ch9_merge1:{tag:'【汇合】',blocks:[{type:'narration',text:'无论放松与否，无人能预判今日的杀局。平静，只为引爆蓄力。'}],choices:[{label:'__auto__',nextScene:'ch9_scene2'}]},
ch9_scene2:{tag:'【陷阱第一步·诱饵下发】',blocks:[{type:'narration',text:'上午十点，OA静默推送一条孙总亲自签发的任务：《跨部门项目数据联合巡检》。任务描述常规至极，和前八章所有例行巡检任务一模一样。'},{type:'narration',text:'赵东升亲自送来纸质文件，态度客气自然，和往日无异。'},{type:'dialogue',text:'赵东升："例行巡检，走个流程，尽快签一下归档。"'},{type:'narration',text:'你翻阅文件，内容合规、数据规整，完全挑不出硬性问题。唯一的不同藏在签字页底端——一条常年灰色未激活的模板条款，今日被后台悄悄勾选启用。'},{type:'bold',text:'小字条款：本人确认数据无误，并对本次核查结果承担全部连带责任。'},{type:'narration',text:'旧档可查、条款真实、一直存在——只是过往从未启用。孙总没有新增规则，只是激活了沉睡的陷阱。'}],choices:[{label:'快速扫过直接签字',nextScene:'ch9_branch2a'},{label:'逐行核对，留意异常小字条款',nextScene:'ch9_branch2b'}]},
ch9_branch2a:{tag:'【分支·快速签字】',blocks:[{type:'narration',text:'你默认是例行流程，没有细读，落笔签字。'},{type:'thought',text:'疏忽愧疚线——后续自我归因：我是因为粗心大意害了她。'}],choices:[{label:'__auto__',nextScene:'ch9_merge2'}]},
ch9_branch2b:{tag:'【分支·细读发现】',blocks:[{type:'narration',text:'你逐行核对，精准捕捉到"连带责任"的激活条款，瞬间察觉不对劲。你抬眼质问赵东升，对方早有准备，语气平淡从容。'},{type:'dialogue',text:'赵东升："模板自带的例行条款，旧档一直都在，只是平时用得少。你可以翻翻往期记录。"'},{type:'narration',text:'你调取旧档核对，条款确实存在，只是往年从未勾选生效。真话掺着假话，最让人无从辩驳。'},{type:'thought',text:'软弱愧疚线——后续自我归因：我看见了，却没顶住压力。'}],choices:[{label:'__auto__',nextScene:'ch9_merge2'}]},
ch9_merge2:{tag:'【汇合】',blocks:[{type:'narration',text:'签字完成，文件归档。陷阱第一环稳稳落地。'}],choices:[{label:'__auto__',nextScene:'ch9_scene3'}]},
ch9_scene3:{tag:'【王总留白·预知不救的暗示】',blocks:[{type:'narration',text:'你刚归档文件，王总恰好从走廊路过。他目光扫过你桌面的巡检签字单，脚步极细微地顿了半秒，深深看了你一眼。没有提醒、没有劝阻、没有停顿、没有言语。一瞬之后，他如常前行。'},{type:'narration',text:'此刻的你毫无察觉。待到事后回望，才懂这一眼是全盘知晓、却无能为力的默认。'}],choices:[{label:'__auto__',nextScene:'ch9_scene4'}]},
ch9_scene4:{tag:'【互动3·二次抉择·抗压底线】',blocks:[{type:'narration',text:'赵东升见你迟疑，轻声施压，催促归档闭环。'}],choices:[{label:'顺从压力，完成签字归档',nextScene:'ch9_branch3a'},{label:'顶住压力，暂时拒签，要求核实条款启用依据',nextScene:'ch9_branch3b'}]},
ch9_branch3a:{tag:'【分支·顺势办结】',blocks:[{type:'narration',text:'你最终选择妥协，按流程办结归档，任务看似圆满收尾。'}],choices:[{label:'__auto__',nextScene:'ch9_merge3'}]},
ch9_branch3b:{tag:'【分支·强硬拒签】',blocks:[{type:'narration',text:'你坚持原则暂缓签字，要求出具本次条款启用的专项通知。赵东升面色不变，当场记录：项目部对接人配合度不足，流程响应滞后。你保住了不踩坑的底线，却被扣上不配合的考核瑕疵。'},{type:'thought',text:'无力愧疚线——后续自我归因：我做对了所有选择，却依然留不住结果。'}],choices:[{label:'__auto__',nextScene:'ch9_merge3'}]},
ch9_merge3:{tag:'【汇合】',blocks:[{type:'narration',text:'陷阱第二环锁死。无论签与不签，收割条件均已达成。'}],choices:[{label:'__auto__',nextScene:'ch9_scene5'}]},
ch9_scene5:{tag:'【陈默苦肉计·无声入局】',blocks:[{type:'narration',text:'本次巡检数据，整体合规、无虚假、无篡改。唯有三处极其细微的格式瑕疵：备注栏留白、时间戳精度不足、分项格式不统一。放在平日，陈默一定会提前修正、抹平所有可被挑刺的细节。'},{type:'narration',text:'但今天，她全程沉默、全程未动、全程不提醒。她没有制造错误，只是放弃了往日的兜底修正。不是疏忽，是选择。她主动留给孙总一个合法、合规、可追责、可追溯的完美切入点。'}],choices:[{label:'__auto__',nextScene:'ch9_scene6'}]},
ch9_scene6:{tag:'【陷阱引爆·午后抽查】',blocks:[{type:'narration',text:'午后两点，OA弹窗突发全员通知：孙总亲自抽查本次跨部门巡检台账，判定数据存在合规瑕疵，需追责到人。通知同步附上你签字的连带责任条款页面。'},{type:'narration',text:'权责清晰、白纸黑字、你亲笔确认——你对本次核查结果承担全部连带责任。工位区瞬间死寂。'}],choices:[{label:'__auto__',nextScene:'ch9_scene7'}]},
ch9_scene7:{tag:'【互动4·终局留白·最后温存】',blocks:[{type:'narration',text:'所有人低头装忙、无人敢说话，只剩死寂蔓延。你可以趁着最后空档，做一次无结局的收尾互动。'}],choices:[{label:'轻声开口，提醒陈默核对一遍数据备份',nextScene:'ch9_branch4a'},{label:'沉默观望，不打扰她的安静',nextScene:'ch9_branch4b'}]},
ch9_branch4a:{tag:'【分支·温柔提醒】',blocks:[{type:'narration',text:'你低声提醒陈默留存数据备份，哪怕此刻大局已定，你仍想守住最后一丝稳妥。'}],choices:[{label:'__auto__',nextScene:'ch9_merge4'}]},
ch9_branch4b:{tag:'【分支·静默不扰】',blocks:[{type:'narration',text:'你看懂她早已笃定的心态，没有多余打扰，安静陪她等候结果。'}],choices:[{label:'__auto__',nextScene:'ch9_merge4'}]},
ch9_merge4:{tag:'【汇合】',blocks:[{type:'narration',text:'短暂互动落幕，这是你和陈默在项目部最后一次正常共事互动。'}],choices:[{label:'__auto__',nextScene:'ch9_scene8'}]},
ch9_scene8:{tag:'【孙总登场·温柔杀局】',blocks:[{type:'narration',text:'孙总缓步走入项目部，手中拿着纸质核查报告，神色平和、语气温和，没有半分问责的戾气。他全程不针对你、不指责你、不翻你签字的账。'},{type:'dialogue',text:'孙总："核查我看过了，数据存在合规瑕疵。按条款需要有人担责。你们部门自己核实，是谁经手的。"'},{type:'narration',text:'他把选择权完全抛给团队，把刀递到你手里，让你亲手决定谁来买单。赵东升站在孙总身后，全程沉默、面无表情、不插话、不补刀。'}],choices:[{label:'__auto__',nextScene:'ch9_scene9'}]},
ch9_scene9:{tag:'【互动5·终极抉择·当众立场】',blocks:[{type:'narration',text:'全场目光聚焦，所有人都在等你的回应。'}],choices:[{label:'沉默不语，等待团队定论',nextScene:'ch9_branch5a'},{label:'主动开口，尝试自行承担责任',nextScene:'ch9_branch5b'}]},
ch9_branch5a:{tag:'【分支·沉默观望】',blocks:[{type:'narration',text:'你一时失语，僵在原地，没有开口辩驳，也没有主动担责。'}],choices:[{label:'__auto__',nextScene:'ch9_merge5'}]},
ch9_branch5b:{tag:'【分支·主动扛责】',blocks:[{type:'narration',text:'你咬牙开口，试图以签字对接人的身份自行扛下所有责任，保全团队。'}],choices:[{label:'__auto__',nextScene:'ch9_merge5'}]},
ch9_merge5:{tag:'【汇合·全局收束】',blocks:[{type:'narration',text:'无论你开口与否，结局早已注定。在所有人僵持的瞬间，陈默平静开口，声音清淡却穿透整间办公室。'},{type:'dialogue',text:'陈默："数据是我经手的。不用查了。"'},{type:'narration',text:'事实陈述干净利落，没有铺垫、没有悲壮、没有辩解。三秒死寂过后，孙总轻声落锤。'},{type:'dialogue',text:'孙总："既然本人确认，那就按条款执行。相关责任人做离职处理。"'},{type:'narration',text:'全程合规、全程公正、全程无懈可击。孙总转身离场，不留半句多余评判。赵东升跟在孙总身后离开，走到门口时脚步顿了一下，回头看了一眼陈默的工位。不是得意。是终于结束了。'}],choices:[{label:'__auto__',nextScene:'ch9_scene10'}]},
ch9_scene10:{tag:'【李姐无声兜底·中立人设闭环】',blocks:[{type:'narration',text:'孙总、赵东升离场后，办公室紧绷的氛围依旧没有松动。李姐淡淡开口，一句话守住自己的人设，也护住了陈默最后的体面。'},{type:'dialogue',text:'李姐："陈默的离职交接，我来跟进。毕竟全公司我最熟离职流程。"'},{type:'narration',text:'不质疑规则、不反抗决定、不为谁求情。只是默默把流程接管，杜绝所有落井下石的额外刁难。'}],choices:[{label:'__auto__',nextScene:'ch9_scene11'}]},
ch9_scene11:{tag:'【互动6·最后追问·扎心终局】',blocks:[{type:'narration',text:'众人散去，只剩你和陈默两人留在工位区。你无法接受这个结果，上前追问原因。'},{type:'dialogue',text:'陈默："条款是你签的。我不认，就是你扛。你扛不住。"'},{type:'narration',text:'事实陈述、后果点明、顺手扎穿你的侥幸。她不怪你、不怨你、不卖惨，只用最平静的话，让你终生自我拉扯。说完，她低头落座，不再看你、不再解释、不再说话。'}],choices:[{label:'__auto__',nextScene:'ch9_scene12'}]},
ch9_scene12:{tag:'【团队反应·情绪宣泄】',blocks:[{type:'dialogue',text:'刘伟："这叫什么事儿……明明谁都没做错，偏偏有人要走。赵东升今天也邪门，全程站那儿当背景板，嘴闭得比张野的耳机还严实。我就说默姐平时嘴毒是攒人品，合着最后人品攒够了，拿离职换的。"'},{type:'dialogue',text:'张野默默摘下耳机，淡淡吐出一句："戏演完了。"'},{type:'narration',text:'说完，重新戴回耳机。全程无一字多余，却把无声的惋惜、无奈与冰冷局势，尽数道尽。'}],choices:[{label:'__auto__',nextScene:'ch9_chapter_end'}]},
ch9_chapter_end:{tag:'【第九章·结束】',blocks:[{type:'narration',text:'夜幕降临，下班时间到。陈默的工位依旧整洁、物品齐全、人还在场，没有收拾、没有离场、没有官宣离开。'},{type:'narration',text:'你是最后一个留守的人，回头看向她的工位。往日密密麻麻贴满提醒的便利贴，全部被她亲手撕去。唯独第一章那张泛黄的旧便利贴完好无损：赵东升递的烟别接。'},{type:'narration',text:'而在那张旧便利贴的最上方，她新贴了一张白纸，字迹清淡熟悉。'},{type:'dialogue',text:'新便利贴字迹：咖啡自己冲。我就那三包。'},{type:'narration',text:'一瞬之间你彻骨寒凉：她从第一天开始，就知道自己终有离开的那天。今日的引爆，从来不是突发意外，是她早已知晓、全程配合、亲手完成的终局。'},{type:'thought',text:'如果我当时选了另一个选项，会不会不一样？'},{type:'thought',text:'愧疚的种子，彻底扎根。'}],choices:[{label:'__auto__',nextScene:'__end__'}]},
// ===== 第十章·工位空位 =====
ch10_scene1:{tag:'【晨间到岗·第一处空位】',blocks:[{type:'narration',text:'清晨项目部，照常打卡、照常开灯、照常开机。一切流程和往日没有任何区别。你落座的第一秒，身体先于意识做出惯性动作——转头看向左侧工位。'},{type:'narration',text:'阿杰遗留的旧工装还搭在椅背上，平整、落灰、无人认领。旁边的位置，桌椅整洁、物品齐全，却彻底空荡。没有衣物、没有随手摆件、没有半分人气。陈默连一件遗留的私人物品都没有留下。'}],choices:[{label:'先去冲咖啡，复刻往日习惯',nextScene:'ch10_branch1a'},{label:'先开电脑干活，强行切断惯性',nextScene:'ch10_branch1b'}]},
ch10_branch1a:{tag:'【分支·固守习惯】',blocks:[{type:'narration',text:'你下意识走向茶水间，还是保留着双人份的惯性节奏，走到咖啡机前才猛然回神。'}],choices:[{label:'__auto__',nextScene:'ch10_merge1'}]},
ch10_branch1b:{tag:'【分支·强行抽离】',blocks:[{type:'narration',text:'你压下转头观望的冲动，直接开机登OA，想用忙碌盖住突如其来的空落。'}],choices:[{label:'__auto__',nextScene:'ch10_merge1'}]},
ch10_merge1:{tag:'【汇合】',blocks:[{type:'narration',text:'习惯可以强行克制，但空缺已经扎根在工位的每一处缝隙里。'}],choices:[{label:'__auto__',nextScene:'ch10_scene2'}]},
ch10_scene2:{tag:'【团队错位·第二处空位】',blocks:[{type:'narration',text:'刘伟端着四杯咖啡从茶水间出来，指尖稳稳托着托盘，动作熟练如常。他逐一分完咖啡，手里还余下一杯温热的黑咖。脚步下意识停在空工位前，整个人僵了半秒。'},{type:'dialogue',text:'刘伟："习惯了习惯了，手滑多冲一杯，明天铁定改、明天就改。"'}],choices:[{label:'接过咖啡，自己喝完',nextScene:'ch10_branch2a'},{label:'抬手示意放下，空工位留一杯余温',nextScene:'ch10_branch2b'}]},
ch10_branch2a:{tag:'【分支·自我消化】',blocks:[{type:'narration',text:'你接过咖啡一饮而尽，替所有人吞下这份多余的习惯落差。'}],choices:[{label:'__auto__',nextScene:'ch10_merge2'}]},
ch10_branch2b:{tag:'【分支·留白存放】',blocks:[{type:'narration',text:'你轻轻摇头，示意他把咖啡放在陈默显示器旁边——那是她每天放咖啡杯的固定位置。'}],choices:[{label:'__auto__',nextScene:'ch10_merge2'}]},
ch10_merge2:{tag:'【汇合】',blocks:[{type:'narration',text:'一杯多余的咖啡，是整个团队最直白的证明：我们都还没适应她不在的日子。'}],choices:[{label:'__auto__',nextScene:'ch10_scene3'}]},
ch10_scene3:{tag:'【李姐派活·第三处空位】',blocks:[{type:'narration',text:'早会极简收尾，李姐原位派单，语速平稳、分配公允，和平日别无二致。她把原本固定由左侧工位承接的复核工作量，均匀拆分到你和刘伟身上。'},{type:'dialogue',text:'李姐："这批台账你们俩分摊处理，有问题找我。"'},{type:'narration',text:'话音落下，她微微停顿半秒。所有人都清楚，这句话以往的完整结尾是：有问题找我，或者问陈默。今天，她不动声色地咽掉了后半句。'}],choices:[{label:'__auto__',nextScene:'ch10_scene4'}]},
ch10_scene4:{tag:'【张野结界·第四处空位】',blocks:[{type:'narration',text:'你路过张野工位，习惯性能听见他耳机漏出的声响：大悲咒Remix、技术杂谈、白噪音，永远有东西填满他的结界。但今天，他的耳机是彻底的静默。没有旋律、没有人声、没有杂响，只有一片空白的安静。'},{type:'narration',text:'他不用再靠噪音隔绝周遭，因为往日最鲜活、最嘴碎、最能打破死寂的那个人，已经不在了。无声，比有声更吵闹。'}],choices:[{label:'__auto__',nextScene:'ch10_scene5'}]},
ch10_scene5:{tag:'【赵东升到访·面具脱落】',blocks:[{type:'narration',text:'上午中段，赵东升第一次踏入项目部，是陈默离场后的首次到访。他彻底变了。没有笑脸、没有客套、没有递烟、没有"自家人多担待"的虚伪话术。往日全套伪善流程尽数消失。'},{type:'narration',text:'他手里拿着的，正是第九章那批数据核查的后续协查工单——彻头彻尾的陈默遗留工作。他明明清楚这份工作的原负责人，却全程一字不提、一瞬不看空工位。'},{type:'dialogue',text:'赵东升："下午两点前，这份协查单给出完整回复。"'},{type:'narration',text:'指令落地，转身就走。他的客气，从来不是给项目部的，只是专门给陈默的。人不在了，体面和伪装，也就没必要留着了。'}],choices:[{label:'__auto__',nextScene:'ch10_scene6'}]},
ch10_scene6:{tag:'【互动3·直面施压·态度抉择】',blocks:[{type:'narration',text:'这是你第一次独自直面赵东升的公事公办式施压，无人兜底、无人挡枪。'}],choices:[{label:'应声接下，稳妥闭环',nextScene:'ch10_branch3a'},{label:'迟疑一秒，询问工单细节',nextScene:'ch10_branch3b'}]},
ch10_branch3a:{tag:'【分支·稳妥承接】',blocks:[{type:'narration',text:'你没有多余争辩，直接接下工单，默认承接所有遗留压力。'}],choices:[{label:'__auto__',nextScene:'ch10_merge3'}]},
ch10_branch3b:{tag:'【分支·谨慎追问】',blocks:[{type:'narration',text:'你短暂迟疑，追问工单核对标准与时限细则，守住新人合规底线。'}],choices:[{label:'__auto__',nextScene:'ch10_merge3'}]},
ch10_merge3:{tag:'【汇合】',blocks:[{type:'narration',text:'无论选择如何，你都清晰意识到：往后所有刀尖，再也无人替你先挡一步。'}],choices:[{label:'__auto__',nextScene:'ch10_scene7'}]},
ch10_scene7:{tag:'【遗留工单·最后的回响】',blocks:[{type:'narration',text:'你点开陈默未归档的最后一份台账文件。排版规整、数据全核、零错漏、零瑕疵。她把收尾工作做得干干净净，没有半分敷衍。文件备注栏，留着一行她随手敲下的日常字迹。'},{type:'dialogue',text:'备注：数据V3版已核。下次记得查旧档，别只看新推送。附件路径：/财务/周姐/季度凭证/未归档/'},{type:'thought',text:'她明明早就身处局中，明明早已预判风险，却依旧把每一份工作做到极致。这行字不是特意留给我的，可最后偏偏只有我看见了。'}],choices:[{label:'截图留存，存档记忆',nextScene:'ch10_branch4a',itemGain:'chenmo_last_memo'},{label:'看完即关，正常归档',nextScene:'ch10_branch4b'}]},
ch10_branch4a:{tag:'【分支·私存痕迹】',blocks:[{type:'narration',text:'你悄悄截图保存页面，把这行平淡的叮嘱，私自留作念想。'},{type:'thought',text:'获得道具：陈默末次工单备注记录'}],choices:[{label:'__auto__',nextScene:'ch10_merge4'}]},
ch10_branch4b:{tag:'【分支·公事归档】',blocks:[{type:'narration',text:'你压下翻涌的情绪，按流程归档文件，假装只是处理一份普通工单。'}],choices:[{label:'__auto__',nextScene:'ch10_merge4'}]},
ch10_merge4:{tag:'【汇合】',blocks:[{type:'narration',text:'流程可以正常走完，但心里的缺口，永远无法归档。'}],choices:[{label:'__auto__',nextScene:'ch10_scene8'}]},
ch10_scene8:{tag:'【刘伟破防·嘴替式留白】',blocks:[{type:'dialogue',text:'刘伟："默姐以前这种表，都是提前一天就做完的……哦不提了不提了。"'},{type:'narration',text:'他飞快收口、慌忙圆场，越掩饰，越真实。'},{type:'thought',text:'整个部门都在拼命假装正常。假装她只是临时请假，假装明天工位会有人落座，假装我签字的那一刻，什么都没发生过。'},{type:'dialogue',text:'刘伟低头整理手头工单，随口嘟囔了一句："王总今天好像外出开会了，一整天没见着人。"'}],choices:[{label:'__auto__',nextScene:'ch10_scene9'}]},
ch10_scene9:{tag:'【走廊幻听·第五处空位】',blocks:[{type:'narration',text:'午后走廊传来人声，有人喊出一个陈姓称呼。你条件反射般抬头，目光瞬间望向门口。下一秒才猛然回神——不是她。只是相似的姓氏，相似的呼喊，却精准戳中了你尚未平复的惯性期待。'}],choices:[{label:'__auto__',nextScene:'ch10_scene10'}]},
ch10_scene10:{tag:'【周姐出场·外部冷流程】',blocks:[{type:'narration',text:'你刚收回望向走廊的目光，周姐恰好从财务部方向走来，脚步不停，语气中立，不带任何情绪。'},{type:'dialogue',text:'周姐："陈默的离职交接单，财务这边已经收到了。"'},{type:'narration',text:'她说完，目光在你脸上停了一瞬，似乎想说什么，但最终只是点了下头，转身走了。项目部还在假装温存，公司流程早已冰冷落地。'}],choices:[{label:'__auto__',nextScene:'ch10_scene11'}]},
ch10_scene11:{tag:'【互动5·收官离场·最后的等待】',blocks:[{type:'narration',text:'下班时间抵达，全员陆续收拾工位离场。往日你总会习惯性停顿片刻，等左侧工位那人收尾、起身、吐槽下班拥堵。今天，你依旧无意识停了几秒。'}],choices:[{label:'随人流先走，结束今日内耗',nextScene:'ch10_branch5a'},{label:'留守最后，看完工位再走',nextScene:'ch10_branch5b'}]},
ch10_branch5a:{tag:'【分支·匆匆离场】',blocks:[{type:'narration',text:'你跟着人群快步离开，试图逃离这片满是错位的空位。'}],choices:[{label:'__auto__',nextScene:'ch10_chapter_end'}]},
ch10_branch5b:{tag:'【分支·静默留守】',blocks:[{type:'narration',text:'你留在最后，安静看着空荡的工位，任由细碎的落差反复侵蚀心绪。'}],choices:[{label:'__auto__',nextScene:'ch10_chapter_end'}]},
ch10_chapter_end:{tag:'【第十章·结束】',blocks:[{type:'narration',text:'办公室彻底空旷，只剩你一人。你第一次主动抬头，认真看向阿杰那件落灰的旧工装，又望向旁边彻底空置的座椅。左边是旧人遗留的余温，右边是新人离场的空白。中间，是独自撑下所有压力的你。'},{type:'narration',text:'你抬手关灯。工位暗下，走廊灯光次第熄灭。整层楼陷入彻底的寂静。'},{type:'thought',text:'明天还是一样。'}],choices:[{label:'__auto__',nextScene:'__end__'}]},
// ===== 第十一章·疑点 =====
ch11_scene1:{tag:'【晨间日常·替代痕迹】',blocks:[{type:'narration',text:'工位区空椅子依旧摆在左侧，阿杰旧工装搭在一旁。你拿便利贴走到刘伟桌面，写下今日核对数据提醒。贴好后，低头盯着自己的字迹停顿两秒。字迹不如陈默的锋利，但功能一样。你想起以前每天到岗时那张已经贴好的便利贴，是陈默提前做的工作。不是理所当然的存在。'}],choices:[{label:'收回目光开工，不再多想字迹差别',nextScene:'ch11_branch1a'},{label:'伸手摸了摸空白显示器边框，想起往日满贴的纸条',nextScene:'ch11_branch1b'}]},
ch11_branch1a:{tag:'【分支·收敛心绪】',blocks:[{type:'narration',text:'你迅速收回目光，压下心底微妙的落差，点开归档文件夹，专注投入手头的整理工作，刻意不再对比字迹差异。'}],choices:[{label:'__auto__',nextScene:'ch11_merge1'}]},
ch11_branch1b:{tag:'【分支·触景念旧】',blocks:[{type:'narration',text:'你抬手轻轻触碰冰凉的显示器边框，空荡荡的屏幕上没有一张便利贴，往日密密麻麻的提醒、标注历历在目，指尖停顿片刻才收回。'}],choices:[{label:'__auto__',nextScene:'ch11_merge1'}]},
ch11_merge1:{tag:'【汇合】',blocks:[{type:'narration',text:'短暂停顿后，你收回思绪，回归手头归档任务。'}],choices:[{label:'__auto__',nextScene:'ch11_scene2'}]},
ch11_scene2:{tag:'【李姐安排·档案整理任务】',blocks:[{type:'dialogue',text:'李姐："陈默遗留纸质台账全部交由你统一归档整理。"'}],choices:[{label:'__auto__',nextScene:'ch11_scene3'}]},
ch11_scene3:{tag:'【翻查旧档·第一条疑点线索】',blocks:[{type:'narration',text:'逐份翻阅老旧台账，一页纸夹层滑出一张便利贴。字迹清晰，属于陈默。'},{type:'bold',text:'纸面文字：3/12 下午3:15 孙总办公室'},{type:'narration',text:'3月12日，是你入职前一周。'}],choices:[{label:'翻面查看便利贴背面有无补充字迹',nextScene:'ch11_branch2a',itemGain:'chenmo_prehire_note'},{label:'捏在手里反复核对日期与地点文字',nextScene:'ch11_branch2b',itemGain:'chenmo_prehire_note'}]},
ch11_branch2a:{tag:'【分支·严谨核验】',blocks:[{type:'narration',text:'你立刻将便利贴翻面，仔细检查每一处边角、空白位置，确认背面没有任何隐藏字迹、标注与记号。'}],choices:[{label:'__auto__',nextScene:'ch11_merge2'}]},
ch11_branch2b:{tag:'【分支·直击疑点】',blocks:[{type:'narration',text:'你攥紧这张薄薄的便利贴，反复比对日期、地点字迹，一次次确认时间线——入职前一周，陈默的目标直指孙总办公室，违和感愈发强烈。'}],choices:[{label:'__auto__',nextScene:'ch11_merge2'}]},
ch11_merge2:{tag:'【汇合】',blocks:[{type:'narration',text:'便利贴背面空白，没有额外记录。心底生出第一个疑问：她入职前便在盯孙总相关事宜。'}],choices:[{label:'__auto__',nextScene:'ch11_scene4'}]},
ch11_scene4:{tag:'【日常细节·撞见遗留铅笔字迹】',blocks:[{type:'narration',text:'继续翻档，台账侧边留有浅铅笔字批注。'},{type:'dialogue',text:'铅笔备注：数据已核，别再催了'},{type:'narration',text:'看见熟悉笔迹，动作停顿一瞬。'}],choices:[{label:'拍下页面存档留存这条笔迹线索',nextScene:'ch11_branch3a',itemGain:'chenmo_pencil_note'},{label:'合上台账，正常继续整理流程',nextScene:'ch11_branch3b'}]},
ch11_branch3a:{tag:'【分支·留存凭证】',blocks:[{type:'narration',text:'你拿出手机，对准台账上的铅笔字迹精准拍照，单独存档，将这处细微的笔迹痕迹留存为专属线索。'},{type:'thought',text:'获得道具：陈默旧台账铅笔字迹记录'}],choices:[{label:'__auto__',nextScene:'ch11_merge3'}]},
ch11_branch3b:{tag:'【分支·常规归档】',blocks:[{type:'narration',text:'你压下心头的触动，没有额外操作，轻轻合上台账封面，按照归档流程依次整理，恪守本职工作。'}],choices:[{label:'__auto__',nextScene:'ch11_merge3'}]},
ch11_merge3:{tag:'【汇合】',blocks:[{type:'narration',text:'线索收好，继续翻阅剩余文件。'}],choices:[{label:'__auto__',nextScene:'ch11_scene5'}]},
ch11_scene5:{tag:'【移交记录·暗藏时间伏笔】',blocks:[{type:'narration',text:'翻到离职归档清单，备注一行小字。'},{type:'bold',text:'清单备注：全套凭证已移交周姐'},{type:'narration',text:'移交日期，为第九章陷阱触发前一日。'}],choices:[{label:'__auto__',nextScene:'ch11_scene6'}]},
ch11_scene6:{tag:'【刘伟午休·习惯彻底改变】',blocks:[{type:'narration',text:'午休刘伟端三杯咖啡走出茶水间，径直分给你、李姐、张野。全程没有在空工位前驻足停顿。他已经改掉了四人份的习惯，改成了三人份。适应本身比不适应更让人觉得失落。'}],choices:[{label:'__auto__',nextScene:'ch11_scene7'}]},
ch11_scene7:{tag:'【下意识动作·转头落空】',blocks:[{type:'narration',text:'核对一组复杂数据，思路卡住。脑袋下意识向左侧转动一半，骤然停住，收回目光。这个动作比看空椅子更疼——不是"她不在"，是"我以为她还在"。'}],choices:[{label:'__auto__',nextScene:'ch11_scene8'}]},
ch11_scene8:{tag:'【李姐路过·看破不说破】',blocks:[{type:'narration',text:'李姐途经工位，视线扫过你手中的便利贴，目光停顿一秒。你开口发问。'},{type:'dialogue',text:'你："陈默以前是不是一直在暗中查什么事？"'},{type:'dialogue',text:'李姐："陈默的事，她自己会说。她要是不说，就是不想让人知道。"'},{type:'dialogue',text:'李姐："把文件归档吧。归档了就不会丢了。归档的事归你管，别的事归不了你管。"'},{type:'narration',text:'她没有否认，没有确认。但你已经听出了她没有说出口的部分——她知道陈默在查什么，但她不能说。'}],choices:[{label:'默默把便利贴夹进私人笔记本收好',nextScene:'ch11_branch4a'},{label:'暂时夹在当前台账里，统一最后归档',nextScene:'ch11_branch4b'}]},
ch11_branch4a:{tag:'【分支·私藏线索】',blocks:[{type:'narration',text:'你没有将便利贴归入公务档案，而是悄悄折叠好，夹进自己的私人笔记本深处，将这处疑点私自留存，不对外公开。'}],choices:[{label:'__auto__',nextScene:'ch11_merge4'}]},
ch11_branch4b:{tag:'【分支·公务归档】',blocks:[{type:'narration',text:'你遵从李姐的叮嘱，将便利贴原位夹回台账夹层，随整套公务文件统一归档，不私自留存任何疑点线索。'}],choices:[{label:'__auto__',nextScene:'ch11_merge4'}]},
ch11_merge4:{tag:'【汇合】',blocks:[{type:'narration',text:'文件安置妥当，李姐静静看了你一眼，转身离开工位区。'}],choices:[{label:'__auto__',nextScene:'ch11_scene9'}]},
ch11_scene9:{tag:'【赵东升到访·假意套话警告】',blocks:[{type:'narration',text:'下午赵东升前来取部门存档文件，看见你持续翻阅老旧档案。'},{type:'dialogue',text:'赵东升："最近怎么老翻旧东西？有找不到的记录？"'},{type:'dialogue',text:'你："整理陈默遗留档案，统一归档。"'},{type:'narration',text:'赵东升轻轻点头，转身前补一句提醒。'},{type:'dialogue',text:'赵东升："有什么问题直接问我就行，不用翻来翻去。"'}],choices:[{label:'应声点头，表面顺从不再深挖旧档',nextScene:'ch11_branch5a'},{label:'只淡淡回应，手上翻档动作没有停下',nextScene:'ch11_branch5b',itemGain:'zhao_probe_record'}]},
ch11_branch5a:{tag:'【分支·顺势顺从】',blocks:[{type:'narration',text:'你闻言立刻点头应声，表面全然接受对方好意，收敛翻查旧档的动作，装作不再深究过往记录。'}],choices:[{label:'__auto__',nextScene:'ch11_merge5'}]},
ch11_branch5b:{tag:'【分支·暗自坚持】',blocks:[{type:'narration',text:'你淡淡应声回应，不做多余辩解，手上翻阅旧台账的动作丝毫未停，无声对抗对方的警告试探。'},{type:'thought',text:'获得道具：赵东升套话警告对话记录'}],choices:[{label:'__auto__',nextScene:'ch11_merge5'}]},
ch11_merge5:{tag:'【汇合】',blocks:[{type:'narration',text:'赵东升看了你一眼，没再多言，拿完文件转身离开。第十一章是随口套话，但你清晰感知——你的调查动作，已经被上层紧盯。'}],choices:[{label:'__auto__',nextScene:'ch11_scene10'}]},
ch11_scene10:{tag:'【收尾时段·联络王总求证】',blocks:[{type:'narration',text:'全天档案整理完毕，便利贴妥善收在私人笔记本内。抬头看向左侧空置工位，再望向一旁落灰的阿杰工装。'}],choices:[{label:'编辑消息发送：有时间吗？想问你一件事',nextScene:'ch11_branch6a'},{label:'暂时搁置，次日再找机会联系王总',nextScene:'ch11_branch6b'}]},
ch11_branch6a:{tag:'【分支·主动发信】',blocks:[{type:'narration',text:'消息发送完成。页面停留。没有回复。'}],choices:[{label:'__auto__',nextScene:'ch11_chapter_end'}]},
ch11_branch6b:{tag:'【分支·延后问询】',blocks:[{type:'narration',text:'收起手机，决定次日再寻找合适时机向王总求证疑点。'}],choices:[{label:'__auto__',nextScene:'ch11_chapter_end'}]},
ch11_chapter_end:{tag:'【第十一章·结束】',blocks:[{type:'narration',text:'全天工作结束，心底困惑盖过往日悲伤，愧疚混杂未知不安。'}],choices:[{label:'__auto__',nextScene:'__end__'}]},
// ===== 第十二章·调查 =====
ch12_scene1:{tag:'【晨间到岗·习惯彻底适应】',blocks:[{type:'narration',text:'清晨工位区。左侧空工位依旧空置，阿杰旧工装搭在椅上。你落座，没有停顿，没有下意识转头，直接开机登录系统。往日的落空惯性，已经消退。'}],choices:[{label:'优先处理当日本职工作',nextScene:'ch12_branch1a'},{label:'优先打开OA，尝试核查旧日志',nextScene:'ch12_branch1b'}]},
ch12_branch1a:{tag:'【分支·稳妥先行】',blocks:[{type:'narration',text:'你先点开待办台账，规整好当日工作，稳住本职节奏，再伺机开展私下核查。'}],choices:[{label:'__auto__',nextScene:'ch12_merge1'}]},
ch12_branch1b:{tag:'【分支·直奔疑点】',blocks:[{type:'narration',text:'你跳过常规开工流程，直接打开OA系统，目标明确，第一时间查找陈默历史操作记录。'}],choices:[{label:'__auto__',nextScene:'ch12_merge1'}]},
ch12_merge1:{tag:'【汇合】',blocks:[{type:'narration',text:'页面调出陈默个人工作日志列表。大部分条目后方统一标注：日志已清理。可查看记录仅剩公共流程台账，无任何私人操作痕迹。'}],choices:[{label:'__auto__',nextScene:'ch12_scene2'}]},
ch12_scene2:{tag:'【日志疑点·针对性清理】',blocks:[{type:'narration',text:'你点开日志清理记录。清理操作时间，集中在第九章事件结束后。并非月度常规清理，也非离职统一归档清理。是针对性、定点清除。'}],choices:[{label:'截图保存清理时间记录',nextScene:'ch12_branch2a',itemGain:'oa_log_clean_screenshot'},{label:'默默记下时间点，关闭页面',nextScene:'ch12_branch2b'}]},
ch12_branch2a:{tag:'【分支·留存凭证】',blocks:[{type:'narration',text:'你精准截取日志清理界面，将第九章后的批量清理记录存档，固化证据。'},{type:'thought',text:'获得道具：OA针对性日志清理截屏'}],choices:[{label:'__auto__',nextScene:'ch12_merge2'}]},
ch12_branch2b:{tag:'【分支·暗记于心】',blocks:[{type:'narration',text:'你没有留存截图，只牢牢记住这个反常的时间节点，页面关闭，不露声色。'}],choices:[{label:'__auto__',nextScene:'ch12_merge2'}]},
ch12_merge2:{tag:'【汇合】',blocks:[{type:'narration',text:'你确认第一件事：有人在刻意抹除陈默离职前的操作痕迹。'}],choices:[{label:'__auto__',nextScene:'ch12_scene3'}]},
ch12_scene3:{tag:'【第一层碰壁·监控访客记录受限】',blocks:[{type:'narration',text:'你以归档核对时间线为由，咨询安保后台。安保回复：3月12日楼层访客记录已过期覆盖。办公区监控调取，需孙总专项审批。审批流程仅限管理层发起，基层无权限申请。'}],choices:[{label:'放弃监控渠道，转向其他线索',nextScene:'ch12_branch3a'},{label:'尝试提交权限申请',nextScene:'ch12_branch3b'}]},
ch12_branch3a:{tag:'【分支·理性止损】',blocks:[{type:'narration',text:'你瞬间明白这是死胡同，不再浪费时间，直接挂断咨询，转换调查方向。'}],choices:[{label:'__auto__',nextScene:'ch12_merge3'}]},
ch12_branch3b:{tag:'【分支·试探流程】',blocks:[{type:'narration',text:'你点开审批入口，点击申请调取记录，页面即刻弹窗：权限不足、无法发起。'}],choices:[{label:'__auto__',nextScene:'ch12_merge3'}]},
ch12_merge3:{tag:'【汇合】',blocks:[{type:'narration',text:'你确认第二件事：公开制度渠道，全面锁死。查不到，是有人不想让你查到。'}],choices:[{label:'__auto__',nextScene:'ch12_scene4'}]},
ch12_scene4:{tag:'【第二层线索·试探周姐】',blocks:[{type:'narration',text:'你以财务核销归档为由，前往财务部对接周姐。'},{type:'dialogue',text:'你："陈默离职前移交的归档清单，是否全部完整入库？"'},{type:'dialogue',text:'周姐："收到了。移交日期是你们部门上次考核风波前一天，全套凭证齐全。"'},{type:'dialogue',text:'你："她之前是否频繁调取过特殊归档记录？"'},{type:'narration',text:'周姐动作停顿半秒，语气依旧中立。'},{type:'dialogue',text:'周姐："她调过一些报销凭证。具体内容归档了，你可以自己翻翻看。"'}],choices:[{label:'道谢离场，计划后续翻查归档文件',nextScene:'ch12_branch4a',itemGain:'zhoujie_blank_record'},{label:'顺势追问具体文件夹位置',nextScene:'ch12_branch4b'}]},
ch12_branch4a:{tag:'【分支·隐忍蓄力】',blocks:[{type:'narration',text:'你点头道谢，不再多问，清楚周姐的边界，默默记下报销凭证这条关键线索。'},{type:'thought',text:'获得道具：周姐留白对话记录'}],choices:[{label:'__auto__',nextScene:'ch12_merge4'}]},
ch12_branch4b:{tag:'【分支·顺势深挖】',blocks:[{type:'narration',text:'你顺势询问归档路径，周姐只摇头：按流程检索，不单独告知位置。规则之内，绝不破例。'}],choices:[{label:'__auto__',nextScene:'ch12_merge4'}]},
ch12_merge4:{tag:'【汇合】',blocks:[{type:'narration',text:'你确认第三件事：陈默离职前，确实在刻意核查报销类凭证。周姐知情，但恪守中立、不点破、不拦阻。'}],choices:[{label:'__auto__',nextScene:'ch12_scene5'}]},
ch12_scene5:{tag:'【张野短句·唯一坦白】',blocks:[{type:'narration',text:'你返回工位翻查旧档，张野路过，驻足看了你两秒。'},{type:'dialogue',text:'你："你知不知道陈默之前在查什么？"'},{type:'dialogue',text:'张野："她让我别问。"'},{type:'narration',text:'说完，张野径直回位戴回耳机，不再多言。'}],choices:[{label:'__auto__',nextScene:'ch12_scene6'}]},
ch12_scene6:{tag:'【第三层碰壁·人际全员留白】',blocks:[{type:'narration',text:'李姐不说破。周姐只给口子不交底。张野知情但被提前叮嘱。所有人都知道有事发生，所有人都选择闭口不谈。'}],choices:[{label:'__auto__',nextScene:'ch12_scene7'}]},
ch12_scene7:{tag:'【职场承接·你变成了她】',blocks:[{type:'narration',text:'跨部门需求推送至你工位，内容模糊、边界不清、限时当日回复。以往此类扯皮需求，都是陈默先行筛审、挡下模糊漏洞。今日无人兜底。你逐条核对，标注三处需求漏洞，原路退回。'},{type:'dialogue',text:'你："需求不明确，请补充细则后重新推送。"'},{type:'narration',text:'一旁刘伟看完全程，低声感慨。'},{type:'dialogue',text:'刘伟："你刚才说话的样子，有点像陈默。"'},{type:'narration',text:'你没有回应。'}],choices:[{label:'__auto__',nextScene:'ch12_scene8'}]},
ch12_scene8:{tag:'【赵东升升级施压·刻意路过警告】',blocks:[{type:'narration',text:'下午，赵东升空手走入项目部，并非取件，只是路过巡查。目光落在你手边的旧台账上。'},{type:'dialogue',text:'赵东升："还在整理？陈默的东西真不少。"'},{type:'dialogue',text:'你："收尾归档，清理遗留台账。"'},{type:'dialogue',text:'赵东升："有些东西归档就行了，不用细看。细看看不出花来。"'},{type:'narration',text:'话音落下，不等你回应，转身径直离开。'}],choices:[{label:'暂时收起旧档，切换常规工作',nextScene:'ch12_branch5a'},{label:'无视警告，继续翻查归档台账',nextScene:'ch12_branch5b',itemGain:'zhao_double_warning'}]},
ch12_branch5a:{tag:'【分支·暂时蛰伏】',blocks:[{type:'narration',text:'你合上台账，切换日常工作页面，表面顺从收敛，规避当面施压风险。'}],choices:[{label:'__auto__',nextScene:'ch12_merge5'}]},
ch12_branch5b:{tag:'【分支·刚性坚持】',blocks:[{type:'narration',text:'你无动于衷，指尖继续翻查文件，用沉默回应对方的刻意警告。'},{type:'thought',text:'获得道具：赵东升双次警告对话记录'}],choices:[{label:'__auto__',nextScene:'ch12_merge5'}]},
ch12_merge5:{tag:'【汇合】',blocks:[{type:'narration',text:'你清晰感知：第十一章是随口套话，本章是明确传话。你的调查动作，已经被上层紧盯。'}],choices:[{label:'__auto__',nextScene:'ch12_scene9'}]},
ch12_scene9:{tag:'【章末沉淀·疑点落笔】',blocks:[{type:'narration',text:'下班前，你拿出私人笔记本，翻至空白页。'}],choices:[{label:'写下两大核心疑问',nextScene:'ch12_branch6a'},{label:'写下三大追查方向',nextScene:'ch12_branch6b'}]},
ch12_branch6a:{tag:'【分支·聚焦疑点】',blocks:[{type:'narration',text:'笔尖落下：1. 3月12日，陈默入职前进入孙总办公室的目的。2. 针对性清理日志的人是谁。'}],choices:[{label:'__auto__',nextScene:'ch12_chapter_end'}]},
ch12_branch6b:{tag:'【分支·锚定方向】',blocks:[{type:'narration',text:'笔尖落下：1. 核查归档报销凭证。2. 追溯日志清理权限。3. 求证孙总审批锁死的原因。'}],choices:[{label:'__auto__',nextScene:'ch12_chapter_end'}]},
ch12_chapter_end:{tag:'【第十二章·结束】',blocks:[{type:'narration',text:'你合上笔记本，抬眼望向空工位与落灰的旧工装。屏幕亮起。'},{type:'bold',text:'王总：明天中午，天台。'}],choices:[{label:'__auto__',nextScene:'__end__'}]},
// ===== 第十三章·察觉 =====
ch13_scene1:{tag:'【午间前置·细节递进】',blocks:[{type:'narration',text:'午休时段，工位区安静松弛。刘伟端着两杯咖啡走近，递来一杯，目光在你脸上停顿半秒。'},{type:'dialogue',text:'刘伟："你今天不说话的样子，也像陈默了。"'},{type:'narration',text:'你没有回应。'}],choices:[{label:'低头接杯，默认不语',nextScene:'ch13_branch1a'},{label:'抬眼摇头，轻否认',nextScene:'ch13_branch1b'}]},
ch13_branch1a:{tag:'【分支·沉默承接】',blocks:[{type:'narration',text:'你抬手接过咖啡，指尖触到温热杯壁，全程沉默，未做任何辩解。'}],choices:[{label:'__auto__',nextScene:'ch13_merge1'}]},
ch13_branch1b:{tag:'【分支·轻微反驳】',blocks:[{type:'narration',text:'你抬眼看向刘伟，轻轻摇头，没有多余话语，只简单否定评价。'}],choices:[{label:'__auto__',nextScene:'ch13_merge1'}]},
ch13_merge1:{tag:'【汇合】',blocks:[{type:'narration',text:'刘伟笑了笑，端着咖啡返回工位，不再多言。'}],choices:[{label:'__auto__',nextScene:'ch13_scene2'}]},
ch13_scene2:{tag:'【天台赴约·场景复现】',blocks:[{type:'narration',text:'天台风口开阔，风卷着楼宇杂音掠过。王总早已站在栏杆边，背对通道，姿态松弛。第一章的偶遇是碰巧，这一次，是刻意等候。'}],choices:[{label:'主动开口，率先提问',nextScene:'ch13_branch2a'},{label:'安静站立，等对方先开口',nextScene:'ch13_branch2b'}]},
ch13_branch2a:{tag:'【分支·主动求证】',blocks:[{type:'narration',text:'你走近两步，直接开口，直奔核心疑点。'}],choices:[{label:'__auto__',nextScene:'ch13_merge2'}]},
ch13_branch2b:{tag:'【分支·静待主导】',blocks:[{type:'narration',text:'你停在原地，安静伫立，把对话主动权交给王总。'}],choices:[{label:'__auto__',nextScene:'ch13_merge2'}]},
ch13_merge2:{tag:'【汇合·王总指路】',blocks:[{type:'narration',text:'王总闻声转身，目光平静落在你身上。'},{type:'dialogue',text:'王总："还在查？"'},{type:'narration',text:'不等你答复，他接续开口。'},{type:'dialogue',text:'王总："有些事不是不告诉你，是告诉你的时机不对。"'},{type:'dialogue',text:'王总："你坐的那个工位，以前也坐过一个人。他也查过，没查完。"'},{type:'dialogue',text:'你："陈默3月12日下午三点十五分，去孙总办公室做什么？"'},{type:'dialogue',text:'王总："你想查的事，陈默已经查过一遍了。她查到哪一步，你自己去找。"'},{type:'dialogue',text:'你："为什么不能直接告诉我？"'},{type:'dialogue',text:'王总："我说了，你就得替我作证。你现在还不能替我作证。"'},{type:'narration',text:'短暂停顿，他给出唯一突破口。'},{type:'dialogue',text:'王总："报销凭证那边有东西。看完别声张。"'},{type:'narration',text:'话音落地，王总侧身擦肩而过，独自离开天台。全程无揭秘，只指路。'}],choices:[{label:'__auto__',nextScene:'ch13_scene3'}]},
ch13_scene3:{tag:'【午后查档·突破入口】',blocks:[{type:'narration',text:'你返回办公区，依照周姐此前留的规则口子，进入归档文件检索界面。筛选陈默离职前移交的全套财务凭证，逐份翻阅。'}],choices:[{label:'常规翻阅，逐份比对记录',nextScene:'ch13_branch3a'},{label:'调取遗留录音，交叉比对数据',nextScene:'ch13_branch3b',consumeItem:'meeting_recording'}]},
