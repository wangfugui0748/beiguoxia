ch13_branch3a:{tag:'【分支·常规核查】',blocks:[{type:'narration',text:'你匀速翻阅归档文件，专注比对每一笔流转记录，耐心排查异常。'}],choices:[{label:'__auto__',nextScene:'ch13_merge3'}]},
ch13_branch3b:{tag:'【分支·交叉核验】',blocks:[{type:'narration',text:'你调出顺延多章的会议重点录音。孙总在某次全员会上说过——"所有跨部门项目报销，均有合规业务背景，经我本人签字确认。"你将这句话与凭证上的异常流转路径交叉比对，口头承诺与资金实况，完全矛盾。快速锁定异常条目。'},{type:'thought',text:'道具消耗：会议重点录音【已销毁】'}],choices:[{label:'__auto__',nextScene:'ch13_merge3'}]},
ch13_merge3:{tag:'【汇合·疑点落地】',blocks:[{type:'narration',text:'一份竞品部项目报销凭证停在你眼前。流转路径清晰异常：项目经费出库→外部咨询中转→私人账户收尾。单据终审签字栏，落款：孙总。凭证扉页角落，有一枚极淡的铅笔浅痕，是陈默惯用的标记笔迹。'},{type:'narration',text:'第十一章的便利贴疑点，此刻闭环落地。陈默入职前紧盯孙总办公室，不是针对人事、不是针对工作矛盾。她从一开始，就在查资金流转异常。'}],choices:[{label:'__auto__',nextScene:'ch13_scene4'}]},
ch13_scene4:{tag:'【互动4·异常凭证处置】',blocks:[{type:'narration',text:'面对这份陈默标记过的异常凭证，你如何处置？'}],choices:[{label:'截图留存异常流转记录',nextScene:'ch13_branch4a',itemGain:'abnormal_fund_record'},{label:'默记信息，原位归档不留痕迹',nextScene:'ch13_branch4b'}]},
ch13_branch4a:{tag:'【分支·留存证据】',blocks:[{type:'narration',text:'你精准截取凭证页面，保存孙总签字与异常流转路径，固化核心线索。'},{type:'thought',text:'获得道具：竞品部异常资金流转记录'}],choices:[{label:'__auto__',nextScene:'ch13_merge4'}]},
ch13_branch4b:{tag:'【分支·无痕探查】',blocks:[{type:'narration',text:'你没有留存任何截图，默默记下所有关键信息，将凭证原位归回，杜绝任何探查痕迹。'}],choices:[{label:'__auto__',nextScene:'ch13_merge4'}]},
ch13_merge4:{tag:'【汇合】',blocks:[{type:'narration',text:'你合上归档文件夹，结束核查，返回工位。'}],choices:[{label:'__auto__',nextScene:'ch13_scene5'}]},
ch13_scene5:{tag:'【系统封路·权限精准降级】',blocks:[{type:'narration',text:'你再次打开OA归档目录，尝试调取同类财务凭证存档。页面弹出提示：权限不足。点开个人权限日志，权限变更记录清晰。今日、凭证核查结束后一小时内，系统权限自动变更。归档文件查阅权限，从部门级降级为个人级。'}],choices:[{label:'截图保存权限降级日志',nextScene:'ch13_branch5a',itemGain:'oa_permission_downgrade'},{label:'关闭页面，不动声色无视变更',nextScene:'ch13_branch5b'}]},
ch13_branch5a:{tag:'【分支·留存封路证据】',blocks:[{type:'narration',text:'你截取权限降级时间、变更条目，完整留存对方针对性封路的实证。'},{type:'thought',text:'获得道具：OA权限降级日志截屏'}],choices:[{label:'__auto__',nextScene:'ch13_merge5'}]},
ch13_branch5b:{tag:'【分支·隐忍蛰伏】',blocks:[{type:'narration',text:'你看完变更记录，直接关闭页面，全程无任何操作，不露破绽。'}],choices:[{label:'__auto__',nextScene:'ch13_merge5'}]},
ch13_merge5:{tag:'【汇合】',blocks:[{type:'narration',text:'你确认核心现状：对方不是事前拦截，是实时监控、看完即封。你的每一步探查，都在视线之内。'}],choices:[{label:'__auto__',nextScene:'ch13_scene6'}]},
ch13_scene6:{tag:'【孤立无援·伏笔回收】',blocks:[{type:'narration',text:'技术权限被封，你下意识转头看向张野工位。张野戴着耳机，姿态静默，隔绝所有周遭声响。脑海闪过两段伏笔：第一章他莫名被约谈、第十二章他那句「她让我别问」。'}],choices:[{label:'起身开口，尝试询问张野',nextScene:'ch13_branch6a'},{label:'收回目光，放弃求助',nextScene:'ch13_branch6b'}]},
ch13_branch6a:{tag:'【分支·尝试试探】',blocks:[{type:'narration',text:'你微微起身，视线落在张野身上，最终还是停顿止步。你清晰知晓，开口即是连累，陈默当年的叮嘱，是在护他。'}],choices:[{label:'__auto__',nextScene:'ch13_merge6'}]},
ch13_branch6b:{tag:'【分支·主动回避】',blocks:[{type:'narration',text:'你直接收回目光，彻底压下求助念头，主动避开唯一的技术支援，选择独自承压。'}],choices:[{label:'__auto__',nextScene:'ch13_merge6'}]},
ch13_merge6:{tag:'【汇合】',blocks:[{type:'narration',text:'你彻底确认当下处境：无人可问、无人可帮、无路可直查。'}],choices:[{label:'__auto__',nextScene:'ch13_chapter_end'}]},
ch13_chapter_end:{tag:'【第十三章·结束】',blocks:[{type:'narration',text:'你翻开私人笔记本，落笔写下两条确认。一、陈默全程在查孙总签字的异常资金流转。二、对方实时监控，针对性封死调查路径。笔尖停顿，落下本章最终决意。'},{type:'bold',text:'换个方式查。'},{type:'narration',text:'手边文件堆叠过多，你抬手将多余卷宗随手放在陈默空置工位的桌面。左侧空工位堆放着文件，一旁阿杰的旧工装静静搭在椅上。张野始终低头静坐，全程未抬头。手机无新消息，天台那句「你现在还不能替我作证」在脑海回荡。'}],choices:[{label:'__auto__',nextScene:'__end__'}]},
// ===== 第十四章·封路 =====
ch14_scene1:{tag:'【晨间开篇·全域新规落地】',blocks:[{type:'narration',text:'上午九点，公司OA弹出全员置顶公告，孙总签发。标题：《关于优化跨部门协作及档案查阅流程的通知》。核心条款：所有跨部门电子归档文件查阅，需部门负责人+分管领导双签审批。项目部档案查阅权限，暂由赵东升代管审批。'},{type:'narration',text:'李姐点开公告，快速浏览完毕，页面关闭。'},{type:'dialogue',text:'李姐："以后查归档资料，先走正式流程。"'}],choices:[{label:'点开细则，逐字核对条款范围',nextScene:'ch14_branch1a'},{label:'暂时搁置页面，正常开启当日工作',nextScene:'ch14_branch1b'}]},
ch14_branch1a:{tag:'【分支·深究规则】',blocks:[{type:'narration',text:'你拖动页面，逐条研读新规细则，重点标注管辖范围与权限边界，不放过任何漏洞。'}],choices:[{label:'__auto__',nextScene:'ch14_merge1'}]},
ch14_branch1b:{tag:'【分支·低调蛰伏】',blocks:[{type:'narration',text:'你简单扫读公告核心内容，不点细则、不做停留，快速切回工作页面，全程低调不露异动。'}],choices:[{label:'__auto__',nextScene:'ch14_merge1'}]},
ch14_merge1:{tag:'【汇合】',blocks:[{type:'narration',text:'新规全文锁定电子归档、OA留档文件，无任何文字提及财务部纸质原始凭证。'}],choices:[{label:'__auto__',nextScene:'ch14_scene2'}]},
ch14_scene2:{tag:'【午后变动·赵东升入驻项目部】',blocks:[{type:'narration',text:'下午工位调整，赵东升搬入项目部办公区。他未选择陈默空置工位，落座于陈默工位旁空置位置，与你直线距离两米。摆放电脑、整理文具，动作从容自然。'},{type:'dialogue',text:'赵东升："以后我这边常驻办公，工作上有需要尽管说。"'}],choices:[{label:'__auto__',nextScene:'ch14_scene3'}]},
ch14_scene3:{tag:'【日常细节·氛围彻底转变】',blocks:[{type:'narration',text:'赵东升落座后，项目部闲聊声、细碎交流全部消失。他起身倒水，经过你工位时脚步放慢，目光扫过你的屏幕。没有停，没有说话。走过去，坐下。午休时段，刘伟取出一次性纸杯，独自接水冲泡咖啡。延续多章的三人分咖啡仪式，彻底终止。'}],choices:[{label:'余光留意，不动声色继续工作',nextScene:'ch14_branch2a'},{label:'抬眼扫视一圈办公区布局变化',nextScene:'ch14_branch2b'}]},
ch14_branch2a:{tag:'【分支·隐忍克制】',blocks:[{type:'narration',text:'你全程专注屏幕，仅用余光感知周遭变动，无任何多余动作与视线。'}],choices:[{label:'__auto__',nextScene:'ch14_merge2'}]},
ch14_branch2b:{tag:'【分支·全局审视】',blocks:[{type:'narration',text:'你抬眼扫过全场，清晰确认：赵东升落座后，整个办公区的气场、节奏、氛围全部被改写。'}],choices:[{label:'__auto__',nextScene:'ch14_merge2'}]},
ch14_merge2:{tag:'【汇合】',blocks:[{type:'narration',text:'两米距离，无死角视野。你此前堆放在陈默空工位的文件，被赵东升顺手整理平整，整齐堆叠在桌角。无告知、无询问，动作客气自然，却彻底侵占了这片空位的专属感。'}],choices:[{label:'__auto__',nextScene:'ch14_scene4'}]},
ch14_scene4:{tag:'【匿名警告·未知施压】',blocks:[{type:'narration',text:'OA站内弹出临时消息提醒。发件人：系统禁用账号，无法查看信息、无法回复、无法追溯。'},{type:'bold',text:'消息内容：别再查了。下次不是降权限。'},{type:'narration',text:'消息弹出数秒后，发件账号状态同步更新：已永久禁用。'}],choices:[{label:'立刻截图留存消息记录',nextScene:'ch14_branch3a',itemGain:'anonymous_warning'},{label:'看完直接关闭弹窗，清空未读提示',nextScene:'ch14_branch3b'}]},
ch14_branch3a:{tag:'【分支·留存证据】',blocks:[{type:'narration',text:'你快速截取消息界面，完整留存匿名警告内容与禁用账号状态，锁定未知威胁线索。'},{type:'thought',text:'获得道具：匿名OA警告消息截屏'}],choices:[{label:'__auto__',nextScene:'ch14_merge3'}]},
ch14_branch3b:{tag:'【分支·无痕处理】',blocks:[{type:'narration',text:'你看完警告内容，直接关闭弹窗，清空所有痕迹，避免留下任何被核查的记录。'}],choices:[{label:'__auto__',nextScene:'ch14_merge3'}]},
ch14_merge3:{tag:'【汇合】',blocks:[{type:'narration',text:'无署名、无来源、无痕迹。你无法判定这是恶意警告，还是暗中提醒。办公室内，另有未知之人知晓你的所有探查动作。'}],choices:[{label:'__auto__',nextScene:'ch14_scene5'}]},
ch14_scene5:{tag:'【寻找裂缝·锁定纸质凭证漏洞】',blocks:[{type:'narration',text:'你重新对照新规细则与公司财务制度。电子归档、OA留档已被双签锁死，彻底无探查空间。财务原始纸质凭证，按审计制度必须长期留存，不归本次新规管辖。第十三章周姐留存的报销凭证入口，纸质原件仍封存于财务部档案柜。封路封尽了电子渠道，唯独漏掉了纸质存档。'}],choices:[{label:'默记纸质凭证漏洞，等待时机',nextScene:'ch14_branch4a'},{label:'标注制度条款，留存规则依据',nextScene:'ch14_branch4b',itemGain:'sun_new_rule_loophole'}]},
ch14_branch4a:{tag:'【分支·暗蓄时机】',blocks:[{type:'narration',text:'你将这条唯一裂缝牢牢记在心里，不做任何纸面记录，静待合适的探查时机。'}],choices:[{label:'__auto__',nextScene:'ch14_merge4'}]},
ch14_branch4b:{tag:'【分支·固化依据】',blocks:[{type:'narration',text:'你截图留存财务制度条款与新规细则对比，明确纸质凭证的合规查阅空间，固化突破口依据。'},{type:'thought',text:'获得道具：孙总新规全文+纸质凭证漏洞标注'}],choices:[{label:'__auto__',nextScene:'ch14_merge4'}]},
ch14_merge4:{tag:'【汇合】',blocks:[{type:'narration',text:'你确认：孙总全力封死所有明线探查渠道，却被动暴露了最关键的暗线入口。封路，封错了门。'}],choices:[{label:'__auto__',nextScene:'ch14_scene6'}]},
ch14_scene6:{tag:'【试探通路·借报销掩护进场】',blocks:[{type:'narration',text:'你取出常规报销核销单，整理完毕，起身准备前往财务部。两米外的赵东升抬头，视线精准落在你身上。'},{type:'dialogue',text:'赵东升："去财务？"'},{type:'dialogue',text:'你："核销本月常规报销单据。"'},{type:'dialogue',text:'赵东升："报销找周姐直接签就行，不用绕。"'}],choices:[{label:'点头应声，低调离场',nextScene:'ch14_branch5a'},{label:'简单应答，不多赘述',nextScene:'ch14_branch5b'}]},
ch14_branch5a:{tag:'【分支·顺从回应】',blocks:[{type:'narration',text:'你轻轻点头，默认对方说辞，手持单据安静离开工位，不产生任何多余交流。'}],choices:[{label:'__auto__',nextScene:'ch14_merge5'}]},
ch14_branch5b:{tag:'【分支·简洁回应】',blocks:[{type:'narration',text:'你简单应声答复，无多余解释，径直迈步走向财务部，态度平和疏离。'}],choices:[{label:'__auto__',nextScene:'ch14_merge5'}]},
ch14_merge5:{tag:'【汇合·财务部试探】',blocks:[{type:'narration',text:'你抵达财务部，周姐正常对接报销流程，依规核销签字。全程流程合规、无异常、无阻拦。你未借机探查旧档，仅完成本职工作。此行唯一目的：确认——报销，是进入财务部最合理、无破绽的永久掩护。'}],choices:[{label:'__auto__',nextScene:'ch14_scene7'}]},
ch14_scene7:{tag:'【互动6·章末落笔定方向】',blocks:[{type:'narration',text:'回到工位，你翻开私人笔记本。'}],choices:[{label:'笔记本写下：纸质',nextScene:'ch14_branch6a'},{label:'笔记本写下：财务',nextScene:'ch14_branch6b'}]},
ch14_branch6a:{tag:'【分支·精准锚点】',blocks:[{type:'narration',text:'你翻开私人笔记本，落笔二字，精准锁定下一章核心探查目标。'}],choices:[{label:'__auto__',nextScene:'ch14_chapter_end'}]},
ch14_branch6b:{tag:'【分支·范围锚点】',blocks:[{type:'narration',text:'你笔尖落下，标注核心探查范围，明确后续行动阵地。'}],choices:[{label:'__auto__',nextScene:'ch14_chapter_end'}]},
ch14_chapter_end:{tag:'【第十四章·结束】',blocks:[{type:'narration',text:'傍晚下班，赵东升收拾工位，语气平和。'},{type:'dialogue',text:'赵东升："明天见。"'},{type:'narration',text:'他率先离开项目部。办公区彻底安静，只剩你一人。陈默空工位上的文件被整理得整齐规整，彻底褪去旧日主人的痕迹。一旁阿杰的旧工装静静搭在椅背上，绳结褪色。无人发消息、无人天台约谈、无人指引方向。'},{type:'thought',text:'严密封锁之下，唯一的裂缝已经找到。明天监视依旧在场，行动必须提前。'}],choices:[{label:'__auto__',nextScene:'__end__'}]},
// ===== 第十五章·底牌 =====
ch15_scene1:{tag:'【上午值守·监视常态】',blocks:[{type:'narration',text:'整个上午，项目部氛围紧绷。赵东升落座两米开外，全程在岗，正常处理工作，无多余动作，却牢牢锁住整片工位区视野。全员静默办公，无人闲聊，无人走动。'}],choices:[{label:'专注本职，全程低调蛰伏',nextScene:'ch15_branch1a'},{label:'余光观察赵东升动向，伺机等待',nextScene:'ch15_branch1b'}]},
ch15_branch1a:{tag:'【分支·沉稳蛰伏】',blocks:[{type:'narration',text:'你埋头处理日常工作，屏幕页面固定本职内容，无任何异动，彻底隐藏探查意图。'}],choices:[{label:'__auto__',nextScene:'ch15_merge1'}]},
ch15_branch1b:{tag:'【分支·伺机观望】',blocks:[{type:'narration',text:'你一边完成手头工作，一边时刻留意赵东升的动作与手机动静，等待离场窗口期。'}],choices:[{label:'__auto__',nextScene:'ch15_merge1'}]},
ch15_merge1:{tag:'【汇合】',blocks:[{type:'narration',text:'时间稳步推进，十点半，赵东升手机震动。他拿起手机看了一眼，起身收拾桌面文件。'},{type:'dialogue',text:'赵东升："去开个短会，有事找李姐。"'},{type:'narration',text:'话音落下，径直离开项目部。'}],choices:[{label:'__auto__',nextScene:'ch15_scene2'}]},
ch15_scene2:{tag:'【短暂松弛·环境细节变化】',blocks:[{type:'narration',text:'赵东升离场瞬间，工位区紧绷的空气骤然松动。刘伟抬手拿起搁置多日的马克杯，接水喝水，全程沉默，未发一言。松弛只是片刻，无人敢打破沉寂，被压抑的氛围早已固化。'}],choices:[{label:'等待五分钟，确认无折返可能再行动',nextScene:'ch15_branch2a'},{label:'即刻起身，抓住短暂空档出发',nextScene:'ch15_branch2b'}]},
ch15_branch2a:{tag:'【分支·谨慎稳妥】',blocks:[{type:'narration',text:'你压下急切心态，静坐等待五分钟，确认走廊无脚步声、无折返动静，彻底锁死安全窗口。'}],choices:[{label:'__auto__',nextScene:'ch15_merge2'}]},
ch15_branch2b:{tag:'【分支·果断行动】',blocks:[{type:'narration',text:'你不再迟疑，抓起提前备好的报销单据，立刻起身，抢抓最短探查窗口。'}],choices:[{label:'__auto__',nextScene:'ch15_merge2'}]},
ch15_merge2:{tag:'【汇合】',blocks:[{type:'narration',text:'你手持报销单，迈步前往财务部，以常规核销工作为唯一掩护。'}],choices:[{label:'__auto__',nextScene:'ch15_scene3'}]},
ch15_scene3:{tag:'【财务部·规则留痕】',blocks:[{type:'narration',text:'财务部安静规整，周姐端坐工位。她接过你的报销单据，指尖扫过单据页面。'},{type:'dialogue',text:'你："本次报销金额需要核对往期标准，想查阅一下往期归档的原始凭证。"'},{type:'narration',text:'周姐抬眼看向你，目光平静，不拆穿、不追问。她抽出一张《财务档案查阅登记表》，推至你面前。'},{type:'dialogue',text:'周姐："纸质凭证查阅需要登记。填表，签字，注明查阅事由。"'}],choices:[{label:'如实填写工作核对事由，规范签字留痕',nextScene:'ch15_branch3a',itemGain:'finance_register_record'},{label:'简洁填写事由，快速完成登记',nextScene:'ch15_branch3b',itemGain:'finance_register_record'}]},
ch15_branch3a:{tag:'【分支·规范合规】',blocks:[{type:'narration',text:'你认真填写表格信息，注明报销标准核对事由，工整签字，全程合规无漏洞。'},{type:'thought',text:'获得道具：财务档案查阅登记表留底'}],choices:[{label:'__auto__',nextScene:'ch15_merge3'}]},
ch15_branch3b:{tag:'【分支·高效极简】',blocks:[{type:'narration',text:'你简洁填写核心信息，快速签字完成登记，最大限度缩短停留时间。'},{type:'thought',text:'获得道具：财务档案查阅登记表留底'}],choices:[{label:'__auto__',nextScene:'ch15_merge3'}]},
ch15_merge3:{tag:'【汇合】',blocks:[{type:'narration',text:'周姐收好登记表，起身走向档案柜，取出专属凭证档案盒，递至你手中。'},{type:'dialogue',text:'周姐："看完放回档案盒，不要带走。"'}],choices:[{label:'__auto__',nextScene:'ch15_scene4'}]},
ch15_scene4:{tag:'【底牌现世·资金链实锤】',blocks:[{type:'narration',text:'档案盒内，陈默移交的归档凭证完整留存。第十三章发现的单笔异常流转纸质原件清晰可查：项目经费转出、外部咨询中转、私人账户收尾，终审签字——孙总。继续翻阅，两笔同制式凭证依次浮现。三笔资金流转路径完全一致，时间间隔规律，按月周期性流转。账户名称各不相同，但三张汇款凭证的收款开户行，全部为盛恒商业银行。'}],choices:[{label:'逐笔拍摄凭证关键页面，完整留存证据',nextScene:'ch15_branch4a',itemGain:'three_voucher_photos'},{label:'重点拍摄核心签字、银行信息，精简留存',nextScene:'ch15_branch4b',itemGain:'three_voucher_photos'}]},
ch15_branch4a:{tag:'【分支·全面留证】',blocks:[{type:'narration',text:'你手持手机，逐页拍摄每笔异常凭证的签字、流转路径、银行信息，完整固化底牌证据。'},{type:'thought',text:'获得道具：三笔异常资金流转凭证照片'}],choices:[{label:'__auto__',nextScene:'ch15_merge4'}]},
ch15_branch4b:{tag:'【分支·精准留证】',blocks:[{type:'narration',text:'你只聚焦核心关键信息，精准拍摄孙总签字与盛恒商业银行落款，快速留存核心线索。'},{type:'thought',text:'获得道具：三笔异常资金流转凭证照片'}],choices:[{label:'__auto__',nextScene:'ch15_merge4'}]},
ch15_merge4:{tag:'【汇合】',blocks:[{type:'narration',text:'拍完所有凭证，你将文件规整放回档案盒，交还周姐，全程未带走任何纸质原件。核销完报销单据，手持回执与几张归档清单复印件，离开财务部。'}],choices:[{label:'__auto__',nextScene:'ch15_scene5'}]},
ch15_scene5:{tag:'【走廊遇袭·代价落地】',blocks:[{type:'narration',text:'办公区走廊拐角，赵东升迎面走来。短会提前结束。他的视线第一时间落在你手中的文件上，扫过回执，定格在归档清单复印件上。'},{type:'dialogue',text:'赵东升："这么快就核完了？"'},{type:'dialogue',text:'你："报销核对完毕，顺便调取归档清单对照标准。"'},{type:'dialogue',text:'赵东升："归档清单？翻旧档核报销，够仔细的。"'},{type:'narration',text:'他没有拦停、没有核查、没有追责。两句平淡对话，已然确认：你的旧档探查动作，彻底暴露。'}],choices:[{label:'神色平淡，侧身避让离开',nextScene:'ch15_branch5a'},{label:'点头回应，稳步从容返回工位',nextScene:'ch15_branch5b'}]},
ch15_branch5a:{tag:'【分支·淡然处之】',blocks:[{type:'narration',text:'你神色不变，简单应声，侧身避让走廊通道，径直返回工位。'}],choices:[{label:'__auto__',nextScene:'ch15_merge5'}]},
ch15_branch5b:{tag:'【分支·从容镇定】',blocks:[{type:'narration',text:'你点头回应，姿态从容，不慌不怯，稳步走回项目部。'}],choices:[{label:'__auto__',nextScene:'ch15_merge5'}]},
ch15_merge5:{tag:'【汇合】',blocks:[{type:'narration',text:'你落座工位。五分钟后，赵东升同步返回，落座两米开外。两人静默对坐，全程无交流，工位区空气彻底凝固。你手机屏幕朝下扣在桌面，隐藏所有凭证照片。赵东升偶尔抬眼扫视，视线落点始终在你桌面、屏幕与手边文件上。'}],choices:[{label:'__auto__',nextScene:'ch15_scene6'}]},
ch15_scene6:{tag:'【章末深挖·钱四海登场】',blocks:[{type:'narration',text:'下班，全员离场。项目部只剩你一人。陈默空工位依旧保持被赵东升整理过的规整模样，彻底褪去私人痕迹。阿杰的旧工装搭在椅背，安静伫立。你点亮手机，检索盛恒商业银行背景信息。页面信息清晰弹出：盛恒商业银行，控股方——四海集团。四海集团法定代表人——钱四海。'},{type:'narration',text:'你盯着"钱四海"三个字，看了很久。便利贴上那个日期。天台上那句"你现在还不能替我作证"。凭证上孙总的签字。所有碎片在这一刻同时指向同一个名字。'}],choices:[{label:'写下完整证据关联链',nextScene:'ch15_branch6a',itemGain:'qiansihai_link'},{label:'写下核心抉择问句',nextScene:'ch15_branch6b'}]},
ch15_branch6a:{tag:'【分支·梳理证据链】',blocks:[{type:'narration',text:'你翻开笔记本，落笔梳理完整线索：孙总签字→月度异常资金流转→盛恒商业银行→四海集团→钱四海。陈默入职前探查目标，直指这条外部资金暗线。'},{type:'thought',text:'获得道具：四海集团-钱四海关联检索记录'}],choices:[{label:'__auto__',nextScene:'ch15_chapter_end'}]},
ch15_branch6b:{tag:'【分支·锚定核心抉择】',blocks:[{type:'narration',text:'你落笔写下本章终极疑问：要不要亮身份？对手已不止内部孙总，外部牵连更广，普通员工身份已不足以支撑探查。'}],choices:[{label:'__auto__',nextScene:'ch15_chapter_end'}]},
ch15_chapter_end:{tag:'【第十五章·结束】',blocks:[{type:'narration',text:'你合上笔记本。手机相册留存三张核心凭证照片，财务部留存你的查阅登记痕迹，赵东升掌握你的探查方向，全新的外部对手浮出水面。无天台邀约、无陌生消息、无人指引。底牌在手，前路两难。'}],choices:[{label:'__auto__',nextScene:'__end__'}]},
// ===== 第十六章·抉择 =====
ch16_scene1:{tag:'【上午官宣·定点约谈】',blocks:[{type:'narration',text:'上午工作时段，OA弹出定点通知，仅对你可见。主题：新员工入职阶段性沟通。时间：今日下午两点。地点：孙总办公室。'}],choices:[{label:'静默查看，关闭页面继续工作',nextScene:'ch16_branch1a'},{label:'留存通知截图，默默记下行事节点',nextScene:'ch16_branch1b'}]},
ch16_branch1a:{tag:'【分支·低调蛰伏】',blocks:[{type:'narration',text:'你快速扫读通知内容，随即关闭页面，若无其事回归本职工作，不显露任何情绪异动。'}],choices:[{label:'__auto__',nextScene:'ch16_merge1'}]},
ch16_branch1b:{tag:'【分支·留存痕迹】',blocks:[{type:'narration',text:'你截图留存约谈通知，锁定时间节点，将这条针对性约谈记录固化留存。'}],choices:[{label:'__auto__',nextScene:'ch16_merge1'}]},
ch16_merge1:{tag:'【汇合】',blocks:[{type:'narration',text:'两米外的赵东升全程安静办公，未曾抬头，却像早已知晓一切。项目部的空气，再次沉了下去。'}],choices:[{label:'__auto__',nextScene:'ch16_scene2'}]},
ch16_scene2:{tag:'【下午两点·孙总办公室约谈】',blocks:[{type:'narration',text:'办公室门闭合，环境安静松弛，无严肃压迫的刻意氛围。孙总端坐办公桌后，姿态温和，神色平淡，全然是前辈关怀后辈的模样。'},{type:'dialogue',text:'孙总："来公司大半个月了，感觉怎么样？项目部的工作节奏还适应吗？"'}],choices:[{label:'平稳应答，适配节奏、正常适应',nextScene:'ch16_branch2a'},{label:'谦逊回应，多学习、稳步跟进',nextScene:'ch16_branch2b'}]},
ch16_branch2a:{tag:'【分支·沉稳应答】',blocks:[{type:'dialogue',text:'你："节奏可以适应，日常工作都能稳步完成。"'}],choices:[{label:'__auto__',nextScene:'ch16_merge2'}]},
ch16_branch2b:{tag:'【分支·谦逊应答】',blocks:[{type:'dialogue',text:'你："整体很适应，还有很多需要学习的地方，一直在跟进熟悉。"'}],choices:[{label:'__auto__',nextScene:'ch16_merge2'}]},
ch16_merge2:{tag:'【汇合·温柔封口】',blocks:[{type:'narration',text:'孙总微微点头，语气依旧温和，缓缓切入核心。'},{type:'dialogue',text:'孙总："最近听说你很上心工作，主动熟悉公司流程，翻了不少旧档。学习态度很好。"'},{type:'narration',text:'短暂停顿，语气不变，力道加重。'},{type:'dialogue',text:'孙总："不过有些旧档涉及跨部门协作，翻多了容易让人误会。你是新员工，我不希望你因为这些事，影响后续发展。"'},{type:'dialogue',text:'孙总："以后有什么想了解的，直接问赵东升就行。他经验丰富，比自己翻旧档高效稳妥。"'},{type:'narration',text:'全程无指责、无质问、无狠话。句句是关怀，句句是封口。'}],choices:[{label:'__auto__',nextScene:'ch16_scene3'}]},
ch16_scene3:{tag:'【离场回流·职场无声信号】',blocks:[{type:'narration',text:'你走出办公室，返回项目部。赵东升抬头扫了你一眼，随即低头继续工作，无询问、无言语。李姐路过工位，默默放下一杯温水，无声离开。无人言语，但所有人都清楚：被孙总单独约谈，从来不是好事。陈默离开前，也经历过这一幕。'}],choices:[{label:'收下温水，静坐平复状态',nextScene:'ch16_branch3a'},{label:'目视李姐，轻轻点头示意',nextScene:'ch16_branch3b'}]},
ch16_branch3a:{tag:'【分支·静默接纳】',blocks:[{type:'narration',text:'你看着桌面的水杯，端坐工位，不言不语，默默消化约谈传递的警告信号。'}],choices:[{label:'__auto__',nextScene:'ch16_merge3'}]},
ch16_branch3b:{tag:'【分支·礼貌回应】',blocks:[{type:'narration',text:'你抬眼看向李姐背影，轻轻点头，接纳这份无声的提点与关照。'}],choices:[{label:'__auto__',nextScene:'ch16_merge3'}]},
ch16_merge3:{tag:'【汇合】',blocks:[{type:'narration',text:'工位区依旧静默，温柔的警告落地，无声的禁锢彻底成型。'}],choices:[{label:'__auto__',nextScene:'ch16_scene4'}]},
ch16_scene4:{tag:'【线索实锤·登记表被查】',blocks:[{type:'narration',text:'午休过后，刘伟趁无人注意，侧身低声传话。'},{type:'dialogue',text:'刘伟："上午赵东升去过财务部，说是核对项目部报销流程，待了挺久。"'},{type:'narration',text:'你起身前往财务部。周姐神色如常，做事规整，语气比往日更为审慎。'},{type:'dialogue',text:'周姐："报销核销正常走流程。登记表属于财务内部档案，按制度不外传。"'},{type:'narration',text:'停顿半秒，她直白告知底线与现状。'},{type:'dialogue',text:'周姐："但有人问询，我只能如实报备。你来查过、填表、签字，全程合规，不怕核查，但也藏不住。"'},{type:'narration',text:'真相落地：赵东升已经核查登记痕迹，孙总所有约谈警告，全部有据可依，绝非猜测。'}],choices:[{label:'__auto__',nextScene:'ch16_scene5'}]},
ch16_scene5:{tag:'【关键指令·王总四字私信】',blocks:[{type:'narration',text:'你返回工位，OA页面弹出专属私讯。发件人：王总。内容无多余铺垫，仅有四字。'},{type:'bold',text:'别亮身份。'}],choices:[{label:'截图留存私信，锁定长线伏笔',nextScene:'ch16_branch4a',itemGain:'wang_dont_reveal'},{label:'默记指令，关闭页面隐藏痕迹',nextScene:'ch16_branch4b'}]},
ch16_branch4a:{tag:'【分支·固化线索】',blocks:[{type:'narration',text:'你快速截图留存这条私信，将王总的关键指令完整固化为证据道具。'},{type:'thought',text:'获得道具：王总OA私信「别亮身份」截屏'}],choices:[{label:'__auto__',nextScene:'ch16_merge4'}]},
ch16_branch4b:{tag:'【分支·无痕留存】',blocks:[{type:'narration',text:'你反复确认四字指令，默记于心，随即关闭页面，不留下任何可视痕迹。'}],choices:[{label:'__auto__',nextScene:'ch16_merge4'}]},
ch16_merge4:{tag:'【汇合】',blocks:[{type:'narration',text:'王总精准命中了你心底未说出口的抉择。无人知晓的思考，被一语道破。暗中观察、全程掌舵的姿态彻底坐实。'}],choices:[{label:'__auto__',nextScene:'ch16_scene6'}]},
ch16_scene6:{tag:'【傍晚细节·最后一杯咖啡】',blocks:[{type:'narration',text:'下班前夕，办公区众人陆续收尾工作。刘伟端着两杯咖啡走来，递出一杯给你，自己手持一杯。'},{type:'dialogue',text:'刘伟："今天没人给端咖啡了吧。最后两杯。明天开始，各自泡各自的。"'},{type:'narration',text:'你接过咖啡，喝了一口。速溶的，纸杯外没有裹餐巾纸。你想起第一天到岗，陈默放了一杯咖啡在你桌上，纸杯外裹着皱巴巴的餐巾纸。她当时没看你，看的是你屏幕上的考核倒计时。十四天。你那时候觉得这个数字很长。'}],choices:[{label:'安静接过，默然点头',nextScene:'ch16_branch5a'},{label:'轻声道谢，平稳接下',nextScene:'ch16_branch5b'}]},
ch16_branch5a:{tag:'【分支·无声默契】',blocks:[{type:'narration',text:'你抬手接过咖啡，微微点头，无需言语，彼此心知局势变化。'}],choices:[{label:'__auto__',nextScene:'ch16_merge5'}]},
ch16_branch5b:{tag:'【分支·礼貌回应】',blocks:[{type:'dialogue',text:'你："谢了。"'}],choices:[{label:'__auto__',nextScene:'ch16_merge5'}]},
ch16_merge5:{tag:'【汇合】',blocks:[{type:'narration',text:'两人并肩喝完这杯咖啡。多季以来的旁观、沉默、忐忑，尽数融在温热的杯盏里。'}],choices:[{label:'__auto__',nextScene:'ch16_scene7'}]},
ch16_scene7:{tag:'【主动破局·邀约结盟】',blocks:[{type:'narration',text:'刘伟收拾好随身物品，准备下班离场。'},{type:'dialogue',text:'你："刘伟，下班有空吗？请你喝杯咖啡。"'},{type:'narration',text:'刘伟动作一顿，愣神片刻，随即轻轻点头。'}],choices:[{label:'__auto__',nextScene:'ch16_scene8'}]},
ch16_scene8:{tag:'【场外约谈·小人物的勇气】',blocks:[{type:'narration',text:'公司附近咖啡店，暮色落地，环境安静私密。两人对坐，无多余寒暄。'},{type:'dialogue',text:'你："陈默被开除，大概率和她之前在查的事有关。我不细说内情，只需要你帮我一个忙。"'},{type:'dialogue',text:'刘伟："什么忙？"'},{type:'dialogue',text:'你："帮我盯着赵东升。他什么时候到岗、什么时候离岗、什么时候去财务部、有没有异常动向。你是项目部最不起眼的人，他不会设防。"'},{type:'narration',text:'刘伟低头看着面前的咖啡杯，沉默良久。'},{type:'dialogue',text:'刘伟："陈默在的时候，我也帮她跑过腿。我不知道她查的是什么，后来她被开除，我真的怕了。"'},{type:'narration',text:'他抬眼看向你，眼底藏着忐忑，也藏着积压多季的愧疚。'},{type:'dialogue',text:'刘伟："但我天天看着你翻旧档、被警告、被堵路、被约谈。我每天只会端咖啡，什么忙都帮不上。"'},{type:'dialogue',text:'刘伟："赵东升的动向，我帮你看着。"'}],choices:[{label:'沉稳点头，敲定默契',nextScene:'ch16_branch6a'},{label:'轻声应声，确认约定',nextScene:'ch16_branch6b'}]},
ch16_branch6a:{tag:'【分支·无声笃定】',blocks:[{type:'narration',text:'你看着他，郑重点头，无需多言，两人达成无声默契。'}],choices:[{label:'__auto__',nextScene:'ch16_chapter_end'}]},
ch16_branch6b:{tag:'【分支·简短确认】',blocks:[{type:'dialogue',text:'你："辛苦。后续我只找你对接动向。"'}],choices:[{label:'__auto__',nextScene:'ch16_chapter_end'}]},
ch16_chapter_end:{tag:'【第十六章·结束】',blocks:[{type:'narration',text:'两人起身离店，街灯亮起，暮色笼罩街道。刘伟走了两步，忽然回头。'},{type:'dialogue',text:'刘伟："陈默以前，也请我喝过咖啡。"'},{type:'narration',text:'一句话轻描淡写，悄然将你的坚持，与陈默当年的坚守重合。刘伟转身汇入人流，独自离场。你独自折返公司方向。翻开私人笔记本，昨日写下的「要不要亮身份」旁，你落笔新的一行：不亮。找帮手。'},{type:'narration',text:'空荡的项目部工位区，陈默的空位依旧是被整理过的规整模样，阿杰的旧工装搭在椅背，褪色绳结静静伫立，见证着新一轮的暗局开启。前路依旧被监视、被封堵、被试探，但你不再孤军奋战。'}],choices:[{label:'__auto__',nextScene:'__end__'}]},
// ===== 第十七章·暗线 =====
ch17_scene1:{tag:'【上午工位·新掩护成型】',blocks:[{type:'narration',text:'项目部日常在岗状态。赵东升端坐两米外工位，全程紧盯办公区动态。刘伟彻底终止端咖啡习惯，全程以接水为唯一移动掩护，频繁起身、缓步走动，视线自然扫过赵东升桌面。无人察觉异常，旧的工位仪式彻底落幕，新的情报观测模式正式成型。'}],choices:[{label:'正常办公，静待刘伟信号',nextScene:'ch17_branch1a'},{label:'余光留意赵东升桌面烟盒状态',nextScene:'ch17_branch1b'}]},
ch17_branch1a:{tag:'【分支·蛰伏等待】',blocks:[{type:'narration',text:'你专注手头工作，保持常态化办公状态，不主动观望，静待约定暗号。'}],choices:[{label:'__auto__',nextScene:'ch17_merge1'}]},
ch17_branch1b:{tag:'【分支·细节求证】',blocks:[{type:'narration',text:'你余光扫过赵东升桌面，清晰看见桌上摆放满盒香烟，默默记下初始状态。'}],choices:[{label:'__auto__',nextScene:'ch17_merge1'}]},
ch17_merge1:{tag:'【汇合】',blocks:[{type:'narration',text:'临近上午收尾，刘伟起身接水，路过你工位时，指尖极轻、极快地敲了两下桌角，随即正常前行，动作自然无痕。'}],choices:[{label:'__auto__',nextScene:'ch17_scene2'}]},
ch17_scene2:{tag:'【茶水间·首次情报交付】',blocks:[{type:'narration',text:'茶水间无人，空间密闭隐蔽。刘伟语速极快，无多余铺垫，直奔重点。'},{type:'dialogue',text:'刘伟："连着两天了，下午两点到三点，他固定外出抽烟，不在工位。不是开会，风雨无阻。"'},{type:'dialogue',text:'你："怎么确定是固定规律？"'},{type:'dialogue',text:'刘伟："看烟盒。两点前满盒，回来就瘪了。第二天复原，准时重复，两天没偏差。"'},{type:'dialogue',text:'刘伟："今天窗口稳，我帮你盯着动静，你放心去。"'},{type:'narration',text:'话音落，刘伟端水杯离开，全程神态自然，未引起任何人注意。'}],choices:[{label:'返回工位，低调待命',nextScene:'ch17_branch2a'},{label:'默记时间节点，做好出行准备',nextScene:'ch17_branch2b',itemGain:'liuwei_intel_record'}]},
ch17_branch2a:{tag:'【分支·稳妥蛰伏】',blocks:[{type:'narration',text:'你点头示意，跟随返回办公区，落座工位，维持正常工作状态，静待下午窗口。'}],choices:[{label:'__auto__',nextScene:'ch17_merge2'}]},
ch17_branch2b:{tag:'【分支·提前筹备】',blocks:[{type:'narration',text:'你牢牢记下十四点固定窗口，提前整理好报销单据，备好出行掩护凭证。'},{type:'thought',text:'获得道具：刘伟情报记录'}],choices:[{label:'__auto__',nextScene:'ch17_merge2'}]},
ch17_merge2:{tag:'【汇合】',blocks:[{type:'narration',text:'整个上午，办公区氛围平稳，无人察觉一场精准的探查计划已经敲定。'}],choices:[{label:'__auto__',nextScene:'ch17_scene3'}]},
ch17_scene3:{tag:'【下午两点·窗口期开启】',blocks:[{type:'narration',text:'整点十四点，赵东升起身，拿起桌面满盒香烟，径直走出项目部。他无交代、无停留，工位瞬间空置。刘伟目视赵东升离开，随即轻敲一次自己桌角，发出行动暗号。'}],choices:[{label:'稍作等待，延后片刻出发',nextScene:'ch17_branch3a'},{label:'收到暗号，即刻起身前往财务',nextScene:'ch17_branch3b'}]},
ch17_branch3a:{tag:'【分支·极致谨慎】',blocks:[{type:'narration',text:'你静坐等待片刻，确认走廊无折返动静、无突发人员走动，才起身行动。'}],choices:[{label:'__auto__',nextScene:'ch17_merge3'}]},
ch17_branch3b:{tag:'【分支·精准执行】',blocks:[{type:'narration',text:'你收到暗号，手持报销单，即刻起身，稳步走向财务部。'}],choices:[{label:'__auto__',nextScene:'ch17_merge3'}]},
ch17_merge3:{tag:'【汇合】',blocks:[{type:'narration',text:'财务部正常在岗，周姐看到你到来，神色平静，无诧异、无追问。'},{type:'dialogue',text:'你："核对往期报销数据，需要再对照一遍原始凭证。"'},{type:'narration',text:'周姐取出对应档案盒，递至你手中。'},{type:'dialogue',text:'周姐："尽快。最近这类问询，频次变多了。"'}],choices:[{label:'__auto__',nextScene:'ch17_scene4'}]},
ch17_scene4:{tag:'【证据闭环·照片与原件核验】',blocks:[{type:'narration',text:'你打开档案盒，取出三笔异常资金流转纸质凭证。点亮手机，调出第十五章留存的凭证照片，逐笔逐项核对。签字笔迹一致、金额数据一致、流转日期一致、收款开户行一致。电子留存可篡改、日志可清理、权限可降级，唯有纸质原件固定不变，证据链彻底无懈可击、完全闭环。'}],choices:[{label:'快速规整归档，交还周姐',nextScene:'ch17_branch4a'},{label:'逐项确认无误，再规整归档',nextScene:'ch17_branch4b'}]},
ch17_branch4a:{tag:'【分支·高效收尾】',blocks:[{type:'narration',text:'确认全部信息匹配无误，你快速整理凭证，归位档案盒，交还周姐。'}],choices:[{label:'__auto__',nextScene:'ch17_merge4'}]},
ch17_branch4b:{tag:'【分支·严谨收尾】',blocks:[{type:'narration',text:'你反复核对关键信息，确认无任何偏差，规整所有文件，完好交还。'}],choices:[{label:'__auto__',nextScene:'ch17_merge4'}]},
ch17_merge4:{tag:'【汇合】',blocks:[{type:'narration',text:'周姐接过档案盒，妥善收纳进档案柜。'},{type:'dialogue',text:'周姐："归档的东西不会丢。纸质有纸质的好处。"'},{type:'narration',text:'话语平淡，暗含深意，点破电子系统的漏洞与纸质凭证的绝对安全性。'}],choices:[{label:'__auto__',nextScene:'ch17_scene5'}]},
ch17_scene5:{tag:'【走廊偶遇·小林无声留白】',blocks:[{type:'narration',text:'你离开财务部，拐过走廊转角。小林手持文件夹，静静站在走廊尽头，似在等候、似在取件。两人视线精准对接。小林无问话、无阻拦、无通报、无表情，仅仅直视你两秒，随即微微颔首。动作完毕，侧身擦肩而过，各自前行。全程无一句对话，却完成了完整信息传递：我看见你了，我一直都在观察。'}],choices:[{label:'神色如常，稳步前行',nextScene:'ch17_branch5a'},{label:'淡然颔首，对等回应',nextScene:'ch17_branch5b'}]},
ch17_branch5a:{tag:'【分支·沉稳应对】',blocks:[{type:'narration',text:'你神色不变，脚步不停，无视无声试探，正常返回项目部。'}],choices:[{label:'__auto__',nextScene:'ch17_merge5'}]},
ch17_branch5b:{tag:'【分支·对等回应】',blocks:[{type:'narration',text:'你微微点头回应，不卑不亢，稳步擦肩而过。'}],choices:[{label:'__auto__',nextScene:'ch17_merge5'}]},
ch17_merge5:{tag:'【汇合】',blocks:[{type:'narration',text:'你回到工位。片刻后，赵东升准时折返，桌面烟盒已然干瘪。全员就位，办公区恢复常态，无人知晓方才完成的关键核验。'}],choices:[{label:'__auto__',nextScene:'ch17_scene6'}]},
ch17_scene6:{tag:'【傍晚空场·全线证据梳理】',blocks:[{type:'narration',text:'下班时段，众人陆续离场。项目部只剩你一人。陈默空置工位依旧保持规整状态，阿杰旧工装搭在椅背，安静伫立。你翻开私人笔记本，逐条串联全季所有线索：入职前便利贴、OA日志清理、权限降级、三笔月度异常资金、盛恒商业银行→四海集团→钱四海、全套封路打压。所有碎片闭环，整条链路清晰完整。'}],choices:[{label:'__auto__',nextScene:'ch17_scene7'}]},
ch17_scene7:{tag:'【终章前奏·陈默破冰邮件】',blocks:[{type:'narration',text:'笔记本合上瞬间，电脑右下角弹出新邮件提醒。发件人：陈默（个人邮箱）。主题：无。正文四字。'},{type:'bold',text:'准备好了吗？'}],choices:[{label:'截图留存邮件，固化终章伏笔',nextScene:'ch17_branch6a',itemGain:'chenmo_email'},{label:'光标悬停回复框，短暂停顿后退出',nextScene:'ch17_branch6b'}]},
ch17_branch6a:{tag:'【分支·留存线索】',blocks:[{type:'narration',text:'你快速截图邮件页面，完整留存陈默失联后的首次联络记录，锁定终章核心伏笔。'},{type:'thought',text:'获得道具：陈默个人邮箱邮件截屏'}],choices:[{label:'__auto__',nextScene:'ch17_chapter_end'}]},
ch17_branch6b:{tag:'【分支·静默蓄力】',blocks:[{type:'narration',text:'你将光标移至回复按钮，短暂停顿后，不点、不回、不操作。'}],choices:[{label:'__auto__',nextScene:'ch17_chapter_end'}]},
ch17_chapter_end:{tag:'【第十七章·结束】',blocks:[{type:'narration',text:'窗外天色全黑，办公室灯光惨白安静。你关闭电脑屏幕，起身离场。不回复，不代表无应答。沉默是留给终章的最终回应。所有备战完毕，所有证据闭环，所有暗线就位。'}],choices:[{label:'__auto__',nextScene:'__end__'}]},
// ===== 第十八章·收网 =====
ch18_scene1:{tag:'【上午在岗·静默等待】',blocks:[{type:'narration',text:'项目部全日常态值守。赵东升全程在岗，视线覆盖整片工位区，无异常举动。刘伟照旧以接水为掩护，低调观测四周动静，维持既定情报节奏。办公区氛围平稳，无人知晓一场横跨全季的真相揭晓，即将在下班后落地。'}],choices:[{label:'常态办公，低调蛰伏不露端倪',nextScene:'ch18_branch1a'},{label:'平稳工作，静待晚间约定信号',nextScene:'ch18_branch1b'}]},
ch18_branch1a:{tag:'【分支·无痕蛰伏】',blocks:[{type:'narration',text:'你全程专注本职工作，言行如常，彻底隐藏内心期待，无任何异常神态与动作。'}],choices:[{label:'__auto__',nextScene:'ch18_merge1'}]},
ch18_branch1b:{tag:'【分支·沉稳待命】',blocks:[{type:'narration',text:'你稳步完成当日工作，保持松弛状态，默默等候晚间的见面邀约落地。'}],choices:[{label:'__auto__',nextScene:'ch18_merge1'}]},
ch18_merge1:{tag:'【汇合】',blocks:[{type:'narration',text:'手机屏幕静默亮起，一条新短信弹窗弹出。发件人：陌生号码。正文：下班后，门口第二个路口左转，那家咖啡店。请你喝咖啡。你收起手机，神色未变。赵东升全程未曾察觉。'}],choices:[{label:'__auto__',nextScene:'ch18_scene2'}]},
ch18_scene2:{tag:'【傍晚离场·奔赴重逢】',blocks:[{type:'narration',text:'下班时间到，众人陆续收拾离场。陈默空置工位依旧规整如初，阿杰旧工装静静搭在椅背，成为贯穿全季的沉默背景。你随人流离开公司，沿路抵达约定咖啡店。'}],choices:[{label:'径直走入，目视卡座方向',nextScene:'ch18_branch2a'},{label:'短暂驻足，确认环境后入场',nextScene:'ch18_branch2b'}]},
ch18_branch2a:{tag:'【分支·笃定奔赴】',blocks:[{type:'narration',text:'你抬步径直走入店内，视线精准锁定角落卡座的人影。'}],choices:[{label:'__auto__',nextScene:'ch18_merge2'}]},
ch18_branch2b:{tag:'【分支·谨慎稳妥】',blocks:[{type:'narration',text:'你在店门口短暂驻足，确认店内无异常后，缓步入场。'}],choices:[{label:'__auto__',nextScene:'ch18_merge2'}]},
ch18_merge2:{tag:'【汇合·重逢】',blocks:[{type:'narration',text:'角落卡座，陈默端坐于此。身形清瘦些许，眼神依旧清亮沉稳。她看见你，抬手轻轻示意，动作随意自然，仿若从未离场。你落座对面。陈默将一杯提前备好的咖啡推至你面前。'},{type:'dialogue',text:'陈默："咖啡自己冲了？出师了。"'}],choices:[{label:'__auto__',nextScene:'ch18_scene3'}]},
ch18_scene3:{tag:'【真相揭晓·轻描淡写全盘托出】',blocks:[{type:'narration',text:'陈默低头抿了一口咖啡，未做多余铺垫，平淡开口，逐层拆解全季所有暗线。'},{type:'dialogue',text:'陈默："3月12日下午三点十五分，孙总办公室的便利贴，你翻到了。那是我入职前一周写的。那时候没证据，只有直觉。"'},{type:'dialogue',text:'陈默："进来之后我才摸清，他不是单独做事。钱四海，你查到的盛恒商业银行、四海集团，都对。孙总的异常资金流转，最终全部流向他的体系。"'},{type:'dialogue',text:'陈默："但公司内部权限锁死，OA、财务、审批全在他手里。我拿不到核心证据，只能被困在局里。所以我需要出去。"'},{type:'dialogue',text:'陈默："第九章的签字陷阱，我看出来了。我可以躲开，可以推诿，但我没躲。孙总需要一个替罪羊稳住局面，我需要一个合规离场的理由。苦肉计，我和王总早就商定好了。"'},{type:'dialogue',text:'陈默："你不用愧疚。那不是你的错，是我布的局。"'},{type:'dialogue',text:'陈默："这八个月我没停过。脱离公司体系，专门追查钱四海的外部关联公司、资金链路。王总一直在内部配合，天台偶遇、暗中提示、不让你亮身份，都是为了护着你。"'},{type:'dialogue',text:'陈默："现在你查到底了，最终考核也启动了。我回来，不是帮你翻盘，是把翻盘的刀递给你。"'},{type:'narration',text:'她说完，将一个黑色U盘轻轻推至桌面中央。'},{type:'dialogue',text:'陈默："里面是三样东西。明天考核，你知道什么时候用。"'}],choices:[{label:'沉默注视U盘，静待后续',nextScene:'ch18_branch3a'},{label:'抬眼看向陈默，平静对视',nextScene:'ch18_branch3b'}]},
ch18_branch3a:{tag:'【分支·静默沉淀】',blocks:[{type:'narration',text:'你目光落在U盘上，全程沉默，任由所有积压的疑惑与愧疚缓缓落地。'}],choices:[{label:'__auto__',nextScene:'ch18_merge3'}]},
ch18_branch3b:{tag:'【分支·无声对视】',blocks:[{type:'narration',text:'你抬眼望向陈默，没有言语，以平静对视接纳所有真相。'}],choices:[{label:'__auto__',nextScene:'ch18_merge3'}]},
ch18_merge3:{tag:'【汇合】',blocks:[{type:'narration',text:'陈默面前的咖啡已然凉透，全程未再多饮一口。轻描淡写的几句话，拆解了横跨十七日的所有困局。'}],choices:[{label:'__auto__',nextScene:'ch18_scene4'}]},
ch18_scene4:{tag:'【互动4·情感出口抉择】',blocks:[{type:'narration',text:'所有真相落地，积压全季的情绪需要一个出口。'}],choices:[{label:'开口询问：第九章那天，你为什么不回头？',nextScene:'ch18_branch4a'},{label:'起身离场，前往前台换热咖啡',nextScene:'ch18_branch4b'}]},
ch18_branch4a:{tag:'【分支·问句释怀】',blocks:[{type:'dialogue',text:'你："第九章那天你走的时候，为什么不回头看我一眼？"'},{type:'dialogue',text:'陈默："回头了，就走不了了。"'}],choices:[{label:'__auto__',nextScene:'ch18_merge4'}]},
ch18_branch4b:{tag:'【分支·行动释怀】',blocks:[{type:'narration',text:'你起身走到前台，点了一杯热咖啡，替换掉陈默面前的凉杯。'},{type:'dialogue',text:'陈默："学会照顾人了。"'}],choices:[{label:'__auto__',nextScene:'ch18_merge4'}]},
ch18_merge4:{tag:'【汇合】',blocks:[{type:'narration',text:'一答一动，消解全季积压的所有情绪。无煽情、无宣泄，唯有默契释然。'}],choices:[{label:'__auto__',nextScene:'ch18_scene5'}]},
ch18_scene5:{tag:'【终局叮嘱·全季伏笔闭环】',blocks:[{type:'narration',text:'陈默抬手收起随身物品，起身准备离场。行至卡座边缘，她脚步微顿，回头看向你。'},{type:'dialogue',text:'陈默："明天最终考核，你带队。我在外面看结果。"'},{type:'dialogue',text:'陈默："对了。赵东升递的烟别接。现在你该彻底懂了。"'},{type:'narration',text:'话音落下，转身离开咖啡店，身影融入夜色街道。第一章便利贴警示、全季职场陷阱暗示，至此彻底闭环。'}],choices:[{label:'静坐卡座，目送身影远去',nextScene:'ch18_branch5a'},{label:'起身站立，安静目送离场',nextScene:'ch18_branch5b'}]},
ch18_branch5a:{tag:'【分支·静默目送】',blocks:[{type:'narration',text:'你端坐原位，目视陈默身影彻底消失在街灯尽头。'}],choices:[{label:'__auto__',nextScene:'ch18_merge5'}]},
ch18_branch5b:{tag:'【分支·立身目送】',blocks:[{type:'narration',text:'你起身站立，望向窗外，安静目送她离场。'}],choices:[{label:'__auto__',nextScene:'ch18_merge5'}]},
ch18_merge5:{tag:'【汇合】',blocks:[{type:'narration',text:'店内只剩你一人。桌面两杯咖啡，一杯微凉见底，一杯温热崭新。U盘静静置于桌中央。'}],choices:[{label:'__auto__',nextScene:'ch18_scene6'}]},
ch18_scene6:{tag:'【互动6·收尾取证蓄力】',blocks:[{type:'narration',text:'终局核心证据就在眼前。'}],choices:[{label:'拿起U盘，稳妥收好',nextScene:'ch18_branch6a',itemGain:'chenmo_usb',alsoGain:'chenmo_testimony'},{label:'确认桌面无遗留，收起证据',nextScene:'ch18_branch6b',itemGain:'chenmo_usb',alsoGain:'chenmo_testimony'}]},
ch18_branch6a:{tag:'【分支·稳妥收纳】',blocks:[{type:'narration',text:'你抬手拿起U盘，揣进贴身口袋，稳妥收好终局核心证据。'},{type:'thought',text:'获得道具：陈默加密U盘、陈默证词关键内容摘要'}],choices:[{label:'__auto__',nextScene:'ch18_chapter_end'}]},
ch18_branch6b:{tag:'【分支·细致收尾】',blocks:[{type:'narration',text:'你确认桌面无任何遗留痕迹，收起U盘，完成全部收尾。'},{type:'thought',text:'获得道具：陈默加密U盘、陈默证词关键内容摘要'}],choices:[{label:'__auto__',nextScene:'ch18_chapter_end'}]},
ch18_chapter_end:{tag:'【第十八章·结束】',blocks:[{type:'narration',text:'你独自走出咖啡店，折返公司方向。街灯次第亮起，夜色沉静。手机OA弹出全新通知：明日启动全员最终考核，各部门就绪待命。你翻开私人笔记本，落笔写下最后一行字：明天。空荡的项目部、规整的陈默工位、椅背的旧工装，静默伫立，静待终局翻盘。'}],choices:[{label:'__auto__',nextScene:'__end__'}]},
// ===== 第十九章·翻盘 =====
ch19_scene1:{tag:'【上午官宣·最终考核启幕】',blocks:[{type:'narration',text:'晨间OA弹窗置顶，全员可见。《季度部门考核最终轮通知》今日正式落地。评委组席位敲定：孙总主审、王总、周姐、李姐、外部行业顾问。工位区氛围紧绷，全季终极擂台正式成型。'}],choices:[{label:'静默整理资料，稳妥备战',nextScene:'ch19_branch1a'},{label:'核对U盘文件，最后核验',nextScene:'ch19_branch1b'}]},
ch19_branch1a:{tag:'【分支·沉稳备战】',blocks:[{type:'narration',text:'你低头规整汇报文件与笔记本，全程神色平静，无多余动作，稳住赛前心态。'}],choices:[{label:'__auto__',nextScene:'ch19_merge1'}]},
ch19_branch1b:{tag:'【分支·极致严谨】',blocks:[{type:'narration',text:'你点开电脑文件，快速核对U盘内合同扫描件、资金流水、证词文件，确保无任何疏漏。'}],choices:[{label:'__auto__',nextScene:'ch19_merge1'}]},
ch19_merge1:{tag:'【汇合】',blocks:[{type:'narration',text:'刘伟起身接水，路过你工位，指尖轻敲桌角一次。'},{type:'dialogue',text:'刘伟："咖啡给你留着，回来喝。"'},{type:'narration',text:'全季咖啡线至此收官。你收起设备，起身带队，独自走向会议室。李姐、刘伟、张野随行旁听。'}],choices:[{label:'__auto__',nextScene:'ch19_scene2'}]},
ch19_scene2:{tag:'【会议室就位·权力格局落定】',blocks:[{type:'narration',text:'会议室席位规整，权责分明。评委席正中：孙总，神色淡然。左侧：王总，静默端坐。右侧：周姐、李姐。后侧：外部顾问。汇报席对立而立：竞品部赵东升带队，项目部由你独立述职。'}],choices:[{label:'稳步落座，平视前方',nextScene:'ch19_branch2a'},{label:'简洁落座，静待流程开启',nextScene:'ch19_branch2b'}]},
ch19_branch2a:{tag:'【分支·气场沉稳】',blocks:[{type:'narration',text:'你抬步稳步落座，视线平视评委席，不卑不亢，气场平稳。'}],choices:[{label:'__auto__',nextScene:'ch19_merge2'}]},
ch19_branch2b:{tag:'【分支·低调蛰伏】',blocks:[{type:'narration',text:'你简洁落座，腰背挺直，安静等候考核流程启动。'}],choices:[{label:'__auto__',nextScene:'ch19_merge2'}]},
ch19_merge2:{tag:'【汇合】',blocks:[{type:'narration',text:'考核正式开始。'}],choices:[{label:'__auto__',nextScene:'ch19_scene3'}]},
ch19_scene3:{tag:'【赵东升汇报·完美铺垫】',blocks:[{type:'narration',text:'赵东升率先登台述职。数据量化清晰、流程规范完整、季度成果详实，全程滴水不漏。汇报完毕，孙总微微颔首。全场评委无一人提出质疑，竞品部率先锁定优势局面。轮到项目部汇报。你登台，平稳推进述职内容。汇报进行中段，赵东升突然抬手，当场打断。'}],choices:[{label:'__auto__',nextScene:'ch19_scene4'}]},
ch19_scene4:{tag:'【事件发难·蓄意围堵】',blocks:[{type:'narration',text:'赵东升操控投影屏幕，《财务档案查阅登记表》全屏弹出。你的签字、查阅时间、归档事由，一览无余。'},{type:'dialogue',text:'赵东升："新员工入职未满一月，频繁调取跨部门归档旧档，远超常规工作范畴。我质疑项目部考核期内占用公共资源，开展非工作相关事项，考核成绩应当酌情扣减。"'},{type:'narration',text:'全场瞬间安静。孙总目视你，沉默等候回应。蓄意陷阱彻底落地。'}],choices:[{label:'先证合规，再抛证据',nextScene:'ch19_branch3a'},{label:'直接反击，亮出核心依据',nextScene:'ch19_branch3b'}]},
ch19_branch3a:{tag:'【分支·稳妥破局】',blocks:[{type:'dialogue',text:'你："所有查阅操作均依规登记，流程合规，周姐可现场佐证。"'},{type:'dialogue',text:'周姐："登记流程完整合规，无违规调档记录。"'},{type:'dialogue',text:'你："之所以频繁核对旧档，并非无关工作，而是为核实竞品部项目资金异常。"'}],choices:[{label:'__auto__',nextScene:'ch19_merge3'}]},
ch19_branch3b:{tag:'【分支·强势反击】',blocks:[{type:'dialogue',text:'你："调档合规有据可查，真正需要质询的，是竞品部项目资金流转的异常漏洞。我有完整证据佐证。"'}],choices:[{label:'__auto__',nextScene:'ch19_merge3'}]},
ch19_merge3:{tag:'【汇合·U盘举证】',blocks:[{type:'narration',text:'你上前一步，将黑色U盘插入会议主机。'},{type:'thought',text:'道具消耗：陈默加密U盘（已使用，完成全季核心使命）'},{type:'narration',text:'第一份文件全屏展示：竞品部项目原始合同扫描件。30%资金以"外部咨询"名义空转，最终收款方关联四海集团。第二份文件弹出：三年资金往来流水。多笔竞品部对公支出，最终归集盛恒商业银行钱四海控股账户。'},{type:'dialogue',text:'你："我查阅归档凭证，是为核实资金流转是否具备合理业务背景。目前所有证据显示，该部分资金流转无合规支撑，存在重大核查疑点。"'},{type:'narration',text:'全场哗然。所有证据精准指向孙总签字审批链路，无情绪化指控，纯规则碾压。'}],choices:[{label:'__auto__',nextScene:'ch19_scene5'}]},
ch19_scene5:{tag:'【孙总受挫·王总出手控局】',blocks:[{type:'narration',text:'孙总全程未打断，面色平稳无波澜。'},{type:'dialogue',text:'孙总："资料来源何处？"'}],choices:[{label:'模糊暗示：来源可靠，证词可当面核验',nextScene:'ch19_branch4a'},{label:'回避溯源：以事实为准，交由审计核实',nextScene:'ch19_branch4b'}]},
ch19_branch4a:{tag:'【分支·留有余地】',blocks:[{type:'dialogue',text:'你："证据来源可靠，如需核验，证词提供者可当面确认。"'}],choices:[{label:'__auto__',nextScene:'ch19_merge4'}]},
ch19_branch4b:{tag:'【分支·聚焦事实】',blocks:[{type:'dialogue',text:'你："证据真伪可通过官方审计核验，来源并非本次考核核心议题。"'}],choices:[{label:'__auto__',nextScene:'ch19_merge4'}]},
ch19_merge4:{tag:'【汇合·王总出手】',blocks:[{type:'narration',text:'孙总眸光微沉，不再追问。王总首次公开开口，语气冷静、措辞制式。'},{type:'dialogue',text:'王总："评委组提议，暂时中止孙总主审及评分资格。资金异常问题未核查完毕前，需回避本次考核评审工作，由外部顾问代行主审职权。"'},{type:'narration',text:'外部顾问、周姐、李姐全员附议。'},{type:'dialogue',text:'孙总："可以。考核继续。"'},{type:'narration',text:'孙总起身离场，姿态克制、未失体面，但彻底丧失本场评审权。'}],choices:[{label:'__auto__',nextScene:'ch19_scene6'}]},
ch19_scene6:{tag:'【终极抉择·身份亮明分支】',blocks:[{type:'narration',text:'考核继续推进，由外部顾问主持全场。你完整收尾项目部述职汇报。外部顾问抛出核心质询。'},{type:'dialogue',text:'外部顾问："普通新员工无权限开展系统性跨部门资金核对与凭证核验。你本次核查工作，依据何种身份？"'}],choices:[{label:'亮明身份：合作商大股东派驻代表',nextScene:'ch19_branch5a'},{label:'隐藏身份：承接陈默遗留核查工作',nextScene:'ch19_branch5b'}]},
ch19_branch5a:{tag:'【分支·破局亮身】',blocks:[{type:'dialogue',text:'你："我为项目合作方大股东派驻代表，有权对项目资金使用合规性开展尽职调查，所有核查行为均符合商业尽调规则。"'},{type:'narration',text:'调查权限彻底合法化、制度化，全场无一人可质疑。身份公开，彻底告别潜伏状态。'}],choices:[{label:'__auto__',nextScene:'ch19_merge5'}]},
ch19_branch5b:{tag:'【分支·蛰伏藏身】',blocks:[{type:'dialogue',text:'你："本次核查工作，承接陈默离职前遗留的归档疑点清单，属于工作交接后的后续核对，全程依规登记。"'},{type:'narration',text:'周姐当场点头佐证，核查流程合理性落地。身份继续隐秘，风险可控。'}],choices:[{label:'__auto__',nextScene:'ch19_merge5'}]},
ch19_merge5:{tag:'【汇合·考核翻盘】',blocks:[{type:'narration',text:'评委组完成打分。最终结果公示：项目部得分反超竞品部，成功保岗，考核彻底翻盘。'},{type:'thought',text:'获得道具：最终考核评分记录、孙总评委资格暂停会议纪要'}],choices:[{label:'__auto__',nextScene:'ch19_scene7'}]},
ch19_scene7:{tag:'【傍晚工位·阿杰伏笔终揭晓】',blocks:[{type:'narration',text:'考核结束，暮色笼罩办公区。项目部只剩你一人。王总独自走入项目部，径直走到工位旁。'},{type:'dialogue',text:'王总："阿杰，是这个工位的上一任。陈默的前任。"'},{type:'dialogue',text:'王总："他是第一个发现竞品部资金异常的人。只是当年仅有台账差额，无完整证据链。孙总以工作失误为由，将他开除。这件工装，他没带走。"'},{type:'dialogue',text:'王总："我跟你说过，他也查过，没查完。陈默接了这个工位，也接了他没做完的核查。现在，你接了陈默的。"'},{type:'narration',text:'三代人，同一工位，同一条暗线，同一场未竟的坚守。全季最深情感伏笔彻底闭环。'},{type:'dialogue',text:'王总："明天，正式审计通知下发。做好准备。"'},{type:'narration',text:'王总说完，转身离场。'}],choices:[{label:'取便利贴，手写留言贴至陈默工位',nextScene:'ch19_branch6a'},{label:'静坐工位，复盘今日全程战局',nextScene:'ch19_branch6b'}]},
ch19_branch6a:{tag:'【分支·双向呼应】',blocks:[{type:'narration',text:'你取出一张新便利贴，落笔四字：明天见。抬手贴在陈默工位显示器边框。从陈默留贴引路，到你留贴赴约，全季首尾完美呼应。'}],choices:[{label:'__auto__',nextScene:'ch19_chapter_end'}]},
ch19_branch6b:{tag:'【分支·沉稳复盘】',blocks:[{type:'narration',text:'你静坐工位，回望十七日所有探查、蛰伏、交锋、反击，静待终局到来。'}],choices:[{label:'__auto__',nextScene:'ch19_chapter_end'}]},
ch19_chapter_end:{tag:'【第十九章·结束】',blocks:[{type:'narration',text:'手机屏幕亮起，陈默短信弹窗弹出。正文：今天在会议室外面听到了。干得漂亮。明天见。你翻开私人笔记本，在空白页落下最后一行字：明天。'}],choices:[{label:'__auto__',nextScene:'__end__'}]},
// ===== 第二十章·终局 =====
ch20_scene1:{tag:'【晨间官宣·审计启幕】',blocks:[{type:'narration',text:'清晨OA置顶公告准时推送，发件人：王总。公告内容：依据季度最终考核核验证据，公司授权第三方审计组，启动竞品部项目资金合规专项审计。审计期间，孙总暂停一切管理职务，全程配合核查。'},{type:'narration',text:'刘伟第一时间刷新页面，目光定格公告数秒。'},{type:'dialogue',text:'刘伟："公告发了。"'},{type:'narration',text:'你微微点头。刘伟拿起桌前常备的马克杯，接了一杯温水。从一次性纸杯到专属马克杯，他的职场忐忑彻底落幕。赵东升工位彻底空置，桌角堆叠的文件无人触碰。'}],choices:[{label:'静坐工位，静待局势落地',nextScene:'ch20_branch1a'},{label:'浏览公告，确认审计细则',nextScene:'ch20_branch1b'}]},
ch20_branch1a:{tag:'【分支·沉稳静待】',blocks:[{type:'narration',text:'你端坐工位，神色平静。二十天步步为营、隐忍蛰伏，终局如期而至。'}],choices:[{label:'__auto__',nextScene:'ch20_merge1'}]},
ch20_branch1b:{tag:'【分支·严谨核验】',blocks:[{type:'narration',text:'你点开公告全文，逐字核对审计权限、核查范围、执行流程，确认所有程序合法合规。'}],choices:[{label:'__auto__',nextScene:'ch20_merge1'}]},
ch20_merge1:{tag:'【汇合】',blocks:[{type:'narration',text:'上午十点，第三方审计组三人走出电梯，径直走向孙总办公室。'}],choices:[{label:'__auto__',nextScene:'ch20_scene2'}]},
ch20_scene2:{tag:'【孙总落幕·沉默离场】',blocks:[{type:'narration',text:'孙总办公室大门闭合。走廊尽头，小林静静伫立，今日空手而立，无公事缠身。半小时后，审计组走出，手中新增密封档案盒。孙总紧随其后，褪去往日掌控全场的强势气场。他路过小林身侧，脚步微顿。小林微微侧身，让出通路，姿态不再是往日低眉顺眼的助理。孙总收回目光，继续前行。途经项目部工位区，视线平视前方，不看任何人。电梯门开启，一行人依次踏入。电梯门缓缓合拢。全季核心反派，无台词、无宣告，沉默出局。'}],choices:[{label:'端坐工位，安静目送',nextScene:'ch20_branch2a'},{label:'抬眸远眺，默然收尾',nextScene:'ch20_branch2b'}]},
ch20_branch2a:{tag:'【分支·不动声色】',blocks:[{type:'narration',text:'你稳坐工位，未曾起身，安静目送电梯闭合。所有恩怨、愧疚、对峙，随这扇门落幕尘埃落定。'}],choices:[{label:'__auto__',nextScene:'ch20_merge2'}]},
ch20_branch2b:{tag:'【分支·淡然远眺】',blocks:[{type:'narration',text:'你微微抬眸，望向电梯方向，二十天的步步惊心，在此刻彻底落地。'}],choices:[{label:'__auto__',nextScene:'ch20_merge2'}]},
ch20_merge2:{tag:'【汇合】',blocks:[{type:'narration',text:'走廊尽头，小林依旧静立。她抬眼与你对视一瞬，微微颔首，随即转身离开，身影融入走廊暗处。'}],choices:[{label:'__auto__',nextScene:'ch20_scene3'}]},
ch20_scene3:{tag:'【午后归期·陈默正式复职】',blocks:[{type:'narration',text:'午后，第二条OA公告准时推送。《人事复职通知》：陈默，恢复项目部原有岗位，即日生效。'},{type:'narration',text:'刘伟瞥见公告，身形一顿。'},{type:'dialogue',text:'刘伟："她回来了。她真的回来了。"'},{type:'dialogue',text:'李姐："工位该收拾一下了。"'},{type:'narration',text:'张野第一次主动摘下耳机，轻轻放置桌面，抬眼望向空工位方向。下午三点，陈默缓步走入项目部。她径直走向空置十一章的专属工位，目光落在显示器边框上你昨日贴上的便利贴——「明天见」。她抬手取下便利贴，取出全新便利贴与笔，落笔干脆，贴在你的显示器正中央。纸上四字，工整利落：今天见。第一章警示、第九章告别、第二十章重逢，三张核心便利贴，串联全季起点、低谷、终章。陈默落座，开机、调试设备，彻底归位。'}],choices:[{label:'__auto__',nextScene:'ch20_scene4'}]},
ch20_scene4:{tag:'【全员齐聚·项目部终章温情】',blocks:[{type:'narration',text:'下班前夕，项目部全员在岗。陈默端坐左位，你落座右位，李姐、刘伟、张野各守工位。五人齐聚，是全季最完整、最安稳的一幕。'},{type:'dialogue',text:'李姐："今天不用加班。明天还是要加的。"'},{type:'narration',text:'刘伟低头看向空水杯，第一次主动开口。'},{type:'dialogue',text:'刘伟："咖啡没了。我去泡。五杯。"'},{type:'narration',text:'他端着五杯咖啡回来，稳稳放在每个人桌上。没有洒一滴。从被动端送、愧疚补偿、默默留守，到今日主动奔赴、均分温暖，刘伟完成小人物完整弧光。最后一杯，稳稳放在陈默面前。张野端起咖啡轻抿一口，将耳机摘下挂在脖颈，低头看了一眼手机，把《大悲咒》Remix从播放列表里删了。'},{type:'dialogue',text:'张野："挺好。"'}],choices:[{label:'端起咖啡，静默感受安稳',nextScene:'ch20_branch3a'},{label:'目视全员，释然收尾过往',nextScene:'ch20_branch3b'}]},
ch20_branch3a:{tag:'【分支·静默心安】',blocks:[{type:'narration',text:'你端起温热的咖啡，轻抿一口，二十天的紧绷、愧疚、蛰伏、对峙，尽数消融于温热。'}],choices:[{label:'__auto__',nextScene:'ch20_merge3'}]},
ch20_branch3b:{tag:'【分支·释然回望】',blocks:[{type:'narration',text:'你目光扫过身旁全员、归位的陈默、空置的工位，所有跌宕落幕，只剩安稳如常。'}],choices:[{label:'__auto__',nextScene:'ch20_merge3'}]},
ch20_merge3:{tag:'【汇合】',blocks:[{type:'narration',text:'暮色渐沉，办公区灯光柔和，项目部归于久违的平静。'}],choices:[{label:'__auto__',nextScene:'ch20_scene5'}]},
ch20_scene5:{tag:'【天台终话·全季情感落点】',blocks:[{type:'narration',text:'众人陆续离岗，办公室只剩你与陈默。陈默起身，语气平淡。'},{type:'dialogue',text:'陈默："天台。"'},{type:'narration',text:'天台晚风呼啸。陈默倚靠栏杆，望向远处楼宇。'},{type:'dialogue',text:'陈默："二十天。你入职二十天，我在外面待了十一天。你用二十天，做到了我一年半才完成的事——让孙总在规则内彻底出局。"'},{type:'dialogue',text:'陈默："阿杰的事，王总告诉你了。我接下这个工位时，只剩几本对不上的台账。内部无路可查，我只能选择出去。"'},{type:'dialogue',text:'陈默："阿杰是我上一个邻座。他走的时候，我连句再见都没说上。所以这次，我一定要回来亲口告诉你。"'},{type:'dialogue',text:'陈默："出去需要代价。代价就是，让你一直以为，是你害了我。"'},{type:'dialogue',text:'陈默："这个局最难的从不是取证布局。是看着你一个人扛下所有愧疚与压力，我只能旁观，不能伸手、不能解释。"'}],choices:[{label:'复刻台词：咖啡我自己冲了。出师了。',nextScene:'ch20_branch4a'},{label:'坦诚期许：下次别一个人扛。',nextScene:'ch20_branch4b'}]},
ch20_branch4a:{tag:'【分支·传承致敬】',blocks:[{type:'dialogue',text:'你："咖啡我自己冲了。出师了。"'},{type:'dialogue',text:'陈默："出师了，还用我冲咖啡？"'}],choices:[{label:'__auto__',nextScene:'ch20_merge4'}]},
ch20_branch4b:{tag:'【分支·温柔共情】',blocks:[{type:'dialogue',text:'你："下次别一个人扛。"'},{type:'dialogue',text:'陈默："习惯了。但你来了，下次分你一半。"'}],choices:[{label:'__auto__',nextScene:'ch20_merge4'}]},
ch20_merge4:{tag:'【汇合】',blocks:[{type:'narration',text:'两人静默伫立天台，风声簌簌，足矣收尾所有过往。'}],choices:[{label:'__auto__',nextScene:'ch20_scene6'}]},
ch20_scene6:{tag:'【终笔抉择·全季最后一行字】',blocks:[{type:'narration',text:'返回项目部，夜色深沉。阿杰的旧工装依旧搭在空置椅背上。你经过那把空椅子时，伸手把工装领口的褶皱抚平了。阿杰开路、陈默接力、你终局翻盘，三件工装、三个人、一条未断的坚守线，在此刻完整闭环。你翻开随身笔记本，二十天、二十章的记录密密麻麻。'}],choices:[{label:'落地收束：锅卸了。继续。',nextScene:'ch20_branch5a'},{label:'期许未来：二十天。一个开始。',nextScene:'ch20_branch5b'}]},
ch20_branch5a:{tag:'【分支·利落收官】',blocks:[{type:'narration',text:'你落笔写下：锅卸了。继续。'}],choices:[{label:'__auto__',nextScene:'ch20_merge5'}]},
ch20_branch5b:{tag:'【分支·向阳新生】',blocks:[{type:'narration',text:'你落笔写下：二十天。一个开始。'}],choices:[{label:'__auto__',nextScene:'ch20_merge5'}]},
ch20_merge5:{tag:'【汇合】',blocks:[{type:'narration',text:'陈默伸手，递来一张全新的便利贴，字迹清淡如常。'},{type:'dialogue',text:'陈默："明天还有班要上。别迟到。"'},{type:'narration',text:'没有庆功、没有煽情、没有宣告胜利，只有职场最朴素的日常。你将便利贴夹入笔记本最后一页，封存全季所有故事。'}],choices:[{label:'__auto__',nextScene:'ch20_scene7'}]},
ch20_scene7:{tag:'【第二季钩子·风浪未止】',blocks:[{type:'narration',text:'手机屏幕骤然亮起，行业新闻弹窗推送。四海集团副总裁钱四海出席行业论坛，表态合规经营，旗下盛恒商业银行启动增资扩股计划。新闻配图中，钱四海西装革履、从容微笑。你看着屏幕上"孙总被查风波"六个字——消息已经传出去了。'},{type:'narration',text:'陈默已然看清屏幕内容，神色平静。'},{type:'dialogue',text:'陈默："钱四海知道孙总出事了。他在切割。"'},{type:'dialogue',text:'陈默："他的事还没完。不过那是明天的事了。"'},{type:'narration',text:'她抬眼望向窗外夜色，落下全季最终旁白。'},{type:'dialogue',text:'陈默："锅终于卸下来了。但厨房还在。"'}],choices:[{label:'__auto__',nextScene:'ch20_chapter_end'}]},
ch20_chapter_end:{tag:'【第一季·全剧终】',blocks:[{type:'narration',text:'你合上笔记本，起身准备离岗。走廊灯光昏暗柔和，小林方才站立的位置已经空了。手机再次亮起两条消息。其一：钱四海最新行业动态推送。其二：王总OA私信，简短利落：明天正常上班。职场从无终极大结局，只有往复不停的明日与前路。项目部灯火依旧明亮。空工位、旧工装、温热的咖啡、崭新的便利贴，二十天跌宕沉浮，尽数定格于此。风浪暂歇，坚守未止。'},{type:'bold',text:'【第一季·全剧终】'},{type:'narration',text:'感谢游玩《背锅侠》第一季。如果这二十天的故事让你有所触动，欢迎关注公众号「背锅侠本侠」，第二季开发进度、番外篇、幕后故事都将在公众号发布。'},{type:'bold',text:'微信搜索：背锅侠本侠'}],choices:[{label:'__auto__',nextScene:'__end__'}]}
};
